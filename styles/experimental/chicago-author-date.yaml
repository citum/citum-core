info:
  title: "Chicago Manual of Style 18th edition (author-date)"
  id: "chicago-author-date"
  link: "https://www.chicagomanualofstyle.org/"
  authors:
  - name: "Bruce D'Arcus"
    uri: "https://github.com/bdarcus"
  categories:
  - author-date
  - generic-base
  license: "http://creativecommons.org/licenses/by-sa/3.0/"

options:
  processing: author-date
  substitute:
    template:
    - editor
    - translator
    - title
  contributors:
    and: text
    name-form: initials
    initialize-with: ". "
    # For author-date, CMOS uses family-first only for the first author in bib
    display-as-sort: first
    delimiter-precedes-last: always
    shorten:
      min: 10
      use-first: 7
  dates:
    month: long

citation:
  sort:
    template:
    - key: author
    - key: issued
  options:
    contributors:
      name-form: full
      shorten:
        # 3 or more authors -> Author1 et al.
        min: 3
        use-first: 1
  non-integral:
    wrap: parentheses
    delimiter: ", "
    template:
    - delimiter: space
      group:
      - contributor: author
        form: short
      - date: issued
        form: year
        fallback:
        - term: no-date
    - variable: locator
  integral:
    delimiter: " "
    template:
    - contributor: author
      form: short
    - delimiter: ", "
      wrap: parentheses
      group:
      - date: issued
        form: year
        fallback:
        - term: no-date
      - variable: locator
bibliography:
  options:
    contributors:
      display-as-sort: first
      # Show up to 10 authors, then truncate
      shorten:
        min: 11
        use-first: 7
  type-variants:
    article-journal:
    - contributor: author
      form: long
      suffix: "."
    - date: issued
      form: year
      suffix: "."
      fallback: &id001
      - term: no-date
        suffix: "."
    - title: primary
      suffix: "."
      wrap: quotes
    - delimiter: space
      suffix: "."
      group:
      - delimiter: space
        group:
        - term: in
        - title: parent-monograph
          emph: true
        - contributor: editor
          form: verb
      - title: parent-serial
        form: long
        emph: true
      - items: &id002
        - items:
          - number: volume
          - number: issue
            wrap: parentheses
          delimiter: space
        - number: pages
          prefix: ": "
        delimiter: none
    - delimiter: period
      suffix: "."
      group:
      - variable: publisher-place
      - variable: publisher
    chapter:
    - contributor: author
      form: long
      suffix: "."
    - date: issued
      form: year
      suffix: "."
      fallback: *id001
    - title: primary
      suffix: "."
      wrap: quotes
    - delimiter: space
      suffix: "."
      group:
      - delimiter: space
        group:
        - term: in
        - title: parent-monograph
          emph: true
        - contributor: editor
          form: verb
      - title: parent-serial
        form: long
        emph: true
      - items: *id002
        delimiter: none
    - delimiter: period
      suffix: "."
      group:
      - variable: publisher-place
      - variable: publisher
  template:
  - contributor: author
    form: long
    suffix: "."
  - date: issued
    form: year
    suffix: "."
    fallback: *id001
  - title: primary
    suffix: "."
  - delimiter: space
    suffix: "."
    group:
    - delimiter: space
      group:
      - term: in
      - title: parent-monograph
        emph: true
      - contributor: editor
        form: verb
    - title: parent-serial
      form: long
      emph: true
    - delimiter: none
      group:
      - delimiter: space
        group:
        - number: volume
        - number: issue
          wrap: parentheses
      - number: pages
        prefix: ": "
  - delimiter: period
    suffix: "."
    group:
    - variable: publisher-place
    - variable: publisher
