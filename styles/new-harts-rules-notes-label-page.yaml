info:
  title: 'New Hart''s Rules: The Oxford Style Guide 2nd edition (notes, page abbreviations)'
  description: Oxford source citations, notes system, page abbreviations with locator (NHR 17.2.5)
  fields:
    - anthropology
    - communications
    - geography
    - history
    - humanities
    - linguistics
    - literature
    - philosophy
    - psychology
    - science
    - sociology
    - theology
  source:
    csl-id: http://www.zotero.org/styles/new-harts-rules-notes-label-page
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
      - name: Andrew Dunning
        uri: https://orcid.org/0000-0003-0464-5036
    links:
      - href: http://www.zotero.org/styles/new-harts-rules-notes-label-page
        rel: self
      - href: https://en.wikipedia.org/wiki/Hart's_Rules
        rel: documentation
options:
  substitute:
    contributor-role-form: short
    template: []
  processing: note
  contributors:
    and: text
    delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates:
    month: long
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: minimal
citation:
  options:
    contributors:
      delimiter-precedes-last: contextual
  subsequent:
    options:
      contributors:
        name-form: family-only
    template:
      - contributor: author
        form: short
      - title: primary
        form: short
        wrap:
          punctuation: quotes
      - variable: locator
        prefix: ', '
  type-variants:
    article-journal:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
        - match:
            variable: doi
          prefix: https://doi.org/
      remove:
        - match:
            number: number
    article-magazine:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
      remove:
        - match:
            number: number
    chapter:
      extends: article-magazine
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                shorten:
                  min: 4
                  use-first: 1
              - title: parent-monograph
                emph: true
      add:
        - component:
            prefix: ', in '
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                shorten:
                  min: 4
                  use-first: 1
                prefix: 'in '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    default:
      remove:
        - match:
            number: number
    interview:
      extends: default
      remove:
        - match:
            date: issued
    legal_case:
      - title: primary
        wrap:
          punctuation: quotes
      - title: parent-serial
        emph: true
      - date: issued
        form: year
        prefix: ", "
      - number: volume
        form: roman
        prefix: ", "
      - number: pages
        prefix: ", p. "
    patent:
      - contributor: author
        form: long
        name-order: given-first
        shorten:
          min: 4
          use-first: 1
      - title: primary
      - number: number
        prefix: ", Patent "
      - delimiter: none
        group:
          - date: issued
            form: month-day
            prefix: ", issued "
          - date: issued
            form: year
            prefix: ", "
    paper-conference:
      extends: default
      modify:
        - match:
            number: pages
          prefix: 'pp. '
  template:
    - contributor: author
      form: long
      name-order: given-first
      shorten:
        min: 4
        use-first: 1
        and-others: et-al
    - title: primary
      wrap:
        punctuation: quotes
    - prefix: ', in '
      group:
        - contributor: editor
          form: verb
          name-order: given-first
          shorten:
            min: 4
            use-first: 1
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - number: pages
    - variable: publisher-place
    - number: volume
      prefix: ), 2/
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: ' '
    - variable: doi
    - variable: url
    - number: number
      prefix: ', Patent '
  suffix: .
  delimiter: ', '
  multi-cite-delimiter: '; '
bibliography:
  options:
    hanging-indent: true
    entry-suffix: .
    separator: ' '
  type-variants:
    article-journal:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
        - match:
            variable: doi
          prefix: https://doi.org/
    article-magazine:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    chapter:
      extends: article-magazine
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                shorten:
                  min: 4
                  use-first: 1
              - title: parent-monograph
                emph: true
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                shorten:
                  min: 4
                  use-first: 1
                prefix: 'in '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    interview:
      remove:
        - match:
            date: issued
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    legal_case:
      - title: primary
        wrap:
          punctuation: quotes
      - title: parent-serial
        emph: true
      - date: issued
        form: year
        prefix: ', '
      - number: volume
        form: roman
        prefix: ', '
      - number: pages
        prefix: ', p. '
    patent:
      - contributor: author
        form: long
        name-order: family-first-only
        shorten:
          min: 5
          use-first: 1
      - title: primary
      - number: number
        prefix: ', Patent '
      - delimiter: none
        group:
          - date: issued
            form: month-day
            prefix: ', issued '
          - date: issued
            form: year
            prefix: ', '
    book:
      - contributor: author
        form: long
        name-order: family-first-only
        shorten:
          min: 5
          use-first: 1
      - title: primary
      - contributor: translator
        form: long
        prefix: ', trans. by '
      - variable: publisher-place
        prefix: ' ('
      - variable: publisher
        prefix: ': '
      - date: issued
        form: year
        prefix: ', '
        suffix: ')'
    personal_communication: []
    personal-communication: []
  template:
    - contributor: author
      form: long
      name-order: family-first-only
      shorten:
        min: 5
        use-first: 1
    - title: primary
      wrap:
        punctuation: quotes
    - variable: publisher-place
      prefix: ' ('
    - number: volume
      prefix: ), 2/
    - group:
        - contributor: editor
          form: verb
          name-order: given-first
          shorten:
            min: 4
            use-first: 1
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - date: issued
      form: year
      prefix: ' '
    - number: pages
    - variable: doi
    - variable: url
