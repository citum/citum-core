info:
  title: Frontiers medical journals
  description: Style for the Open Access Frontiers in ... Journals
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/frontiers-medical-journals
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Chris Forden
      email: cforden@comcast.net
    links:
    - href: http://www.zotero.org/styles/frontiers-medical-journals
      rel: self
    - href: http://www.zotero.org/styles/frontiers
      rel: template
    - href: https://www.frontiersin.org/guidelines/author-guidelines
      rel: documentation
options:
  substitute: editor-title-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 11
      use-first: 10
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  titles: humanities
  punctuation-in-quote: true
citation:
  template-ref: numeric-citation
  wrap:
    punctuation: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      sort-separator: " "
    separator: ". "
  type-variants:
    article-magazine:
      remove:
        - match:
            number: issue
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
                emph: true
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
  - number: volume
    prefix: " "
  - number: issue
    prefix: ":"
  - number: pages
    prefix: ":"
  - variable: doi
  - variable: url
