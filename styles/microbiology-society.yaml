info:
  title: Microbiology Society
  fields:
  - biology
  source:
    csl-id: http://www.zotero.org/styles/microbiology-society
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
    links:
    - href: http://www.zotero.org/styles/microbiology-society
      rel: self
    - href: http://www.zotero.org/styles/sage-vancouver
      rel: template
    - href: http://www.microbiologyresearch.org/authors/information-for-authors#references
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
    - title
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 6
      use-first: 5
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
citation:
  template:
  - number: citation-number
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 6
        use-first: 5
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
      remove:
        - match:
            date: issued
    article-magazine:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    broadcast:
      remove:
        - match:
            date: issued
    chapter:
      extends: article-magazine
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
                emph: true
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    entry-encyclopedia:
      remove:
        - match:
            date: issued
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    personal_communication:
      remove:
        - match:
            date: issued
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 5
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - number: volume
  - variable: publisher
  - date: issued
    form: year
    prefix: "; "
  - number: pages
    prefix: ":"
  - variable: publisher-place
  - variable: url
