info:
  title: 'NLM Style Guide (Vancouver): Citing Medicine 2nd edition (citation-sequence)'
  description: 'Citing Medicine: The NLM Style Guide for Authors, Editors, and Publishers, 2nd edition (2015), based on ANSI/NISO Z39.29-2005 (R2010); citation-sequence system.'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/nlm-citation-sequence
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/nlm-citation-sequence
      rel: self
    - href: https://www.nlm.nih.gov/citingmedicine
      rel: documentation
    - href: https://www.nlm.nih.gov/bsd/uniform_requirements.html
      rel: documentation
    - href: https://www.icmje.org/recommendations/
      rel: documentation
options:
  substitute: editor-long
  processing: numeric
  contributors: numeric-compact
  dates: long
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  extends: numeric-citation
  wrap:
    punctuation: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    - variable: url
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    - variable: url
    article-newspaper:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    - variable: url
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
    - variable: url
    dataset:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    - variable: url
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - date: issued
