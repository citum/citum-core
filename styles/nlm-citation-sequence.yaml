    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
    - variable: url
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
    - variable: url
    webpage:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    - variable: url
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 6
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - date: issued
    form: year
  - group:
    - number: volume
    - number: issue
      wrap:
