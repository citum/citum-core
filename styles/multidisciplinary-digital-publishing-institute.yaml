info:
  title: Multidisciplinary Digital Publishing Institute
  description: Style for the MDPI Open access journals
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/multidisciplinary-digital-publishing-institute
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/multidisciplinary-digital-publishing-institute
      rel: self
    - href: http://www.zotero.org/styles/american-chemical-society
      rel: template
    - href: http://www.mdpi.com/authors/references
      rel: documentation
options:
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: .
    delimiter: "; "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles: humanities
  page-range-format: expanded
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: .
      delimiter: "; "
      delimiter-precedes-last: always
      sort-separator: ", "
  type-variants:
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
      prefix: "; "
    - date: issued
      form: year
    - number: volume
    - number: pages
      prefix: "pp. "
    - variable: doi
    - variable: publisher-place
    book:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
      prefix: "; "
    - number: volume
    - number: issue
    - number: pages
    - variable: doi
    - variable: publisher-place
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
      prefix: "; "
    - number: volume
    - number: issue
    - number: pages
      prefix: "pp. "
    - variable: doi
    - variable: publisher-place
    motion_picture:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
      prefix: "; "
    - number: volume
    - number: issue
    - number: pages
    - variable: doi
    - variable: publisher-place
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
      prefix: "; "
    - number: volume
    - number: issue
    - number: pages
      prefix: "pp. "
    - variable: doi
    - variable: publisher-place
    report:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
      prefix: "; "
    - number: volume
    - number: issue
    - number: pages
    - variable: doi
    - variable: publisher-place
    webpage:
    - number: citation-number
      suffix: ". "
    - contributor: author
      form: long
      sort-separator: ", "
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
    - term: available-at
      form: long
    - variable: url
    - term: accessed
      form: long
    - date: accessed
      form: year
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: " "
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - contributor: editor
    form: verb
    name-order: family-first
  - variable: publisher
    prefix: "; "
  - date: issued
    form: year
  - number: volume
  - number: issue
  - number: pages
  - variable: doi
  - variable: publisher-place
