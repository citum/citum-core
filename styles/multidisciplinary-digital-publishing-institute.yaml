version: ''
info:
  title: Multidisciplinary Digital Publishing Institute
  id: http://www.zotero.org/styles/multidisciplinary-digital-publishing-institute
  default-locale: en-US
options:
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: .
    and: none
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ', '
    name-form: initials
  dates:
    month: long
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  template:
  - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ','
  collapse: citation-number
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: .
      delimiter: '; '
      delimiter-precedes-last: always
      sort-separator: ', '
      name-form: initials
    entry-suffix: .
    separator: ', '
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: ' '
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - contributor: editor
    form: verb
    name-order: family-first
  - variable: publisher
    prefix: '; '
  - date: issued
    form: year
  - number: volume
  - number: issue
  - number: pages
  - variable: doi
  - variable: publisher-place
  type-variants:
    article-journal:
    - number: citation-number
      suffix: '. '
    - contributor: author
      form: long
      sort-separator: ', '
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
      suffix: .
    - title: parent-serial
      emph: true
    - date: issued
      form: year
    - number: volume
      emph: true
    - number: pages
    - variable: doi
      prefix: ', doi:'
    article-magazine:
    - number: citation-number
      suffix: '. '
    - contributor: author
      form: long
      sort-separator: ', '
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
      prefix: ' '
    - title: parent-serial
      emph: true
      suffix: .
    - number: edition
    - term: edition
      form: short
    - variable: publisher
    - variable: publisher-place
    - date: issued
      form: year
    - number: pages
      label-form: short
    - number: pages
    legal_case:
    - number: citation-number
      suffix: '. '
    - contributor: author
      form: long
      sort-separator: ', '
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
      emph: true
    - contributor: editor
      form: long
    - number: edition
    - term: edition
      form: short
    - variable: publisher
    - variable: publisher-place
    - date: issued
      form: year
      suppress: false
    - term: volume
      form: short
    - number: volume
      suppress: false
    - number: pages
      label-form: short
      suppress: true
    - number: pages
      suppress: true
    - title: parent-serial
    webpage:
    - number: citation-number
      suffix: '. '
    - contributor: author
      form: long
      sort-separator: ', '
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
    - term: available-at
      form: long
    - variable: url
    - term: accessed
      form: long
    - date: accessed
      form: year
    patent:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: ' '
    - date: issued
      form: year
    - number: number

