info:
  title: African Online Scientific Information Systems - NLM/Vancouver
  description: Vancouver-like style for AOSIS Publishing as per 13 April 2017.
  source:
    csl-id: http://www.zotero.org/styles/african-online-scientific-information-systems-vancouver
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien, PhD
    links:
    - href: http://www.zotero.org/styles/african-online-scientific-information-systems-vancouver
      rel: self
    - href: http://www.zotero.org/styles/the-new-england-journal-of-medicine
      rel: template
    - href: https://safpj.co.za/index.php/safpj/pages/view/submission-guidelines#part_1
      rel: documentation
    - href: https://aosis.co.za/documents/Vancouver_Reference_style_guide.pdf
      rel: documentation
options:
  substitute:
    contributor-role-form: long
    template:
    - editor
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    sort-separator: " "
  dates:
    month: short
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
citation:
  template:
  - number: citation-number
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    separator: ". "
  type-variants:
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap: parentheses
    - variable: url
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap: parentheses
    - variable: url
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 3
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - group:
    - number: volume
    - number: issue
      wrap: parentheses
  - variable: url
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - number: pages
    prefix: ", 2006; "
