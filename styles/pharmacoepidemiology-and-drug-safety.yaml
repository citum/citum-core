extends: american-medical-association
info:
  title: Pharmacoepidemiology and Drug Safety
  id: http://www.zotero.org/styles/pharmacoepidemiology-and-drug-safety
  default-locale: en-US
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
  contributors:
    display-as-sort: all
    initialize-with: ''
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    and: none
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ' '
    name-form: initials
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  locators:
    default-label-form: short
    range-format: expanded
    strip-label-periods: true
    kinds: {}
    patterns: []
    fallback-delimiter: ', '
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ''
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      sort-separator: ' '
      name-form: initials
    hanging-indent: false
    separator: ': '
