info:
  title: Springer - Physics (numeric, brackets)
  description: This style is similar to American Physical Society (APS) and is used by a number of Springer publications.
  fields:
  - physics
  source:
    csl-id: http://www.zotero.org/styles/springer-physics-brackets
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-physics-brackets
      rel: self
    - href: http://www.zotero.org/styles/american-physics-society
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  substitute: editor-translator-long
  processing: numeric
  contributors: physics-numeric
  dates: long
  titles: humanities
  punctuation-in-quote: true
citation:
  template-ref: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      delimiter: ", "
    entry-suffix: .
    separator: ", "
  type-variants:
    article-journal:
      remove:
        - match:
            variable: publisher
        - match:
            variable: publisher-place
    book:
      add:
        - component:
            title: primary
            emph: true
          before:
            number: volume
    chapter:
    - contributor: author
      form: long
      name-order: given-first
    - term: in
    - title: parent-monograph
    - contributor: editor
      form: verb
    - variable: publisher
    - date: issued
      form: year
    - number: pages
      label-form: short
    paper-conference:
      add:
        - component:
            title: primary
            emph: true
          before:
            number: volume
    report:
    - contributor: author
      form: long
      name-order: given-first
    - title: primary
    - variable: publisher
    - variable: publisher-place
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
    thesis:
    - contributor: author
      form: long
      name-order: given-first
    - title: primary
    - variable: genre
    - variable: publisher
    - date: issued
      form: year
    legal-case:
    - title: primary
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
    - number: pages
      prefix: ", p. "
    patent:
    - contributor: author
      form: long
      name-order: given-first
    - number: patent-number
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
    motion-picture:
      extends: report
      remove:
        - match:
            variable: publisher
        - match:
            variable: publisher-place
    broadcast:
      extends: patent
      remove:
        - match:
            number: patent-number
      add:
        - component:
            title: parent-serial
          before:
            date: issued
  template:
  - contributor: author
    form: long
    name-order: given-first
  - title: parent-monograph
  - title: parent-serial
  - number: volume
  - number: pages
  - variable: publisher
    prefix: " ("
  - variable: publisher-place
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
