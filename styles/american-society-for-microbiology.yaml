info:
  title: American Society for Microbiology
  description: Style for all American Society for Microbiology journals.
  fields:
  - biology
  source:
    csl-id: http://www.zotero.org/styles/american-society-for-microbiology
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      email: julian.onions@gmail.com
    links:
    - href: http://www.zotero.org/styles/american-society-for-microbiology
      rel: self
    - href: https://journals.asm.org/references
      rel: documentation
options:
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: never
    sort-separator: " "
  dates: long
  punctuation-in-quote: true
  volume-pages-delimiter: colon
citation:
  template:
  - number: citation-number
  wrap: parentheses
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: " "
    - title: primary
    - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: pages
      prefix: "pp. "
    - contributor: editor
      form: verb
      name-order: family-first
      prefix: "In "
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: " "
    - title: primary
    - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: pages
      prefix: "pp. "
    - contributor: editor
      form: verb
      name-order: family-first
      prefix: ". In "
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    patent:
    - number: citation-number
      suffix: ". "
    - contributor: author
      form: long
      sort-separator: " "
    - date: issued
      form: year
    - title: primary
    - variable: version
      wrap: parentheses
    - number: number
      prefix: ". "
    - title: parent-serial
      prefix: ". "
    - number: edition
    - term: edition
      form: short
    - variable: genre
    - variable: publisher
    - variable: publisher-place
    webpage:
    - number: citation-number
      suffix: ". "
    - contributor: author
      form: long
      sort-separator: " "
    - date: issued
      form: year
    - title: primary
    - variable: version
      wrap: parentheses
    - number: number
      prefix: ". "
    - title: parent-serial
      prefix: ". "
    - number: edition
    - term: edition
      form: short
    - variable: genre
    - variable: publisher
    - variable: publisher-place
    - variable: url
    - term: retrieved
      form: long
    - date: accessed
      form: year
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    prefix: " "
  - title: primary
  - title: parent-monograph
  - title: parent-serial
  - number: volume
  - number: pages
    prefix: ":"
  - contributor: editor
    form: verb
    name-order: family-first
    prefix: ". In "
  - variable: publisher
  - variable: publisher-place
    prefix: ", "
