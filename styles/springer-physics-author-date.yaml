preset: american-physics-society
info:
  title: Springer - Physics (author-date)
  description: This style is similar to American Physical Society (APS) and is used by a number of Springer publications.
  fields:
    - physics
  source:
    csl-id: http://www.zotero.org/styles/springer-physics-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
      - name: Charles Parnot
        email: charles.parnot@gmail.com
        uri: http://twitter.com/cparnot
    links:
      - href: http://www.zotero.org/styles/springer-physics-author-date
        rel: self
      - href: http://www.zotero.org/styles/american-physics-society
        rel: template
      - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
        rel: documentation
      - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
        rel: documentation
options:
  substitute:
    contributor-role-form: long
    template:
      - editor
      - translator
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
        - key: author
          ascending: true
        - key: year
          ascending: true
    group:
      template:
        - author
        - year
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    name-form: initials
    initialize-with: '. '
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ', '
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
    - contributor: author
      form: short
      name-order: family-first
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
    - date: issued
      form: year
      prefix: ''
  wrap:
    punctuation: parentheses
  delimiter: ' '
  multi-cite-delimiter: '; '
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: '. '
      delimiter: ', '
      shorten:
        min: 99
        use-first: 99
    entry-suffix: .
    separator: ', '
  type-variants:
    article-journal:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', '
    article-magazine:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - variable: publisher
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', '
    article-newspaper:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - variable: publisher
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', '
    broadcast:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', '
    chapter:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - variable: publisher
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', pp. '
    dataset:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', '
    entry-encyclopedia:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', '
    interview:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', '
    paper-conference:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
        prefix: 'in '
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - variable: publisher
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', pp. '
    personal_communication:
      - contributor: author
        form: long
        name-order: given-first
        prefix: 'pp. '
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - variable: publisher
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', '
    webpage:
      - contributor: author
        form: long
        name-order: given-first
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher-place
      - number: volume
      - variable: publisher
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ', '
    legal_case:
      - contributor: author
        form: long
        and: text
      - title: primary
        emph: true
      - variable: authority
      - number: edition
      - term: edition
        form: short
      - variable: publisher
      - variable: publisher-place
      - date: issued
        form: year
      - term: no-date
        form: short
    patent:
      - contributor: author
        form: long
        and: text
      - number: number
      - date: issued
        form: year
      - term: no-date
        form: short
  template:
    - contributor: author
      form: long
      name-order: given-first
    - title: parent-monograph
    - title: parent-serial
    - title: primary
      emph: true
    - variable: publisher-place
    - number: volume
    - variable: publisher
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
    - number: pages
      prefix: ', '
  sort: author-date-title
