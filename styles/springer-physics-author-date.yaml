info:
  title: Springer - Physics (author-date)
  description: This style is similar to American Physical Society (APS) and is used by a number of Springer publications.
  fields:
  - physics
  source:
    csl-id: http://www.zotero.org/styles/springer-physics-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-physics-author-date
      rel: self
    - href: http://www.zotero.org/styles/american-physics-society
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  substitute:
    contributor-role-form: long
    template:
    - editor
    - translator
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
      - key: author
        ascending: true
      - key: year
        ascending: true
    group:
      template:
      - author
      - year
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    name-form: initials
    initialize-with: ". "
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
  - contributor: author
    form: short
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
  - date: issued
    form: year
    prefix: ""
  wrap:
    punctuation: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      delimiter: ", "
      shorten:
        min: 99
        use-first: 99
    entry-suffix: .
    separator: ", "
  type-variants:
    article-journal:
      remove:
        - match:
            title: primary
        - match:
            variable: publisher
    article-magazine:
      remove:
        - match:
            title: primary
    article-newspaper:
      remove:
        - match:
            title: primary
    broadcast:
      extends: article-magazine
      remove:
        - match:
            variable: publisher
    chapter:
      extends: article-magazine
      modify:
        - match:
            number: pages
          prefix: ', pp. '
    dataset:
      extends: article-magazine
      remove:
        - match:
            variable: publisher
    entry-encyclopedia:
      extends: article-magazine
      remove:
        - match:
            variable: publisher
    interview:
      extends: article-magazine
      remove:
        - match:
            variable: publisher
    paper-conference:
      extends: chapter
      modify:
        - match:
            title: parent-monograph
          prefix: 'in '
    personal_communication:
      extends: article-magazine
      modify:
        - match:
            contributor: author
          prefix: 'pp. '
    webpage:
      remove:
        - match:
            title: primary
    legal_case:
    - contributor: author
      form: long
      and: text
    - title: primary
      emph: true
    - variable: authority
    - number: edition
    - term: edition
      form: short
    - variable: publisher
    - variable: publisher-place
    - date: issued
      form: year
    - term: no-date
      form: short
    patent:
    - contributor: author
      form: long
      and: text
    - number: number
    - date: issued
      form: year
    - term: no-date
      form: short
  template:
  - contributor: author
    form: long
    name-order: given-first
  - title: parent-monograph
  - title: parent-serial
  - title: primary
    emph: true
  - variable: publisher-place
  - number: volume
  - variable: publisher
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
  - number: pages
    prefix: ", "
  sort: author-date-title
