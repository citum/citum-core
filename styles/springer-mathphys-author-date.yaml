info:
  title: Springer - MathPhys (author-date)
  description: This style is used by a number of Springer publications.
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/springer-mathphys-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-mathphys-author-date
      rel: self
    - href: http://www.zotero.org/styles/springer-lecture-notes-in-computer-science
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  processing:
    sort:
      template:
      - key: author
      - key: year
    group:
      template: [author, year]
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  substitute: editor-short
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: .
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  template:
  - delimiter: space
    group:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      and: text
    - date: issued
      form: year
  - variable: locator
  wrap:
    punctuation: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: .
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
    separator: ". "
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: ": "
  - title: parent-monograph
  - title: parent-serial
  - number: pages
  - variable: publisher-place
  - variable: doi
  - variable: url
  - variable: publisher
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
    prefix: " "
