version: ""
info:
  title: Elsevier (numeric, with titles)
  id: http://www.zotero.org/styles/elsevier-with-titles
  default-locale: en-US
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
  processing: numeric
  contributors:
    initialize-with: .
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  template:
    - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      initialize-with: .
      delimiter: ", "
      delimiter-precedes-last: always
  template:
    - contributor: author
      form: long
      overrides:
        personal_communication:
          prefix: "pp. "
      name-order: given-first
    - title: primary
    - variable: url
    - title: parent-monograph
    - title: parent-serial
    - number: volume
    - variable: publisher
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
      overrides:
        chapter:
          suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
      prefix: " "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
      prefix: ". "
    - variable: publisher-place
