info:
  title: Mary Ann Liebert (author-date/Harvard)
  source:
    csl-id: http://www.zotero.org/styles/mary-ann-liebert-harvard
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
      email: obrienpat86@gmail.com
    links:
    - href: http://www.zotero.org/styles/mary-ann-liebert-harvard
      rel: self
    - href: http://www.zotero.org/styles/iawa-journal
      rel: template
    - href: https://home.liebertpub.com/authors/writing-guidelines/151
      rel: documentation
options:
  substitute: editor-short
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    and: text
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: numeric
  bibliography:
    entry-suffix: .
    separator: ". "
  punctuation-in-quote: true
citation:
  options:
    processing:
      disambiguate:
        names: false
        add-givenname: false
        year-suffix: true
    contributors:
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
  - contributor: author
    form: short
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
  - date: issued
    form: year
    prefix: ", "
  - variable: locator
    prefix: ", "
  wrap: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: never
      sort-separator: " "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten: &id001
        min: 5
        use-first: 3
    - title: primary
      prefix: " "
    - items: &id002
      - contributor: editor
        form: verb
        name-order: family-first
        shorten: &id003
          min: 4
          use-first: 3
      - title: parent-monograph
    - title: parent-serial
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - variable: publisher
    - number: pages
      prefix: "; 2006; "
    - variable: publisher-place
      prefix: ": "
    - variable: doi
      prefix: "; "
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items: *id002
    - title: parent-serial
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - variable: publisher
    - number: pages
      prefix: "; 2006; "
    - variable: publisher-place
      prefix: ": "
    - variable: doi
      prefix: "; "
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items: *id002
    - title: parent-serial
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - variable: publisher
    - number: pages
      prefix: "pp. "
    - variable: publisher-place
      prefix: ": "
    - variable: doi
      prefix: "; "
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items: *id002
    - title: parent-serial
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - variable: publisher
    - number: pages
      prefix: "; 2006; "
    - variable: publisher-place
      prefix: ": "
    - variable: doi
      prefix: "; "
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items: *id002
    - title: parent-serial
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - variable: publisher
    - number: pages
      prefix: "pp. "
    - variable: publisher-place
      prefix: ": "
    - variable: doi
      prefix: "; "
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten: *id001
  - title: primary
    prefix: " "
  - items:
    - contributor: editor
      form: verb
      name-order: family-first
      shorten: *id003
    - title: parent-monograph
  - title: parent-serial
  - items:
    - number: volume
    - number: issue
      wrap: parentheses
  - variable: publisher
  - number: pages
    prefix: "; 2006; "
  - variable: publisher-place
    prefix: ": "
  - date: issued
    form: year
    prefix: "; "
  - variable: doi
    prefix: "; "
