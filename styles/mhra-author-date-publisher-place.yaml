info:
  title: MHRA Style Guide 4th edition (author-date, place of publication)
  description: MHRA source citations, author-date system, with place of publication (MHRA 7.3)
  fields:
    - history
    - humanities
    - linguistics
    - literature
    - philosophy
    - theology
  source:
    csl-id: http://www.zotero.org/styles/mhra-author-date-publisher-place
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
      - name: Andrew Dunning
        uri: https://orcid.org/0000-0003-0464-5036
    links:
      - href: http://www.zotero.org/styles/mhra-author-date-publisher-place
        rel: self
      - href: http://www.zotero.org/styles/mhra-notes
        rel: template
      - href: https://www.mhra.org.uk/style/
        rel: documentation
options:
  substitute:
    template: []
  processing:
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
  contributors:
    and: text
    demote-non-dropping-particle: display-and-sort
  dates:
    month: numeric
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
  page-range-format: minimal-two
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: '. '
      shorten:
        min: 8
        use-first: 1
  type-variants:
    personal_communication:
      - contributor: author
        form: long
        name-order: given-first
      - variable: locator
        prefix: ' '
  template:
    - contributor: author
      form: long
      name-order: given-first
    - date: issued
      form: year
      prefix: ' '
    - variable: locator
      prefix: ' '
  wrap:
    punctuation: parentheses
  delimiter: '. '
  multi-cite-delimiter: '; '
bibliography:
  options:
    subsequent-author-substitute: ——
    subsequent-author-substitute-rule: partial-first
    hanging-indent: true
    separator: ', '
  type-variants:
    article-journal:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        wrap:
          punctuation: quotes
        prefix: '. '
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - number: volume
      - number: issue
        prefix: .
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 1
      - variable: publisher
        prefix: ' and others ('
      - number: pages
        prefix: 'pp. '
      - variable: publisher-place
      - variable: doi
      - variable: url
    article-magazine:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        wrap:
          punctuation: quotes
        prefix: '. '
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - number: volume
      - number: issue
        prefix: .
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 1
      - variable: publisher
        prefix: ' and others ('
      - number: pages
        prefix: 'pp. '
      - variable: publisher-place
      - variable: doi
      - variable: url
    chapter:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        wrap:
          punctuation: quotes
        prefix: '. '
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - number: volume
      - number: issue
        prefix: .
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 1
      - variable: publisher
        prefix: ' and others ('
      - number: pages
        prefix: 'pp. '
      - variable: publisher-place
      - variable: doi
      - variable: url
    entry-encyclopedia:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        wrap:
          punctuation: quotes
        prefix: '. '
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - number: volume
      - number: issue
        prefix: .
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 1
      - variable: publisher
        prefix: ' and others ('
      - number: pages
        prefix: 'pp. '
      - variable: publisher-place
      - variable: doi
      - variable: url
    paper-conference:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        wrap:
          punctuation: quotes
        prefix: '. '
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - number: volume
      - number: issue
        prefix: .
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 1
      - variable: publisher
        prefix: ' and others ('
      - number: pages
        prefix: 'pp. '
      - variable: publisher-place
      - variable: doi
      - variable: url
    article-newspaper:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        wrap:
          punctuation: quotes
        prefix: '. '
      - variable: section
        prefix: ', '
      - title: parent-serial
        emph: true
        prefix: ', '
      - date: issued
        form: month-day
        prefix: ', '
    broadcast:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        wrap:
          punctuation: quotes
        prefix: '. '
      - title: parent-serial
        emph: true
        prefix: ', '
      - date: issued
        form: month-day
        wrap:
          punctuation: parentheses
        prefix: ' '
      - number: number
        prefix: ', episode '
    motion-picture:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        prefix: '. '
      - variable: genre
        prefix: ', '
      - contributor: director
        form: long
        name-order: given-first
        prefix: ', dir. by '
    interview:
      - contributor: interviewer
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        wrap:
          punctuation: quotes
        prefix: '. '
      - variable: genre
        prefix: ', '
      - contributor: author
        form: long
        name-order: given-first
        prefix: ' with '
      - date: issued
        form: month-day
        prefix: ', '
      - variable: url
    patent:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        prefix: '. '
      - title: primary
        prefix: '. '
      - number: number
        prefix: ', Patent '
      - delimiter: ""
        group:
        - date: issued
          form: month-day
          prefix: ', issued '
        - date: issued
          form: year
          prefix: ', '
    personal-communication: []
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 1
    - date: issued
      form: year
      prefix: '. '
    - title: primary
      prefix: '. '
    - contributor: translator
      form: long
      name-order: given-first
      prefix: ', trans. by '
    - contributor: editor
      form: verb
      name-order: given-first
      shorten:
        min: 4
        use-first: 1
    - delimiter: ""
      group:
      - variable: publisher-place
      - variable: publisher
        prefix: ': '
      wrap:
        punctuation: parentheses
      prefix: ' '
    - number: pages
      prefix: ', pp. '
    - variable: doi
    - variable: url
  sort: author-date-title
