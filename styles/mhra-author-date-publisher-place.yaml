    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: issue
      prefix: .
    - contributor: editor
      form: verb
      name-order: given-first
      shorten: *id003
    - variable: publisher
      prefix: " and others ("
    - number: pages
      prefix: "pp. "
    - variable: publisher-place
    - variable: doi
    - variable: url
