info:
  title: MHRA Style Guide 4th edition (author-date, place of publication)
  description: MHRA source citations, author-date system, with place of publication (MHRA 7.3)
  fields:
  - history
  - humanities
  - linguistics
  - literature
  - philosophy
  - theology
  source:
    csl-id: http://www.zotero.org/styles/mhra-author-date-publisher-place
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/mhra-author-date-publisher-place
      rel: self
    - href: http://www.zotero.org/styles/mhra-notes
      rel: template
    - href: https://www.mhra.org.uk/style/
      rel: documentation
options:
  substitute:
    template: []
  processing:
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
  contributors:
    name-form: initials
    initialize-with: ". "
    and: text
    demote-non-dropping-particle: display-and-sort
  dates:
    month: numeric
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  page-range-format: minimal-two
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
  type-variants:
    personal_communication:
    - contributor: author
      form: long
      name-order: given-first
      shorten: &id001
        min: 8
        use-first: 1
    - variable: locator
      prefix: " "
  template:
  - contributor: author
    form: long
    name-order: given-first
    shorten: *id001
  - date: issued
    form: year
    prefix: " "
  - variable: locator
    prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    subsequent-author-substitute: ——
    subsequent-author-substitute-rule: partial-first
    hanging-indent: true
    separator: ", "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten: &id002
        min: 5
        use-first: 1
    - date: issued
      form: year
      prefix: ". "
    - title: primary
      wrap: quotes
      prefix: ". "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: issue
      prefix: .
    - contributor: editor
      form: verb
      name-order: given-first
      shorten: &id003
        min: 4
        use-first: 1
    - variable: publisher
      prefix: " and others ("
    - number: pages
      prefix: "pp. "
    - variable: publisher-place
    - variable: doi
    - variable: url
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id002
    - date: issued
      form: year
      prefix: ". "
    - title: primary
      wrap: quotes
