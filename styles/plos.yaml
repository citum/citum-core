info:
  title: Public Library of Science
  description: Vancouver for PLoS Journals as of January 2015
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/plos
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/plos
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence
      rel: template
    - href: http://www.plosone.org/static/guidelines#references
      rel: documentation
options:
  substitute: editor-long
  processing: numeric
  contributors: numeric-compact
  dates: long
  punctuation-in-quote: true
citation:
  extends: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    separator: ". "
  type-variants:
    article-journal:
      remove:
        - match:
            date: issued
    article-magazine:
      extends: article-journal
      remove:
        - match:
            number: issue
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
          before:
            title: parent-serial
    entry-encyclopedia:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 6
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - variable: publisher
  - date: issued
    form: year
    prefix: "; "
  - number: volume
  - number: issue
    prefix: ": "
  - number: pages
    prefix: ": "
  - variable: doi
  - variable: publisher-place
  - variable: url
