info:
  title: Pensoft Journals
  description: The Pensoft Journals style
  source:
    csl-id: http://www.zotero.org/styles/pensoft-journals
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Brian Stucky
      email: stuckyb@colorado.edu
    - name: Teodor Georgiev
      email: t.georgiev@pensoft.net
    links:
    - href: http://www.zotero.org/styles/pensoft-journals
      rel: self
    - href: http://www.zotero.org/styles/zootaxa
      rel: template
    - href: https://zookeys.pensoft.net/about#CitationsandReferences
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
      - key: year
        ascending: true
      - key: author
        ascending: true
    group:
      template:
      - year
      - author
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 5
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    and: none
    delimiter-precedes-last: always
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  punctuation-in-quote: true
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: " "
      delimiter-precedes-last: never
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
  - date: issued
    form: year
    prefix: " "
  - variable: locator
    prefix: " "
  wrap:
    punctuation: parentheses
  delimiter: ". "
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      delimiter-precedes-last: never
      sort-separator: " "
    hanging-indent: true
    entry-suffix: " "
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ": "
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: doi
      prefix: https://doi.org/
    - variable: publisher-place
      prefix: ", "
    - variable: url
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: doi
    - variable: publisher-place
      prefix: ", "
    - variable: url
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ": "
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: doi
    - variable: publisher-place
      prefix: ", "
    - variable: url
    legal_case:
    - contributor: author
      form: long
      sort-separator: " "
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
    - title: parent-serial
    - title: primary
    - variable: authority
    - number: edition
    - term: edition
      form: short
    - contributor: editor
      form: long
      delimiter: ", "
      sort-separator: " "
    - variable: genre
    - variable: publisher
    - variable: doi
      prefix: https://doi.org/
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
    prefix: " "
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - number: volume
  - number: issue
    prefix: ": "
  - variable: publisher
  - number: pages
    prefix: ", "
  - variable: doi
  - variable: publisher-place
    prefix: ", "
  - variable: url
  sort: author-date-title
