info:
  title: American Association for Cancer Research
  description: Parent style for AACR's journals
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/american-association-for-cancer-research
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/american-association-for-cancer-research
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence
      rel: template
    - href: http://www.aacrjournals.org/site/InstrAuthors/ifora.xhtml#references
      rel: documentation
options:
  substitute: editor-long
  processing: numeric
  contributors: numeric-compact
  dates: long
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  template-ref: numeric-citation
  wrap:
    punctuation: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
      remove:
        - match:
            date: issued
    article-magazine:
      remove:
        - match:
            date: issued
    article-newspaper:
      remove:
        - match:
            date: issued
    chapter:
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
          before:
            title: parent-serial
    dataset:
      remove:
        - match:
            date: issued
    webpage:
      remove:
        - match:
            date: issued
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 6
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - date: issued
    form: year
    prefix: "; "
  - number: volume
  - number: pages
    prefix: ":"
  - variable: url
