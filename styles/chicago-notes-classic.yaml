info:
  title: Chicago Manual of Style 18th edition (notes without bibliography, classic variants)
  description: 'Chicago-style source citations (with Bluebook for legal citations), notes system without
    bibliography, listing up to six authors in a full citation (CMOS18 13.23), displaying number of volumes
    (CMOS18 14.20), classic variants: chapter page numbers (CMOS18 14.8), place of publication (CMOS18
    14.30)'
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - law
  - linguistics
  - literature
  - philosophy
  - science
  - sociology
  - theology
  source:
    csl-id: http://www.zotero.org/styles/chicago-notes-classic
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/chicago-notes-classic
      rel: self
    - href: http://www.zotero.org/styles/chicago-notes-bibliography
      rel: template
    - href: https://www.chicagomanualofstyle.org/
      rel: documentation
options:
  processing: note
  contributors:
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  page-range-format: chicago16
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
  ibid:
    note-start-text-case: capitalize-first
    suffix: ""
    delimiter: ", "
    template:
    - term: ibid
    - variable: locator
      suffix: .
  subsequent:
    options:
      contributors:
        name-form: family-only
    type-variants:
      default:
      - contributor: author
        form: short
      - title: primary
        form: short
        prefix: ", "
    template:
    - contributor: author
      form: short
    - title: primary
      form: short
      prefix: ", "
    - variable: locator
      prefix: ", "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: given-first
      shorten: &id001
        min: 8
        use-first: 3
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: given-first
    - number: pages
    - variable: url
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: volume
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - variable: doi
      prefix: https://doi.org/
    - number: number
      prefix: ", Patent "
    - delimiter: none
      group:
      - date: issued
        form: month-day
        prefix: ", issued "
      - date: issued
        form: year
        prefix: ", "
    default:
    - contributor: author
      form: long
      name-order: given-first
      shorten: *id001
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: given-first
    - number: pages
    - variable: url
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: volume
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - variable: doi
    - delimiter: none
      group:
      - date: issued
        form: month-day
        prefix: ", issued "
      - date: issued
        form: year
        prefix: ", "
  template:
  - contributor: author
    form: long
    name-order: given-first
    shorten: *id001
  - title: primary
    wrap: quotes
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - contributor: editor
    form: verb
    name-order: given-first
  - number: pages
  - variable: url
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - number: volume
  - date: issued
    form: year
    wrap: parentheses
    prefix: " "
  - variable: doi
  - number: number
    prefix: ", Patent "
  - delimiter: none
    group:
    - date: issued
      form: month-day
      prefix: ", issued "
    - date: issued
      form: year
      prefix: ", "
  suffix: .
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  template: []
