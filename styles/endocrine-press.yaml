info:
  title: Endocrine Press
  description: The American Medical Association style  with parentheses, bold authors, and no et-al
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/endocrine-press
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/endocrine-press
      rel: self
    - href: http://www.zotero.org/styles/american-medical-association
      rel: template
    - href: http://press.endocrine.org/page/authors#mozTocId713371
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles: humanities
  punctuation-in-quote: true
citation:
  template:
  - number: citation-number
  wrap: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - number: pages
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: url
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - number: pages
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: url
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - number: pages
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: url
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - number: pages
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: url
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: " "
  - items:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - date: issued
    form: year
  - items:
    - number: volume
    - number: issue
      wrap: parentheses
  - number: pages
    prefix: ":"
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - variable: url
