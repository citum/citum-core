info:
  title: Angewandte Chemie International Edition
  description: >
    Style for Wiley-VCH's journal Angewandte Chemie International Edition.
    Supports compound citation grouping with alphabetic sub-labels (a, b, c),
    addressing the primary limitation of prior CSL 1.0 implementations.
    Distinctive: bold year in bibliography, semicolon-delimited author list.
  fields:
  - chemistry
  source:
    csl-id: http://www.zotero.org/styles/angewandte-chemie
    adapted-by: citum-create
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Richard Karnesky
      email: karnesky+zotero@gmail.com
    links:
    - href: http://www.zotero.org/styles/angewandte-chemie
      rel: self
    - href: https://onlinelibrary.wiley.com/page/journal/15213773/homepage/notice-to-authors
      rel: documentation
options:
  processing: numeric
  contributors:
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  bibliography:
    entry-suffix: .
    separator: ", "
    compound-numeric:
      collapse-subentries: true
citation:
  use-preset: numeric-citation
  wrap: brackets
  collapse: citation-number
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: always
      role:
        omit:
          - editor
  template:
    - number: citation-number
      wrap: brackets
      suffix: " "
    - contributor: author
      form: long
      name-order: given-first
    - title: primary
      prefix: ", "
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        article-newspaper:
          suppress: true
        dataset:
          suppress: true
        standard:
          suppress: true
        chapter:
          suppress: true
        paper-conference:
          suppress: true
        entry-encyclopedia:
          suppress: true
        motion_picture:
          suppress: false
        broadcast:
          suppress: false
    - title: parent-serial
      prefix: ", "
      overrides:
        book:
          suppress: true
        chapter:
          suppress: true
        broadcast:
          suppress: true
        motion_picture:
          suppress: true
        entry-encyclopedia:
          prefix: " in "
    - title: parent-monograph
      prefix: " in "
    - contributor: editor
      form: long
      name-order: given-first
      prefix: ", (Eds.: "
      suffix: ")"
      overrides:
        report:
          suppress: true
    - variable: publisher
      prefix: ", "
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        article-newspaper:
          suppress: true
        report:
          suppress: true
    - variable: publisher-place
      prefix: ", "
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        article-newspaper:
          suppress: true
    - date: issued
      form: year
      prefix: ", "
      overrides:
        article-journal:
          prefix: " "
        article-magazine:
          prefix: " "
        article-newspaper:
          prefix: " "
    - number: volume
      prefix: ", "
    - number: pages
      prefix: ", "
      overrides:
        chapter:
          prefix: ", pp. "
        paper-conference:
          prefix: ", pp. "
    - variable: doi
      prefix: ", DOI "
  type-templates:
    standard:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - date: issued
        form: year
    webpage:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        prefix: " "
      - variable: url
        prefix: " can be found under "
      - term: accessed
        form: long
        prefix: " ("
      - date: accessed
        form: full
        suffix: ")"
    patent:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        emph: true
        prefix: " "
      - date: issued
        form: year
        strong: true
        prefix: ", "
      - number: number
        prefix: ", "
