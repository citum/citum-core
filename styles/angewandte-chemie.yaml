version: ""
info:
  title: Angewandte Chemie International Edition
  id: http://www.zotero.org/styles/angewandte-chemie
  default-locale: en-US
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
  processing: numeric
  contributors:
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  template:
    - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: always
  template:
    - contributor: author
      form: long
      name-order: given-first
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - variable: publisher-place
    - date: issued
      form: year
    - number: volume
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
  type-templates:
    webpage:
      - number: citation-number
        wrap: brackets
      - contributor: author
        form: long
      - title: primary
        quote: true
        wrap: quotes
      - variable: doi
        prefix: "DOI "
      - variable: url
        prefix: "can be found under "
      - term: accessed
        form: long
      - date: accessed
        form: year
      - date: issued
        form: year
      - term: no-date
        form: short
    personal_communication: []
    legal_case:
      - number: citation-number
        wrap: brackets
      - contributor: author
        form: long
      - title: primary
        emph: true
      - variable: authority
      - variable: publisher
      - variable: publisher-place
      - date: issued
        form: year
        suppress: false
      - title: parent-serial
    personal-communication: []
    patent:
      - number: citation-number
        wrap: brackets
      - contributor: author
        form: long
      - title: primary
        emph: true
      - date: issued
        form: year
      - term: no-date
        form: short
      - number: number
