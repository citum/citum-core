info:
  title: Angewandte Chemie International Edition
  default-locale: en-US
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  titles:
    component: {}
    monograph:
      emph: false
    periodical:
      emph: false
  punctuation-in-quote: true
citation:
  template:
  - number: citation-number
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: always
    entry-suffix: .
    separator: ", "
  type-variants:
    chapter:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      name-order: given-first
    - title: parent-monograph
      prefix: " in "
    - contributor: editor
      form: long
      name-order: given-first
      wrap:
        punctuation: parentheses
        inner-prefix: "Eds.: "
    - variable: publisher
    - variable: publisher-place
    - date: issued
      form: year
    - number: pages
      label-form: short
    paper-conference:
      extends: chapter
      remove:
        - match:
            contributor: editor
        - match:
            variable: publisher
        - match:
            variable: publisher-place
    article-journal:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      name-order: given-first
    - title: parent-serial
    - date: issued
      form: year
      prefix: " "
    - number: volume
    - number: pages
    - variable: doi
      prefix: "DOI "
    article-newspaper:
      extends: article-journal
      remove:
        - match:
            number: volume
        - match:
            number: pages
        - match:
            variable: doi
    article-magazine:
      extends: article-journal
      remove:
        - match:
            variable: doi
    entry-encyclopedia:
      extends: chapter
      remove:
        - match:
            contributor: editor
      add:
        - component:
            number: volume
            prefix: 'Vol. '
          before:
            variable: publisher
    thesis:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      name-order: given-first
    - variable: genre
    - date: issued
      form: year
    patent:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      name-order: given-first
    - contributor: author
      form: long
      name-order: given-first
      wrap:
        punctuation: parentheses
    - number: number
    - date: issued
      form: year
    personal_communication:
      extends: thesis
      remove:
        - match:
            variable: genre
      add:
        - component:
            title: primary
          before:
            date: issued
    personal-communication:
      extends: thesis
      remove:
        - match:
            variable: genre
      add:
        - component:
            title: primary
          before:
            date: issued
    webpage:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
    - title: primary
      quote: true
      wrap:
        punctuation: quotes
    - variable: doi
      prefix: "DOI "
    - variable: url
      prefix: "can be found under "
    - term: accessed
      form: long
    - date: accessed
      form: year
    - date: issued
      form: year
    - term: no-date
      form: short
    legal_case:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
    - title: primary
      emph: true
    - variable: authority
    - variable: publisher
    - variable: publisher-place
    - date: issued
      form: year
    - title: parent-serial
  template:
  - number: citation-number
    wrap:
      punctuation: brackets
  - contributor: author
    form: long
    name-order: given-first
  - title: primary
  - title: parent-monograph
  - title: parent-serial
  - variable: publisher
  - variable: publisher-place
  - date: issued
    form: year
  - number: volume
  - number: pages
