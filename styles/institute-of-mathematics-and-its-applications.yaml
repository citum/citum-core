options:
  substitute:
    template:
    - editor
    - translator
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: .
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    and: symbol
    demote-non-dropping-particle: never
  dates: long
  titles: humanities
  page-range-format: expanded
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
  - contributor: author
    form: short
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
  - date: issued
    form: year
    prefix: ", "
  wrap:
    punctuation: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: .
      shorten:
        min: 99
        use-first: 99
        and-others: et-al
    hanging-indent: true
    entry-suffix: .
    separator: ", "
  type-variants:
    book:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: family-first
        prefix: "on "
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: family-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: family-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
    prefix: " "
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: family-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - number: volume
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - number: pages
