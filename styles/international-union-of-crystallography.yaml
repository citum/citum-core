info:
  title: International Union of Crystallography journals
  fields:
  - chemistry
  source:
    csl-id: http://www.zotero.org/styles/international-union-of-crystallography
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: James Stroud
      email: jstroud@mbi.ucla.edu
    links:
    - href: http://www.zotero.org/styles/international-union-of-crystallography
      rel: self
    - href: http://journals.iucr.org/d/services/notesforauthors.html
      rel: documentation
options:
  substitute:
    template:
    - editor
    - title
  processing:
    disambiguate:
      names: true
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ". "
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: never
    delimiter-precedes-et-al: never
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: expanded
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: " "
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-et-al: never
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
  - date: issued
    form: year
    prefix: ", "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ". "
      delimiter-precedes-last: never
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - number: pages
      prefix: ", "
    - variable: publisher
      prefix: ". "
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - number: pages
      prefix: ", "
    - variable: publisher
      prefix: ". "
    article-newspaper:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - number: pages
      prefix: ", "
    - variable: publisher
      prefix: ". "
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - number: pages
      prefix: "pp. "
    - variable: publisher
      prefix: ". "
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - number: pages
      prefix: "pp. "
    - variable: publisher
      prefix: ". "
    webpage:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher-place
    - number: pages
      prefix: ", "
    - variable: publisher
      prefix: ". "
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    wrap: parentheses
  - title: primary
    prefix: ". "
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - number: volume
  - variable: publisher-place
  - number: pages
    prefix: ", "
  - variable: publisher
    prefix: ". "
  sort: author-date-title
