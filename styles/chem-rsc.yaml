info:
  title: Royal Society of Chemistry (Compound)
  description: >
    Royal Society of Chemistry journal style with compound citation support.
    Groups related references under a shared citation number with
    alphabetic sub-labels. Based on the standard RSC style.
  fields:
  - chemistry
  source:
    csl-id: http://www.zotero.org/styles/royal-society-of-chemistry
    adapted-by: citum-create
    license: http://creativecommons.org/licenses/by-sa/3.0/
    links:
    - href: http://www.zotero.org/styles/royal-society-of-chemistry
      rel: template
    - href: http://www.rsc.org/learn-chemistry/resource/download/res00001664/cmp00004956/pdf
      rel: documentation
options:
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component:
      text-case: as-is
    monograph:
      text-case: as-is
    container-monograph:
      text-case: as-is
    periodical: {}
    serial:
      text-case: as-is
citation:
  template-ref: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: never
    entry-suffix: .
    separator: ", "
    compound-numeric:
      collapse-subentries: true
  type-variants:
    article-journal:
      remove:
        - match:
            variable: publisher
        - match:
            variable: doi
        - match:
            variable: publisher-place
    article-magazine:
      remove:
        - match:
            variable: publisher
        - match:
            variable: doi
        - match:
            variable: publisher-place
    article-newspaper:
      remove:
        - match:
            variable: publisher
        - match:
            variable: doi
        - match:
            variable: publisher-place
    book:
      modify:
        - match:
            title: primary
          quote: false
          wrap:
            punctuation: quotes
    chapter:
      modify:
        - match:
            title: parent-monograph
          prefix: 'in '
        - match:
            number: pages
          prefix: 'pp. '
      remove:
        - match:
            title: primary
    entry-encyclopedia:
      modify:
        - match:
            title: parent-monograph
          prefix: 'in '
      remove:
        - match:
            title: primary
    legal_case:
    - number: citation-number
      wrap:
        punctuation: parentheses
      suffix: " "
    - contributor: author
      form: long
      and: text
    - title: primary
    - variable: authority
    - variable: publisher
    - variable: publisher-place
    - number: edition
    - date: issued
      form: year
    motion_picture:
      modify:
        - match:
            title: primary
          quote: false
          wrap:
            punctuation: quotes
    paper-conference:
      extends: chapter
      modify:
        - match:
            title: parent-monograph
          prefix: ', '
    report:
      extends: book
      remove:
        - match:
            variable: publisher
    thesis:
    - number: citation-number
      wrap:
        punctuation: parentheses
      suffix: " "
    - contributor: author
      form: long
      and: text
    - title: primary
    - variable: genre
    - date: issued
      form: year
    webpage:
    - number: citation-number
      wrap:
        punctuation: parentheses
      suffix: " "
    - contributor: author
      form: long
      and: text
    - title: primary
    - variable: url
    - term: accessed
      form: long
    - date: accessed
      form: full
    patent:
    - number: citation-number
      wrap:
        punctuation: parentheses
      suffix: " "
    - variable: publisher
    - number: number
    - title: parent-serial
      emph: true
    - date: issued
      form: year
    - number: volume
    - number: pages
  template:
  - number: citation-number
    wrap:
      punctuation: parentheses
    suffix: " "
  - contributor: author
    form: long
    name-order: given-first
    and: text
  - title: primary
    wrap:
      punctuation: quotes
  - title: parent-monograph
    prefix: ", "
  - title: parent-serial
    prefix: ", "
  - contributor: editor
    form: long
    name-order: given-first
    and: text
    prefix: ", ed. "
  - variable: genre
    prefix: ", "
  - date: issued
    form: year
    prefix: ", "
  - variable: publisher
    prefix: ", "
  - number: volume
    prefix: ", "
  - number: pages
  - variable: doi
    prefix: ", DOI: "
  - variable: publisher-place
    prefix: ", "
