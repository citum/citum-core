info:
  title: Royal Society of Chemistry (Compound)
  description: >
    Royal Society of Chemistry journal style with compound citation support.
    Groups related references under a shared citation number with
    alphabetic sub-labels. Based on the standard RSC style.
  fields:
  - chemistry
  source:
    csl-id: http://www.zotero.org/styles/royal-society-of-chemistry
    adapted-by: citum-create
    license: http://creativecommons.org/licenses/by-sa/3.0/
    links:
    - href: http://www.zotero.org/styles/royal-society-of-chemistry
      rel: template
    - href: http://www.rsc.org/learn-chemistry/resource/download/res00001664/cmp00004956/pdf
      rel: documentation
options:
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component:
      text-case: as-is
    monograph:
      text-case: as-is
    container-monograph:
      text-case: as-is
    periodical: {}
    serial:
      text-case: as-is
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: never
    entry-suffix: .
    separator: ", "
    compound-numeric:
      collapse-subentries: true
  type-variants:
    article-journal:
    - number: citation-number
      wrap: parentheses
      suffix: " "
    - contributor: author
      form: long
      name-order: given-first
      and: text
    - title: primary
      wrap: quotes
    - title: parent-monograph
      prefix: ", "
    - title: parent-serial
      prefix: ", "
    - contributor: editor
      form: long
      name-order: given-first
      and: text
      prefix: ", ed. "
    - variable: genre
      prefix: ", "
    - date: issued
      form: year
      prefix: ", "
    - number: volume
      prefix: ", "
    - number: pages
