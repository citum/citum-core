info:
  title: Medicina Clínica (Español)
  description: Style for Medicina Clinica (and most Spanish Elsevier journals that follow an adapted Vancouver style)
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/medicina-clinica
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Laura Casares
      email: l.casares@elsevier.com
      uri: http://www.mendeley.com/profiles/laura-casares5/
    links:
    - href: http://www.zotero.org/styles/medicina-clinica
      rel: self
    - href: http://www.elsevier.es/es-revista-medicina-clinica-2-normas-publicacion#69000
      rel: documentation
options:
  substitute: editor-translator-long
  processing: numeric
  contributors: numeric-compact
  dates: long
  page-range-format: minimal
citation:
  template-ref: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
      remove:
        - match:
            date: issued
    article-magazine:
      remove:
        - match:
            date: issued
    chapter:
      modify:
        - match:
            number: pages
          label-form: short
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
          before:
            title: parent-serial
    entry-encyclopedia:
      remove:
        - match:
            date: issued
    paper-conference:
      modify:
        - match:
            number: pages
          label-form: short
    patent:
    - number: citation-number
      suffix: .
    - contributor: author
      form: long
      sort-separator: " "
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
    - date: issued
      form: year
    - term: no-date
      form: short
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 6
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - date: issued
    form: year
  - number: volume
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - number: pages
    prefix: ":"
