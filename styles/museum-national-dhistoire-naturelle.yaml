info:
  title: Muséum national d'Histoire naturelle
  fields:
  - biology
  - botany
  - anthropology
  - geology
  - zoology
  source:
    csl-id: http://www.zotero.org/styles/museum-national-dhistoire-naturelle
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Gilberto MARANI
      email: gilberto.marani@mnhn.fr
    links:
    - href: http://www.zotero.org/styles/museum-national-dhistoire-naturelle
      rel: self
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
      - key: year
        ascending: true
      - key: author
        ascending: true
    group:
      template:
      - year
      - author
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: .
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    and: symbol
    delimiter-precedes-last: never
    demote-non-dropping-particle: never
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
  - date: issued
    form: year
    prefix: " "
  wrap:
    punctuation: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: .
      delimiter-precedes-last: never
      sort-separator: " "
    separator: ". "
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
                emph: true
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    entry-encyclopedia:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    prefix: " "
  - title: primary
    prefix: ". — "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - group:
    - number: volume
    - number: issue
  - variable: publisher
  - number: pages
  - variable: doi
  - variable: publisher-place
  sort:
    template:
    - key: author
      ascending: true
    - key: issued
      ascending: false
