info:
  title: Springer - NLM/Vancouver (name-year)
  description: This style based on the NLM guidelines Citing Medicine is very similar to Vancouver and is used by a number of Springer publications.
  source:
    csl-id: http://www.zotero.org/styles/springer-vancouver-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-vancouver-author-date
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: https://dam.springernature.com/file/B_t9Fl7P4_H9Ql1p8hqnAP/*/Key+Style+Points_Aug_2023.pdf?authcred=Q29weVVSTDpDMHB5X1VSTA==
      rel: documentation
options:
  substitute: editor-long
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
      - key: author
        ascending: true
      - key: year
        ascending: false
    group:
      template:
      - author
      - year
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 7
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
  - date: issued
    form: year
    prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
