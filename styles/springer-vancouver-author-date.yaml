      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - group:
      - number: volume
      - number: issue
        wrap: parentheses
    - number: pages
      prefix: ":"
    - variable: url
