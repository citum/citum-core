info:
  title: American Geophysical Union
  description: The American Geophysical Union generic style
  fields:
  - geology
  source:
    csl-id: http://www.zotero.org/styles/american-geophysical-union
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      email: julian.onions@gmail.com
    - name: Simon Kornblith
      email: simon@simonster.com
    links:
    - href: http://www.zotero.org/styles/american-geophysical-union
      rel: self
    - href: http://www.zotero.org/styles/apa
      rel: template
    - href: http://publications.agu.org/brief-guide-agu-style-grammar/
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
    overrides:
      report: []
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ". "
    shorten:
      min: 8
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: numeric
  titles: humanities
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  type-variants:
    personal_communication:
    - contributor: author
      form: short
      shorten: &id001
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      prefix: "pp. "
    - date: issued
      form: year
      prefix: ", "
    - variable: locator
      prefix: ", "
  template:
  - contributor: author
    form: short
    shorten: *id001
  - date: issued
    form: year
    prefix: ", "
  - variable: locator
    prefix: ", "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 8
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
    hanging-indent: true
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten: &id002
        min: 8
        use-first: 6
    - date: issued
      form: year
      prefix: " "
    - title: primary
    - prefix: ". In "
      group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - number: pages
      prefix: ", "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: doi
      prefix: https://doi.org/
    - variable: url
