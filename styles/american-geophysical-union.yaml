info:
  title: American Geophysical Union
  description: The American Geophysical Union generic style
  fields:
    - geology
  source:
    csl-id: http://www.zotero.org/styles/american-geophysical-union
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
      - name: Julian Onions
        email: julian.onions@gmail.com
      - name: Simon Kornblith
        email: simon@simonster.com
    links:
      - href: http://www.zotero.org/styles/american-geophysical-union
        rel: self
      - href: http://www.zotero.org/styles/apa
        rel: template
      - href: http://publications.agu.org/brief-guide-agu-style-grammar/
        rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
    overrides:
      report: []
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: '. '
    shorten:
      min: 8
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ', '
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ', '
  dates: numeric
  titles: humanities
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: '. '
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ', '
  type-variants:
    personal_communication:
      modify:
        - match:
            contributor: author
          prefix: 'pp. '
  template:
    - contributor: author
      form: short
    - date: issued
      form: year
      prefix: ', '
    - variable: locator
      prefix: ', '
  wrap:
    punctuation: parentheses
  delimiter: '. '
  multi-cite-delimiter: '; '
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: '. '
      shorten:
        min: 8
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ', '
      delimiter-precedes-last: always
      sort-separator: ', '
    hanging-indent: true
    separator: '. '
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
    article-magazine:
      remove:
        - match:
            date: issued
    article-newspaper:
      remove:
        - match:
            date: issued
    broadcast:
      remove:
        - match:
            date: issued
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
          wrap:
            punctuation: parentheses
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
                emph: true
      add:
        - component:
            prefix: '. In '
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'In '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    entry-encyclopedia:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    interview:
      - contributor: author
        form: long
        name-order: family-first
      - date: issued
        form: year-month-day
        wrap:
          punctuation: parentheses
        prefix: ' '
      - title: primary
        prefix: '. '
      - variable: medium
        wrap:
          punctuation: brackets
        prefix: ' '
      - variable: url
        prefix: '. Retrieved from '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
          wrap:
            punctuation: parentheses
    patent:
      - contributor: author
        form: long
        name-order: family-first
        and: symbol
      - date: issued
        form: year-month-day
        wrap:
          punctuation: parentheses
        prefix: ' '
      - number: patent-number
        prefix: '. '
    personal_communication:
      remove:
        - match:
            date: issued
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - date: issued
      form: year
      prefix: ' '
    - title: primary
    - prefix: '. In '
      group:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - group:
        - number: volume
        - number: issue
          wrap:
            punctuation: parentheses
    - number: pages
      prefix: ', '
    - variable: publisher-place
    - variable: publisher
      prefix: ': '
    - variable: doi
    - variable: url
