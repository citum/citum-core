info:
  title: ASA Style Guide 6th/7th edition
  description: The ASA style following the 6th/7th edition of the Style Guide (reference formatting is the same for both editions).
  fields:
  - sociology
  source:
    csl-id: http://www.zotero.org/styles/american-sociological-association
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      email: julian.onions@gmail.com
    links:
    - href: http://www.zotero.org/styles/american-sociological-association
      rel: self
    - href: https://www.asanet.org/publications/journals/asa-style-guide/
      rel: documentation
    - href: https://owl.purdue.edu/owl/research_and_citation/asa_style/index.html
      rel: documentation
options:
  locators: note
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
    - title
    overrides:
      report: []
  contributors:
    display-as-sort: first
    name-form: initials
    initialize-with: ". "
    shorten:
      min: 4
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: numeric
  titles: humanities
  page-range-format: chicago
  punctuation-in-quote: true
citation:
  options:
    processing:
      disambiguate:
        names: false
        add-givenname: false
        year-suffix: true
    contributors:
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 4
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
  - contributor: author
    form: short
    name-order: family-first
    shorten:
      min: 4
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
  - date: issued
    form: year
    prefix: " "
  - variable: locator
    prefix: ":"
  wrap:
    punctuation: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: first
      name-form: initials
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  type-variants:
    article-magazine:
      remove:
        - match:
            group:
              - number: volume
              - number: issue
                wrap:
                  punctuation: parentheses
      add:
        - component:
            group:
              - number: volume
          before:
            number: pages
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
  - title: primary
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - number: pages
    prefix: ":"
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - variable: doi
