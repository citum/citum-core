info:
  title: Springer - MathPhys (numeric, brackets)
  description: This style is used by a number of Springer publications.
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/springer-mathphys-brackets
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-mathphys-brackets
      rel: self
    - href: http://www.zotero.org/styles/springer-lecture-notes-in-computer-science
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: .
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: .
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: ": "
    - title: parent-monograph
    - title: parent-serial
    - number: pages
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - variable: url
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - variable: doi
      prefix: https://doi.org/
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: ": "
    - title: parent-monograph
    - title: parent-serial
    - number: pages
      prefix: "pp. "
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - variable: url
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - variable: doi
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: ": "
    - title: parent-monograph
    - title: parent-serial
    - number: pages
      prefix: "pp. "
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - variable: url
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - variable: doi
    entry-encyclopedia:
    - number: citation-number
      suffix: ". "
    - contributor: author
      form: long
      sort-separator: ", "
    - title: primary
    - variable: url
    - date: issued
      form: year
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: ": "
  - title: parent-monograph
  - title: parent-serial
  - number: pages
  - variable: publisher
  - variable: publisher-place
    prefix: ", "
  - variable: url
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
    prefix: " "
  - variable: doi
