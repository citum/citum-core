      - number: volume
      - number: issue
    - variable: publisher-place
      prefix: ", "
    - number: pages
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: given-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
