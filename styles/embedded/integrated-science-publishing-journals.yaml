info:
  title: Integrated Science Publishing journals
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/integrated-science-publishing-journals
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: B S Chhikara
      email: bschhikara@gmail.com
    links:
    - href: http://www.zotero.org/styles/integrated-science-publishing-journals
      rel: self
    - href: http://pubs.iscience.in/authors
      rel: documentation
options:
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: .
    shorten:
      min: 11
      use-first: 10
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates: long
  titles: journal-emphasis
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: .
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
    entry-suffix: .
    separator: ". "
  type-variants:
    article-magazine:
    - contributor: author
      form: long
      name-order: given-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
      prefix: "; "
    - date: issued
      form: year
      prefix: ", "
    - prefix: ", "
      group:
      - number: volume
    - variable: publisher-place
      prefix: ", "
    - number: pages
    chapter:
    - contributor: author
      form: long
      name-order: given-first
      shorten:
