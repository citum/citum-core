info:
  title: Taylor & Francis - National Library of Medicine (citation-sequence, brackets)
  description: 'NLM style as used by T & F : Brackets, no et-al, no issue numbers, locators in text possible as per Version 2.2 from 30 May 2023.'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/taylor-and-francis-national-library-of-medicine
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/taylor-and-francis-national-library-of-medicine
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence-brackets
      rel: template
    - href: https://files.taylorandfrancis.com/tf_NLM.pdf
      rel: documentation
options:
  substitute: editor-long
  processing: numeric
  contributors: numeric-medium
  dates: long
  locators:
    label-value-delimiter: ""
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  template:
  - number: citation-number
  - variable: locator
    prefix: ","
  wrap:
    punctuation: brackets
  delimiter: ""
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    - variable: url
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    - variable: url
    article-newspaper:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    - variable: url
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
        prefix: "on "
      - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
    - variable: url
    dataset:
