      use-first: 3
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
      shorten:
        min: 4
        use-first: 3
    - title: parent-monograph
  - title: parent-serial
  - date: issued
    form: year
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - variable: publisher-place
