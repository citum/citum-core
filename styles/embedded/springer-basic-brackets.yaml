      prefix: " "
    - title: primary
      prefix: " "
    - delimiter: " "
      group:
      - prefix: "In: "
        contributor: editor
        form: long
        name-order: family-first
      - title: parent-monograph
    - title: parent-serial
    - delimiter: ", "
      group:
      - variable: publisher
