info:
  title: Future Medicine journals
  fields:
  - medicine
  - biology
  source:
    csl-id: http://www.zotero.org/styles/future-medicine
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Bien
    links:
    - href: http://www.zotero.org/styles/future-medicine
      rel: self
    - href: http://www.zotero.org/styles/journal-of-applied-pharmaceutical-research
      rel: template
    - href: https://www.futuremedicine.com/authorguide/preparingyourarticle
      rel: documentation
    - href: 
        https://www.futuremedicine.com/pb-assets/Future-Medicine-Author-Guidelines-1585216135307.pdf
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    and: none
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: numeric
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  bibliography:
    entry-suffix: .
    separator: ". "
citation:
  template:
  - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-et-al: never
      sort-separator: " "
  type-variants:
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten: &id001
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - items:
      - number: volume
    - contributor: editor
      form: verb
      name-order: family-first
    - number: pages
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    patent:
    - number: citation-number
    - contributor: author
      form: long
      sort-separator: " "
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
    - number: number
    - date: issued
      form: year
      wrap: parentheses
    thesis:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - contributor: editor
      form: verb
      name-order: family-first
    - number: pages
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    entry-encyclopedia:
    - number: citation-number
    - contributor: author
      form: long
      sort-separator: " "
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
    - title: primary
    - variable: publisher
    - variable: publisher-place
    - date: issued
      form: year
      wrap: parentheses
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten: *id001
  - title: primary
    prefix: " "
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - variable: publisher
  - variable: publisher-place
    prefix: ", "
  - items:
    - number: volume
    - number: issue
      wrap: parentheses
  - contributor: editor
    form: verb
    name-order: family-first
  - number: pages
  - date: issued
    form: year
    wrap: parentheses
    prefix: " "
