info:
  title: BioMed Central
  fields:
  - medicine
  - biology
  source:
    csl-id: http://www.zotero.org/styles/biomed-central
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Robert M Flight
      email: rflight79@gmail.com
    links:
    - href: http://www.zotero.org/styles/biomed-central
      rel: self
    - href: http://bmcbioinformatics.biomedcentral.com/submission-guidelines/preparing-your-manuscript/research-article
      rel: documentation
options:
  substitute:
    template:
    - editor
  processing: numeric
  contributors: numeric-compact
  dates: numeric
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  extends: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ":"
    - number: pages
      prefix: ":"
    - variable: doi
      prefix: https://doi.org/
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: pages
      prefix: ":"
    - variable: doi
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
    - number: volume
    - number: issue
      prefix: ":"
    - number: pages
      prefix: "pp. "
    - variable: doi
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ":"
    - number: pages
      prefix: ":"
    - variable: doi
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
    - number: volume
    - number: issue
      prefix: ":"
    - number: pages
      prefix: "pp. "
    - variable: doi
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    webpage:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - date: issued
      form: year
      suffix: ". "
    - variable: url
    - date: accessed
      form: month-day
      prefix: "Accessed "
    - date: accessed
      form: year
      prefix: " "
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 6
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - date: issued
    form: year
  - number: volume
  - number: issue
    prefix: ":"
  - number: pages
    prefix: ":"
  - variable: doi
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
