info:
  title: BioMed Central
  fields:
  - medicine
  - biology
  source:
    csl-id: http://www.zotero.org/styles/biomed-central
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Robert M Flight
      email: rflight79@gmail.com
    links:
    - href: http://www.zotero.org/styles/biomed-central
      rel: self
    - href: http://bmcbioinformatics.biomedcentral.com/submission-guidelines/preparing-your-manuscript/research-article
      rel: documentation
options:
  substitute:
    template:
    - editor
  processing: numeric
  contributors: numeric-compact
  dates: numeric
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  template-ref: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
      remove:
        - match:
            date: issued
    article-magazine:
      remove:
        - match:
            date: issued
        - match:
            number: issue
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
          before:
            title: parent-serial
    entry-encyclopedia:
      remove:
        - match:
            date: issued
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    webpage:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - date: issued
      form: year
      suffix: ". "
    - variable: url
    - date: accessed
      form: month-day
      prefix: "Accessed "
    - date: accessed
      form: year
      prefix: " "
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 6
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - date: issued
    form: year
  - number: volume
  - number: issue
    prefix: ":"
  - number: pages
    prefix: ":"
  - variable: doi
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
