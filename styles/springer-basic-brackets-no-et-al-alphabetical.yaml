preset: springer-basic-brackets
info:
  title: Springer - Basic (numeric, brackets, no "et al.", alphabetical)
  id: http://www.zotero.org/styles/springer-basic-brackets-no-et-al-alphabetical
  default-locale: en-US
options:
  substitute: editor-translator-short
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ''
    shorten:
      min: 5
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ', '
    and: none
    delimiter-precedes-last: always
    sort-separator: ' '
  dates: short
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ''
      delimiter: ', '
      delimiter-precedes-last: always
      sort-separator: ' '
    separator: '. '
  type-variants:
    chapter:
      - contributor: author
        form: long
        name-order: family-first
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
        prefix: ' '
      - title: primary
        prefix: ' '
      - variable: publisher-place
      - group:
          - contributor: editor
            form: verb
            name-order: given-first
            prefix: 'on '
          - title: parent-monograph
      - title: parent-serial
      - number: volume
      - number: issue
        prefix: ':'
      - variable: publisher
      - number: pages
        prefix: ', pp '
      - variable: doi
    patent:
      - contributor: author
        form: long
        name-order: family-first
      - date: issued
        form: year
        prefix: ' '
        wrap:
          punctuation: parentheses
      - title: primary
        prefix: ' '
      - number: number
    legal_case:
      - number: citation-number
        suffix: '. '
      - contributor: author
        form: long
        sort-separator: ' '
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - title: primary
      - variable: authority
      - variable: publisher
      - variable: publisher-place
      - title: parent-serial
    webpage:
      - number: citation-number
        suffix: '. '
      - contributor: author
        form: long
        sort-separator: ' '
        name-order: family-first
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
      - title: primary
        suffix: '. '
      - variable: url
        suffix: '. '
      - term: accessed
        form: long
        suffix: ': '
      - date: accessed
        form: month-day
        suffix: ' '
      - date: accessed
        form: year
  template:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: ' '
    - title: primary
      prefix: ' '
    - variable: publisher-place
    - group:
        - contributor: editor
          form: verb
          name-order: given-first
        - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ':'
    - variable: publisher
    - number: pages
      prefix: ', pp '
    - variable: doi
  sort: author-date-title
