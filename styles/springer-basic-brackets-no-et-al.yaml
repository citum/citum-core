!custom 
preset: springer-basic-author-date
info: !custom 
  title: Springer - Basic (numeric, brackets, no "et al.")
  description: Springer Numbered Style for the disciplines Medicine, Biomedicine, Life Sciences, Chemistry, Geosciences, Computer Science, Engineering, Economics. This style is based on Harvard style and recommendations of the Council of Biology Editors.
  source: !custom 
    csl-id: http://www.zotero.org/styles/springer-basic-brackets-no-et-al
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors: !custom 
      '0': !custom 
        name: Charles Parnot
        email: charles.parnot@gmail.com
        uri: http://twitter.com/cparnot
    links: !custom 
      '0': !custom 
        href: http://www.zotero.org/styles/springer-basic-brackets-no-et-al
        rel: self
      '1': !custom 
        href: http://www.zotero.org/styles/springer-basic-author-date
        rel: template
      '2': !custom 
        href: http://www.springer.com/cda/content/document/cda_downloaddocument/instruct-authors-e.pdf
        rel: documentation
      '3': !custom 
        href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
        rel: documentation
      '4': !custom 
        href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
        rel: documentation
options: !custom 
  substitute: !custom 
    template: !custom 
      '0': editor
      '1': translator
  processing: numeric
  contributors: !custom 
    display-as-sort: all
    name-form: initials
    initialize-with: ''
    delimiter: ', '
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ' '
  dates: !custom 
    month: short
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
citation: !custom 
  template: !custom 
    '0': !custom 
      number: citation-number
  wrap: !custom 
    punctuation: brackets
  multi-cite-delimiter: ', '
bibliography: !custom 
  options: !custom 
    contributors: !custom 
      display-as-sort: all
      name-form: initials
      initialize-with: ''
      delimiter: ', '
      delimiter-precedes-last: always
      sort-separator: ' '
    separator: '. '
  type-variants: !custom 
    article-journal: !custom 
      '0': !custom 
        contributor: author
        form: long
        name-order: family-first
      '1': !custom 
        date: issued
        form: year
        wrap: !custom 
          punctuation: parentheses
        prefix: ' '
      '2': !custom 
        title: primary
        prefix: ' '
      '3': !custom 
        group: !custom 
          '0': !custom 
            contributor: editor
            form: verb
            name-order: given-first
          '1': !custom 
            title: parent-monograph
      '4': !custom 
        title: parent-serial
      '5': !custom 
        number: volume
      '6': !custom 
        number: issue
        prefix: ':'
      '7': !custom 
        variable: publisher
      '8': !custom 
        number: pages
        prefix: ', pp '
      '9': !custom 
        variable: doi
        prefix: https://doi.org/
      '10': !custom 
        variable: publisher-place
        prefix: ', '
    article-magazine: !custom 
      '0': !custom 
        contributor: author
        form: long
        name-order: family-first
      '1': !custom 
        date: issued
        form: year
        wrap: !custom 
          punctuation: parentheses
        prefix: ' '
      '2': !custom 
        title: primary
        prefix: ' '
      '3': !custom 
        group: !custom 
          '0': !custom 
            contributor: editor
            form: verb
            name-order: given-first
          '1': !custom 
            title: parent-monograph
      '4': !custom 
        title: parent-serial
      '5': !custom 
        number: volume
      '6': !custom 
        variable: publisher
      '7': !custom 
        number: pages
        prefix: ', pp '
      '8': !custom 
        variable: doi
      '9': !custom 
        variable: publisher-place
        prefix: ', '
    chapter: !custom 
      '0': !custom 
        contributor: author
        form: long
        name-order: family-first
      '1': !custom 
        date: issued
        form: year
        wrap: !custom 
          punctuation: parentheses
        prefix: ' '
      '2': !custom 
        title: primary
        prefix: ' '
      '3': !custom 
        group: !custom 
          '0': !custom 
            contributor: editor
            form: verb
            name-order: given-first
            prefix: 'on '
          '1': !custom 
            title: parent-monograph
      '4': !custom 
        title: parent-serial
      '5': !custom 
        number: volume
      '6': !custom 
        number: issue
        prefix: ':'
      '7': !custom 
        variable: publisher
      '8': !custom 
        number: pages
        prefix: ', pp '
      '9': !custom 
        variable: doi
      '10': !custom 
        variable: publisher-place
        prefix: ', '
  template: !custom 
    '0': !custom 
      contributor: author
      form: long
      name-order: family-first
    '1': !custom 
      date: issued
      form: year
      wrap: !custom 
        punctuation: parentheses
      prefix: ' '
    '2': !custom 
      title: primary
      prefix: ' '
    '3': !custom 
      group: !custom 
        '0': !custom 
          contributor: editor
          form: verb
          name-order: given-first
        '1': !custom 
          title: parent-monograph
    '4': !custom 
      title: parent-serial
    '5': !custom 
      number: volume
    '6': !custom 
      number: issue
      prefix: ':'
    '7': !custom 
      variable: publisher
    '8': !custom 
      number: pages
      prefix: ', pp '
    '9': !custom 
      variable: doi
    '10': !custom 
      variable: publisher-place
      prefix: ', '
