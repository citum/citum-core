info:
  title: Springer - Basic (numeric, brackets, no "et al.")
  description: Springer Numbered Style for the disciplines Medicine, Biomedicine, Life Sciences, Chemistry, Geosciences, Computer Science, Engineering, Economics. This style is based on Harvard style and recommendations of the Council of Biology Editors.
  source:
    csl-id: http://www.zotero.org/styles/springer-basic-brackets-no-et-al
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-basic-brackets-no-et-al
      rel: self
    - href: http://www.zotero.org/styles/springer-basic-author-date
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/instruct-authors-e.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  substitute:
    template:
    - editor
    - translator
  processing: numeric
  strip-periods: true
  punctuation-in-quote: true
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ''
    delimiter: ', '
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ' '
  dates:
    month: short
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
citation:
  template:
  - number: citation-number
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ', '
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ''
      delimiter: ', '
      delimiter-precedes-last: always
      sort-separator: ' '
    hanging-indent: true
    entry-suffix: ""
    separator: '. '
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
    article-magazine:
      remove:
        - match:
            number: issue
    chapter:
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
          before:
            title: parent-serial
    webpage:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: ' '
    - title: primary
      prefix: ' '
    - variable: url
      prefix: '. '
    - date: accessed
      form: month-day
      prefix: '. Accessed '
    - date: accessed
      form: year
      prefix: ' '
    legal-case:
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
    - title: primary
      prefix: ' '
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
    prefix: ' '
  - title: primary
    prefix: ' '
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - number: volume
  - number: issue
    prefix: ':'
  - variable: publisher
  - number: pages
    prefix: ', pp '
  - variable: doi
  - variable: publisher-place
    prefix: ', '
