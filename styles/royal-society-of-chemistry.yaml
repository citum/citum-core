info:
  title: Royal Society of Chemistry
  description: The Royal Society of Chemistry journal style.
  fields:
  - chemistry
  source:
    csl-id: http://www.zotero.org/styles/royal-society-of-chemistry
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      email: julian.onions@gmail.com
    links:
    - href: http://www.zotero.org/styles/royal-society-of-chemistry
      rel: self
    - href: http://www.rsc.org/learn-chemistry/resource/download/res00001664/cmp00004956/pdf
      rel: documentation
    - href: http://www.rsc.org/journals-books-databases/journal-authors-reviewers/prepare-your-article/#format-layout
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
citation:
  template:
  - number: citation-number
  collapse: citation-number
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: never
    article-journal:
      no-page-fallback: doi
    entry-suffix: .
    separator: ", "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: given-first
    - title: parent-serial
      emph: true
    - date: issued
      form: year
    - number: volume
    - number: pages
    - variable: doi
      prefix: "DOI:"
    article-magazine:
      remove:
        - match:
            title: primary
    article-newspaper:
      remove:
        - match:
            title: primary
    broadcast:
      remove:
        - match:
            title: primary
    chapter:
      extends: article-magazine
      modify:
        - match:
            number: pages
          prefix: 'pp. '
      remove:
        - match:
            variable: publisher
      add:
        - component:
            contributor: editor
            form: short
            name-order: given-first
            prefix: ', editors. '
          before:
            variable: publisher-place
    dataset:
    - delimiter: none
      group:
      - number: citation-number
      - contributor: author
        form: long
        name-order: given-first
        and: text
    - date: issued
      form: year
    entry-encyclopedia:
      extends: article-magazine
      remove:
        - match:
            variable: publisher
    interview:
      remove:
        - match:
            title: primary
    paper-conference:
      extends: chapter
      remove:
        - match:
            contributor: editor
    personal_communication:
      remove:
        - match:
            title: primary
    standard:
    - delimiter: none
      group:
      - number: citation-number
      - date: issued
        form: year
    thesis:
    - delimiter: none
      group:
      - number: citation-number
      - contributor: author
        form: long
        name-order: given-first
    - variable: genre
    - variable: publisher
    - date: issued
      form: year
    webpage:
    - number: citation-number
    - contributor: author
      form: long
      and: text
    - title: primary
    - variable: url
    - term: accessed
      form: long
    - date: accessed
      form: full
    legal_case:
    - delimiter: none
      group:
      - number: citation-number
      - title: primary
        emph: true
    - date: issued
      form: year
    - number: volume
      prefix: "vol. "
    patent:
    - delimiter: none
      group:
      - number: citation-number
      - variable: authority
    - number: number
    - title: parent-serial
      emph: true
    - date: issued
      form: year
    - number: volume
    - number: pages
  template:
  - contributor: author
    form: long
    name-order: given-first
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - variable: publisher
  - date: issued
    form: year
  - number: volume
  - number: pages
  - title: primary
    emph: true
  - variable: publisher-place
