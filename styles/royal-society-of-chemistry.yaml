info:
  title: Royal Society of Chemistry
  description: The Royal Society of Chemistry journal style.
  fields:
  - chemistry
  source:
    csl-id: http://www.zotero.org/styles/royal-society-of-chemistry
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      email: julian.onions@gmail.com
    links:
    - href: http://www.zotero.org/styles/royal-society-of-chemistry
      rel: self
    - href: http://www.rsc.org/learn-chemistry/resource/download/res00001664/cmp00004956/pdf
      rel: documentation
    - href: http://www.rsc.org/journals-books-databases/journal-authors-reviewers/prepare-your-article/#format-layout
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
  processing: numeric
  contributors:
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  bibliography:
    entry-suffix: .
    separator: ", "
citation:
  template:
    - number: citation-number
  collapse: citation-number
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: never
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - date: issued
      form: year
    - number: volume
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
    - title: primary
      emph: true
      overrides:
        article-journal:
          suppress: true
        article-magazine:
          suppress: true
        article-newspaper:
          suppress: true
        chapter:
          suppress: true
        paper-conference:
          suppress: true
        thesis:
          suppress: true
        dataset:
          suppress: true
        standard:
          suppress: true
    - contributor: editor
      form: short
      name-order: given-first
      prefix: ", editors. "
      suppress: true
      overrides:
        chapter:
          suppress: false
    - variable: publisher-place
      overrides:
        dataset:
          suppress: true
        standard:
          suppress: true
  type-templates:
    dataset:
      - items:
          - number: citation-number
          - contributor: author
            form: long
            name-order: given-first
            and: text
        delimiter: none
      - date: issued
        form: year
    standard:
      - items:
          - number: citation-number
          - date: issued
            form: year
        delimiter: none
    webpage:
      - number: citation-number
      - contributor: author
        form: long
        and: text
      - title: primary
      - variable: url
      - term: accessed
        form: long
      - date: accessed
        form: full
    legal_case:
      - number: citation-number
      - contributor: author
        form: long
        and: text
      - title: primary
        overrides:
          song:
            emph: true
          bill:
            emph: true
          legal_case:
            emph: true
          motion_picture:
            emph: true
          book:
            emph: true
          graphic:
            emph: true
          legislation:
            emph: true
          report:
            emph: true
      - variable: authority
      - variable: publisher
      - variable: publisher-place
      - number: edition
      - date: issued
        form: year
      - number: volume
        prefix: "vol. "
        suppress: true
    patent:
      - items:
          - number: citation-number
          - variable: authority
        delimiter: none
      - number: number
      - title: parent-serial
        emph: true
      - date: issued
        form: year
      - number: volume
      - number: pages
