info:
  title: Integrated Science Publishing journals
  fields:
  - science
  source:
    csl-id: http://www.zotero.org/styles/integrated-science-publishing-journals
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: B S Chhikara
      email: bschhikara@gmail.com
    links:
    - href: http://www.zotero.org/styles/integrated-science-publishing-journals
      rel: self
    - href: http://pubs.iscience.in/authors
      rel: documentation
options:
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: .
    shorten:
      min: 11
      use-first: 10
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates: long
  titles: journal-emphasis
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  extends: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: .
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
    entry-suffix: .
    separator: ". "
  type-variants:
    article-magazine:
      remove:
        - match:
            group:
              - number: volume
              - number: issue
      add:
        - component:
            prefix: ', '
            group:
              - number: volume
          before:
            variable: publisher-place
    chapter:
      remove:
        - match:
            date: issued
    entry-encyclopedia:
      remove:
        - match:
            date: issued
    paper-conference:
      remove:
        - match:
            date: issued
    personal_communication:
      modify:
        - match:
            contributor: author
          prefix: 'pp. '
    webpage:
    - number: citation-number
      suffix: ". "
    - contributor: author
      form: long
      shorten:
        min: 6
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
    - variable: url
    - date: accessed
      form: year
      prefix: "(accessed "
      suffix: )
    patent:
      extends: webpage
      remove:
        - match:
            variable: url
        - match:
            date: accessed
      add:
        - component:
            date: issued
            form: full
          after:
            title: primary
  template:
  - contributor: author
    form: long
    name-order: given-first
    shorten:
      min: 8
      use-first: 3
  - title: primary
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - contributor: editor
    form: verb
    name-order: family-first
  - variable: publisher
    prefix: "; "
  - date: issued
    form: year
    prefix: ", "
  - prefix: ", "
    group:
    - number: volume
    - number: issue
  - variable: publisher-place
    prefix: ", "
  - number: pages
