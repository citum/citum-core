info:
  title: Association for Computing Machinery
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/association-for-computing-machinery
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
      email: obrienpat86@gmail.com
    links:
    - href: http://www.zotero.org/styles/association-for-computing-machinery
      rel: self
    - href: http://www.zotero.org/styles/acm-sigchi-proceedings
      rel: template
    - href: https://www.acm.org/publications/authors/reference-formatting
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors:
    delimiter: ", "
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles: humanities
  bibliography:
    separator: ". "
  punctuation-in-quote: true
citation:
  template:
    - number: citation-number
    - variable: locator
      prefix: ":"
      show-label: false
  wrap: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      delimiter: ", "
      sort-separator: ", "
  template:
    - contributor: author
      form: long
      name-order: given-first
    - date: issued
      form: year
    - title: primary
    - items:
        - contributor: editor
          form: verb
          overrides:
            book:
              prefix: "on "
          name-order: given-first
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: volume
    - number: pages
      prefix: ", "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: publisher-place
      prefix: ", "
    - variable: url