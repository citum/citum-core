version: ""
info:
  title: Association for Computing Machinery
  id: http://www.zotero.org/styles/association-for-computing-machinery
  default-locale: en-US
options:
  locators: note
  substitute: editor-translator-short
  processing: numeric
  contributors:
    delimiter: ", "
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  punctuation-in-quote: true
citation:
  template:
  - number: citation-number
  - variable: locator
    prefix: ":"
  wrap: brackets
  delimiter: ""
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      delimiter: ", "
      sort-separator: ", "
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: given-first
    - date: issued
      form: year
    - title: primary
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: doi
      prefix: https://doi.org/
    - variable: publisher-place
      prefix: ", "
    - number: volume
    - variable: url
    book:
    - contributor: author
      form: long
      name-order: given-first
    - date: issued
      form: year
    - title: primary
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: doi
    - variable: publisher-place
      prefix: ", "
    - number: volume
    - variable: url
    patent:
    - contributor: author
      form: long
      name-order: given-first
    - date: issued
      form: year
    - title: primary
    - number: number
    legal_case:
    - number: citation-number
      wrap: brackets
    - date: issued
      form: year
      suffix: ". "
    - title: primary
  template:
  - contributor: author
    form: long
    name-order: given-first
  - date: issued
    form: year
  - title: primary
  - items:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - variable: publisher
  - number: pages
    prefix: ", "
  - variable: doi
  - variable: publisher-place
    prefix: ", "
  - number: volume
  - variable: url
  sort: author-date-title
