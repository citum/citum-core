info:
  title: ACS Biochemistry (Compound)
  description: >
    Style for the ACS journal Biochemistry with compound citation support.
    Distinctive from base ACS: year appears in parentheses immediately
    after author list, before the title. Superscript citation numbers
    without brackets.
  fields:
  - chemistry
  - biology
  source:
    csl-id: http://www.zotero.org/styles/biochemistry
    adapted-by: citum-create

    license: http://creativecommons.org/licenses/by-sa/3.0/
    links:
    - href: http://www.zotero.org/styles/biochemistry
      rel: self
    - href: http://pubs.acs.org/paragonplus/submission/bichaw/bichaw_authguide.pdf
      rel: documentation
options:
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
citation:
  use-preset: numeric-citation
  wrap: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      delimiter: ", "
      delimiter-precedes-last: always
    entry-suffix: .
    separator: ". "
    compound-numeric:
      collapse-subentries: true
      sub-label: alphabetic
      sub-label-suffix: ")"
      sub-delimiter: " "
      subentry: true
  type-variants:
    article-journal:
    - number: citation-number
      wrap: parentheses
      suffix: " "
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
      suffix: "."
    - title: primary
      prefix: " "
      suffix: "."
    - title: parent-serial
      emph: true
      prefix: " "
    - title: parent-monograph
      emph: true
      prefix: ", in "
    - contributor: editor
      form: short
      name-order: given-first
      prefix: " ("
      suffix: ")"
    - number: edition
      prefix: ", "
    - number: volume
      emph: true
      prefix: " "
    - number: pages
      prefix: ", "
    book:
    - number: citation-number
      wrap: parentheses
      suffix: " "
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
      suffix: "."
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
      prefix: ", in "
    - contributor: editor
      form: short
      name-order: given-first
      prefix: " ("
      suffix: ")"
    - number: edition
      prefix: ", "
    - variable: publisher
      prefix: "; "
    - variable: publisher-place
      prefix: ", "
    - number: volume
      emph: true
      prefix: " "
    - number: pages
      prefix: ", "
    chapter:
