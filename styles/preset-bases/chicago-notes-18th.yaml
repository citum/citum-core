        min: 8
        use-first: 3
        and-others: et-al
    - title: primary
      prefix: ", "
    - contributor: translator
      form: long
      prefix: ", trans. "
    - items:
      - title: parent-serial
        prefix: ", "
      - variable: publisher-place
        wrap: parentheses
        prefix: " "
      - number: volume
        prefix: " "
      - number: issue
        prefix: ", no. "
      - date: issued
        form: year
        wrap: parentheses
        prefix: " "
      - number: pages
        prefix: ": "
      delimiter: ""
    - variable: locator
      prefix: ", "
    article-magazine:
