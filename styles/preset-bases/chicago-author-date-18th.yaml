info:
  title: Chicago Manual of Style 18th edition (author-date)
  description: Chicago-style source citations (with Bluebook for legal citations), author-date system
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - law
  - linguistics
  - literature
  - philosophy
  - science
  - sociology
  - theology
  source:
    csl-id: http://www.zotero.org/styles/chicago-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/chicago-author-date
      rel: self
    - href: http://www.zotero.org/styles/chicago-notes-bibliography
      rel: template
    - href: https://www.chicagomanualofstyle.org/
      rel: documentation
  short-name: "Chicago Author-Date"
  edition: "18th edition"
options:
  locators: note
  processing:
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
    sort:
      template:
      - key: author
        ascending: true
      - key: year
        ascending: true
  contributors:
    and: text
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates: long
  titles:
    component: {}
    monograph:
      text-case: title
      emph: true
    container-monograph:
      text-case: title
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: chicago16
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  type-variants:
    personal_communication:
    - contributor: author
      form: short
      shorten: &id001
        min: 3
        use-first: 1
        and-others: et-al
    - variable: locator
      prefix: ", "
  template:
  - contributor: author
    form: short
    shorten: *id001
  - date: issued
    form: year
  - variable: locator
    prefix: ", "
  wrap:
    punctuation: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  groups:
  - id: primary-sources
    heading:
      localized:
        en-US: Primary Sources
        en: Primary Sources
        de: Primärquellen
        de-DE: Primärquellen
    selector:
      field:
        note: primary
  - id: archival
    heading:
      localized:
        en-US: Archival Sources
        en: Archival Sources
        de: Archivalische Quellen
        de-DE: Archivalische Quellen
    selector:
      field:
        note: archival
  - id: secondary
    heading:
      localized:
        en-US: Secondary Sources
        en: Secondary Sources
        de: Sekundärquellen
        de-DE: Sekundärquellen
    selector:
      not:
        field:
          note:
          - primary
          - archival
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten: &id002
        min: 8
        use-first: 3
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - items: &id003
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
    - number: pages
      prefix: ": "
    - variable: publisher
    - variable: doi
      prefix: https://doi.org/
    - variable: url
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id002
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - items: *id003
    - title: parent-serial
      emph: true
    - items:
      - number: volume
    - number: pages
      prefix: ": "
    - variable: publisher
    - variable: doi
    - variable: url
    book:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id002
    - date: issued
      form: year
    - title: primary
    - items: *id003
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
    - variable: publisher
    - variable: doi
    - variable: url
    broadcast:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id002
    - date: issued
      form: year
    - title: primary
    - items: *id003
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
    - number: pages
      prefix: ": "
    - variable: publisher
    - variable: doi
    - variable: url
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id002
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - items: *id003
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
    - variable: publisher
    - variable: doi
    - variable: url
    legal-case:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id002
    - date: issued
      form: year
    - title: primary
      emph: true
    - items: *id003
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
    - number: pages
      prefix: ": "
    - variable: publisher
    - variable: doi
    - variable: url
    motion-picture:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id002
    - date: issued
      form: year
    - title: primary
    - items: *id003
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
    - number: pages
      prefix: ": "
    - variable: publisher
    - variable: doi
    - variable: url
    patent:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
    - prefix: ". "
      delimiter: none
      group:
      - term: patent
        suffix: " "
      - number: number
      - date: issued
        form: full
        prefix: ", issued "
    report:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id002
    - date: issued
      form: year
    - title: primary
    - items: *id003
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
    - variable: publisher
    - variable: doi
    - variable: url
    thesis:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id002
    - date: issued
      form: year
    - title: primary
    - items: *id003
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
    - variable: publisher
    - variable: doi
    - variable: url
    personal-communication: []
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten: *id002
  - date: issued
    form: year
  - title: primary
    wrap:
      punctuation: quotes
  - items:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - items:
    - number: volume
    - number: issue
      prefix: " ("
      suffix: ")"
  - number: pages
    prefix: ": "
  - variable: publisher
  - variable: doi
  - variable: url
