options:
  processing: author-date
  substitute: standard
  contributors:
    name-form: initials
    initialize-with: ". "
    role: short-suffix
    demote-non-dropping-particle: never
    delimiter-precedes-last: always
    and: symbol
    shorten:
      min: 21
      use-first: 19
      use-last: 1
  dates: long
  titles:
    component:
      text-case: as-is
    monograph:
      text-case: as-is
      emph: true
    container-monograph:
      text-case: as-is
      emph: true
    periodical:
      emph: true
    serial:
      text-case: as-is
  multilingual:
    title-mode: combined
    name-mode: primary
    preferred-script: Latn
  page-range-format: expanded
  bibliography:
    hanging-indent: true
    separator: ". "
  punctuation-in-quote: true
