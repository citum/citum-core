preset: ieee
info:
  title: The Optical Society
  description: Common style use by OSA publications.
  fields:
    - physics
  source:
    csl-id: http://www.zotero.org/styles/the-optical-society
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
      - name: Barbara Williams
        email: bwilli@osa.org
    links:
      - href: http://www.zotero.org/styles/the-optical-society
        rel: self
      - href: http://www.zotero.org/styles/ieee
        rel: template
      - href: http://www.zotero.org/styles/american-physics-society
        rel: template
      - href: http://www.opticsinfobase.org/author/author.cfm
        rel: documentation
options:
  contributors: physics-numeric
  dates: long
citation:
  use-preset: numeric-citation
  prefix: "\_["
  suffix: ']'
  multi-cite-delimiter: ','
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: '. '
      delimiter: ', '
    entry-suffix: .
    separator: ', '
  type-variants:
    chapter:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        wrap:
          punctuation: quotes
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher
      - number: pages
        prefix: 'pp. '
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
        prefix: ' '
    paper-conference:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        wrap:
          punctuation: quotes
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher
      - number: pages
        prefix: 'pp. '
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
        prefix: ' '
    personal_communication:
      - contributor: author
        form: long
        name-order: given-first
        prefix: 'pp. '
      - title: parent-monograph
      - title: parent-serial
      - variable: publisher
      - number: pages
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
        prefix: ' '
    patent:
      - number: citation-number
        suffix: '. '
      - contributor: author
        form: long
        and: text
      - title: primary
        prefix: '"'
        suffix: '," '
      - date: issued
        form: year
      - term: no-date
        form: short
  template:
    - contributor: author
      form: long
      name-order: given-first
    - title: primary
      wrap:
        punctuation: quotes
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - number: pages
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: ' '
