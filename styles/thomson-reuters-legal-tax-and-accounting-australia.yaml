info:
  title: Thomson Reuters - Legal, Tax & Accounting Australia
  description: Style for a series of Thomson Reuters law publications for Australia
  fields:
  - law
  source:
    csl-id: http://www.zotero.org/styles/thomson-reuters-legal-tax-and-accounting-australia
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/thomson-reuters-legal-tax-and-accounting-australia
      rel: self
    - href: http://www.zotero.org/styles/australian-guide-to-legal-citation
      rel: template
    - href: 
        https://forums.zotero.org/discussion/4841/new-australian-legal-citation-style/?Focus=20831#Comment_20831
      rel: documentation
options:
  substitute: editor-translator-short
  processing: note
  contributors:
    name-form: initials
    initialize-with: ""
    shorten:
      min: 20
      use-first: 19
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
  dates: long
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: ""
      shorten:
        min: 20
        use-first: 19
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
  type-variants:
    entry-encyclopedia:
    - contributor: author
      form: short
      name-order: family-first
    - title: primary
      prefix: ", "
      wrap: quotes
    - number: volume
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - variable: url
    patent:
    - contributor: author
      form: short
      name-order: family-first
    - title: primary
      prefix: ", "
      wrap: quotes
    - number: volume
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - variable: url
  template:
  - contributor: author
    form: short
    name-order: family-first
  - title: primary
    prefix: ", "
    wrap: quotes
  - date: issued
    form: year
    wrap: parentheses
  - number: volume
  - title: parent-monograph
  - title: parent-serial
  - variable: publisher
  - variable: publisher-place
    prefix: ", "
  - variable: url
  suffix: .
  delimiter: " "
  multi-cite-delimiter: "; "
  subsequent:
    type-variants:
      book:
      - contributor: author
        form: short
        name-order: family-first
      - title: primary
        form: short
        prefix: ", "
        wrap: quotes
        emph: true
        quote: false
      - variable: locator
        prefix: " at "
      legislation:
      - contributor: author
        form: short
        name-order: family-first
      - title: primary
        form: short
        prefix: ", "
        wrap: quotes
        emph: true
        quote: false
      - variable: locator
        prefix: " at "
      manuscript:
      - contributor: author
        form: short
        name-order: family-first
      - title: primary
        form: short
        prefix: ", "
        wrap: quotes
        emph: true
        quote: false
      - variable: locator
        prefix: " at "
      motion-picture:
      - contributor: author
        form: short
        name-order: family-first
      - title: primary
        form: short
        prefix: ", "
        wrap: quotes
        emph: true
        quote: false
      - variable: locator
        prefix: " at "
      thesis:
      - contributor: author
        form: short
        name-order: family-first
      - title: primary
        form: short
        prefix: ", "
        wrap: quotes
        emph: true
        quote: false
      - variable: locator
        prefix: " at "
      webpage:
      - contributor: author
        form: short
        name-order: family-first
      - title: primary
        form: short
        prefix: ", "
        wrap: quotes
        emph: true
        quote: false
      - variable: locator
        prefix: " at "
    template:
    - contributor: author
      form: short
      name-order: family-first
    - title: primary
      form: short
      prefix: ", "
      wrap: quotes
    - variable: locator
      prefix: " at "
bibliography:
  template: []
