info:
  title: 'NLM Style Guide (Vancouver): Citing Medicine 2nd edition (name-year)'
  description: 'Citing Medicine: The NLM Style Guide for Authors, Editors, and Publishers, 2nd edition (2015), based on ANSI/NISO Z39.29-2005 (R2010); name-year system.'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/nlm-name-year
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/nlm-name-year
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence
      rel: template
    - href: http://www.zotero.org/styles/cell
      rel: template
    - href: https://www.nlm.nih.gov/citingmedicine
      rel: documentation
    - href: https://www.nlm.nih.gov/bsd/uniform_requirements.html
      rel: documentation
    - href: https://www.icmje.org/recommendations/
      rel: documentation
options:
  substitute:
    contributor-role-form: long
    template:
    - editor
    - title
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
      - key: year
        ascending: true
      - key: author
        ascending: true
    group:
      template:
      - year
      - author
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 7
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    and: none
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
  - date: issued
    form: year
    prefix: " "
  - variable: locator
    prefix: " "
  wrap:
    punctuation: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
      remove:
        - match:
            date: issued
    article-magazine:
      remove:
        - match:
            date: issued
    article-newspaper:
      remove:
        - match:
            date: issued
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
          before:
            title: parent-serial
    dataset:
      remove:
        - match:
            date: issued
    entry-encyclopedia:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    webpage:
      remove:
        - match:
            date: issued
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 6
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - date: issued
    form: year
    prefix: "; "
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - number: pages
    prefix: ":"
  - variable: url
  sort: author-date-title
