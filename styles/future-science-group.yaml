info:
  title: Future Science Group
  description: Style used by the journals of the Future Science Group, as per Oct-2018 guidelines.
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/future-science-group
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/future-science-group
      rel: self
    - href: https://www.futuremedicine.com/pb-assets/Nanomedicine%20Author%20Guidelines-1540302236583.pdf
      rel: documentation
options:
  substitute: editor-long
  processing: numeric
  contributors: numeric-tight
  dates: short
  titles: journal-emphasis
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    book:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - number: pages
    - variable: publisher-place
      prefix: ", "
    - variable: url
    motion_picture:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: family-first
    - variable: publisher
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - number: pages
    - variable: publisher-place
      prefix: ", "
    - variable: url
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 3
  - title: primary
    prefix: " "
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - contributor: editor
    form: verb
    name-order: family-first
  - variable: publisher
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - number: pages
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
    prefix: " "
  - variable: publisher-place
    prefix: ", "
  - variable: url
