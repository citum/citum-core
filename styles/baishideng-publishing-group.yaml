info:
  title: Baishideng Publishing Group
  source:
    csl-id: http://www.zotero.org/styles/baishideng-publishing-group
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Patrick O'Brien
    links:
    - href: http://www.zotero.org/styles/baishideng-publishing-group
      rel: self
    - href: http://www.zotero.org/styles/hypertension-research
      rel: template
    - href: https://www.wjgnet.com/1948-5182/
      rel: documentation
    - href: https://bsdwebstorage.blob.core.windows.net/bpggerinfo/Guidelines_for_Manuscript_Preparation_and_Submission-Basic_Study.pdf
      rel: documentation
    - href: https://www.wjgnet.com/bpg/GerInfo/218
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 100
      use-first: 99
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  titles: journal-emphasis
citation:
  template-ref: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 100
        use-first: 99
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    separator: ". "
  type-variants:
    article-journal:
      remove:
        - match:
            date: issued
    article-magazine:
      extends: article-journal
      remove:
        - match:
            number: issue
    book:
      remove:
        - match:
            date: issued
    chapter:
      extends: article-journal
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
                emph: true
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    entry-encyclopedia:
      remove:
        - match:
            date: issued
    motion_picture:
      remove:
        - match:
            date: issued
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - number: volume
  - number: issue
    prefix: ": "
  - number: pages
    prefix: ": "
  - date: issued
    form: year
  - variable: doi
    prefix: . [
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - variable: url
