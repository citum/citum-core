            form: verb
            name-order: given-first
          - title: parent-monograph
            emph: true
      - title: parent-serial
        emph: true
      - variable: publisher
      - number: pages
      - variable: publisher-place
      - group:
          - number: volume
          - number: issue
            wrap:
