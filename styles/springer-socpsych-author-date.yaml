info:
  title: Springer - SocPsych (author-date)
  description: This style corresponds to 'Springer SocPsych' in the pdf document 'Key Style Points' at this url
  fields:
  - psychology
  source:
    csl-id: http://www.zotero.org/styles/springer-socpsych-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-socpsych-author-date
      rel: self
    - href: http://www.zotero.org/styles/apa
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/instruct-authors-e.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  processing: author-date
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
    overrides:
      report: []
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ". "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: never
    sort-separator: ", "
  dates: long
  titles: humanities
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  sort: author-date-title
  template:
  - delimiter: space
    group:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      and: text
    - date: issued
      form: year
  - variable: locator
  wrap:
    punctuation: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  options:
    hanging-indent: true
    separator: ": "
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
    article-magazine:
      remove:
        - match:
            date: issued
    article-newspaper:
      remove:
        - match:
            date: issued
    broadcast:
      remove:
        - match:
            date: issued
    chapter:
      modify:
        - match:
            number: pages
          label-form: short
          wrap:
            punctuation: parentheses
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
                emph: true
      add:
        - component:
            prefix: '. In '
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'In '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    interview:
      remove:
        - match:
            date: issued
    paper-conference:
      modify:
        - match:
            number: pages
          label-form: short
          wrap:
            punctuation: parentheses
    patent:
      remove:
        - match:
            date: issued
    personal_communication:
      remove:
        - match:
            date: issued
    legal-case:
    - title: primary
      suffix: "., "
    - number: volume
      suffix: " "
    - title: parent-serial
      suffix: " "
    - number: pages
    - delimiter: " "
      wrap:
        punctuation: parentheses
      prefix: " "
      group:
      - variable: authority
      - date: issued
        form: full
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 6
  - date: issued
    form: year
    prefix: " "
  - title: primary
  - prefix: ". In "
    group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - variable: publisher
  - number: pages
  - variable: publisher-place
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - variable: doi
  - variable: url
