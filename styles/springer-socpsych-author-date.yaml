preset: apa-7th
info:
  title: Springer - SocPsych (author-date)
  description: This style corresponds to 'Springer SocPsych' in the pdf document 'Key Style Points' at this url
  fields:
    - psychology
  source:
    csl-id: http://www.zotero.org/styles/springer-socpsych-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
      - name: Charles Parnot
        email: charles.parnot@gmail.com
        uri: http://twitter.com/cparnot
    links:
      - href: http://www.zotero.org/styles/springer-socpsych-author-date
        rel: self
      - href: http://www.zotero.org/styles/apa
        rel: template
      - href: http://www.springer.com/cda/content/document/cda_downloaddocument/instruct-authors-e.pdf
        rel: documentation
      - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
        rel: documentation
      - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
        rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
      - editor
      - translator
    overrides:
      report: []
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: '. '
    delimiter: ', '
    delimiter-precedes-last: always
    demote-non-dropping-particle: never
    sort-separator: ', '
  titles: humanities
  volume-pages-delimiter: comma
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
  sort: author-date-title
  template:
    - delimiter: space
      group:
        - contributor: author
          form: short
          shorten:
            min: 3
            use-first: 1
            and-others: et-al
            delimiter-precedes-last: contextual
          and: text
        - date: issued
          form: year
    - variable: locator
  wrap:
    punctuation: parentheses
  delimiter: ', '
  multi-cite-delimiter: '; '
bibliography:
  options:
    hanging-indent: true
    separator: ': '
  type-variants:
    article-journal:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 8
          use-first: 6
      - date: issued
        form: year
        prefix: ' '
      - title: primary
      - prefix: '. In '
        group:
          - contributor: editor
            form: verb
            name-order: given-first
          - title: parent-monograph
            emph: true
      - title: parent-serial
        emph: true
      - variable: publisher
      - number: pages
      - variable: publisher-place
      - group:
          - number: volume
          - number: issue
            wrap:
              punctuation: parentheses
      - variable: doi
        prefix: https://doi.org/
      - variable: url
    article-magazine:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 8
          use-first: 6
      - title: primary
      - prefix: '. In '
