version: ""
info:
  title: MHRA Style Guide 4th edition (shortened notes, place of publication)
  id: http://www.zotero.org/styles/mhra-shortened-notes-publisher-place
  default-locale: en-GB
options:
  processing: note
  contributors:
    and: text
    demote-non-dropping-particle: display-and-sort
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  page-range-format: minimal-two
citation:
  ibid:
    delimiter: ", "
    template:
    - term: ibid
      strip-periods: true
    - variable: locator
  template:
  - contributor: author
    form: short
    name-order: family-first
    shorten:
      min: 4
      use-first: 1
      and-others: text
  - title: primary
    prefix: ", "
    wrap:
      punctuation: quotes
  - variable: locator
    prefix: ", "
  suffix: .
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    subsequent-author-substitute: ——
    subsequent-author-substitute-rule: partial-first
    hanging-indent: true
    separator: ": "
  type-variants:
    article-journal:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    article-magazine:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    article-newspaper:
      remove:
        - match:
            date: issued
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    dataset:
      remove:
        - match:
            date: issued
    entry-encyclopedia:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    patent:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - delimiter: none
      group:
      - term: patent
        suffix: " "
      - number: number
      - date: issued
        form: month-day
        prefix: ", issued "
      - date: issued
        form: year
        prefix: " "
    personal_communication: []
    motion_picture:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
    - date: issued
      form: year
      prefix: " "
    - title: primary
      wrap:
        punctuation: quotes
    - variable: genre
    - variable: medium
    - contributor: director
      form: long
      prefix: "Directed by "
    interview:
    - contributor: interviewer
      form: long
      name-order: family-first
    - title: primary
      wrap:
        punctuation: quotes
    - contributor: author
      form: long
      prefix: ", interview with "
    - prefix: ", "
      delimiter: none
      group:
      - date: issued
        form: month-day
      - date: issued
        form: year
        prefix: " "
    - variable: medium
      prefix: ", "
    - variable: url
      prefix: " "
    personal-communication: []
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 5
      use-first: 1
  - title: primary
    wrap:
      punctuation: quotes
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - contributor: editor
    form: verb
    name-order: given-first
    shorten:
      min: 4
      use-first: 1
  - variable: publisher-place
    prefix: " ("
  - variable: publisher
    prefix: ": "
  - number: volume
  - date: issued
    form: year
    prefix: " "
  - number: pages
  - variable: doi
  - variable: url
  sort:
    template:
    - key: author
      ascending: true
    - key: title
      ascending: true
    - key: issued
      ascending: true
    - key: issued
      ascending: true
    - key: issued
      ascending: true
