info:
  title: MHRA Style Guide 4th edition (shortened notes, place of publication)
  description: MHRA source citations, shortened notes system, with place of publication (MHRA 7.3)
  fields:
  - history
  - humanities
  - linguistics
  - literature
  - philosophy
  - theology
  source:
    csl-id: http://www.zotero.org/styles/mhra-shortened-notes-publisher-place
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/mhra-shortened-notes-publisher-place
      rel: self
    - href: http://www.zotero.org/styles/mhra-notes
      rel: template
    - href: https://www.mhra.org.uk/style/
      rel: documentation
options:
  processing: note
  contributors:
    and: text
    demote-non-dropping-particle: display-and-sort
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: minimal-two
  bibliography:
    subsequent-author-substitute: ——
    subsequent-author-substitute-rule: partial-first
    hanging-indent: true
    separator: ": "
citation:
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 1
    - title: primary
      prefix: ", "
  suffix: .
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 1
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: given-first
      shorten:
        min: 4
        use-first: 1
    - variable: publisher-place
      prefix: " ("
    - variable: publisher
      prefix: ": "
    - number: volume
    - date: issued
      form: year
      prefix: " "
      overrides:
        patent:
          suppress: true
        dataset:
          suppress: true
        article-newspaper:
          suppress: true
    - number: pages
      overrides:
        chapter:
          prefix: "pp. "
        article-journal:
          prefix: "pp. "
        paper-conference:
          prefix: "pp. "
        article-magazine:
          prefix: "pp. "
        entry-encyclopedia:
          prefix: "pp. "
    - variable: doi
    - variable: url
