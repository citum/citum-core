info:
  title: Annual Reviews (sorted by order of appearance)
  source:
    csl-id: http://www.zotero.org/styles/annual-reviews
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/annual-reviews
      rel: self
    - href: http://www.annualreviews.org/page/authors/author-instructions/preparing/handbooks
      rel: documentation
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 7
      use-first: 5
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    demote-non-dropping-particle: never
    sort-separator: " "
  dates: short
  titles: humanities
  page-range-format: chicago
  punctuation-in-quote: true
citation:
  template-ref: numeric-citation
  wrap:
    punctuation: parentheses
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 5
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      sort-separator: " "
    separator: ". "
  type-variants:
    article-magazine:
      modify:
        - match:
            number: pages
          label-form: short
      remove:
        - match:
            group:
              - number: volume
              - number: issue
                wrap:
                  punctuation: parentheses
      add:
        - component:
            group:
              - number: volume
          before:
            variable: publisher-place
    book:
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
                emph: true
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    chapter:
      modify:
        - match:
            number: pages
          label-form: short
    patent:
    - number: citation-number
      suffix: ". "
    - contributor: author
      form: long
      sort-separator: " "
      shorten:
        min: 7
        use-first: 5
        and-others: et-al
        delimiter-precedes-last: contextual
    - date: issued
      form: year
    - title: primary
    entry-encyclopedia:
    - number: citation-number
      suffix: ". "
    - contributor: author
      form: long
      sort-separator: " "
      shorten:
        min: 7
        use-first: 5
        and-others: et-al
        delimiter-precedes-last: contextual
    - date: issued
      form: year
    - title: primary
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 5
  - date: issued
    form: year
    prefix: " "
  - title: primary
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - number: pages
