options:
  substitute: editor-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: numeric
  punctuation-in-quote: true
citation:
  extends: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: never
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: family-first
        shorten:
          min: 4
          use-first: 3
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher
    - number: pages
      prefix: "; "
    - variable: doi
      prefix: "; "
    - variable: publisher-place
      prefix: ": "
