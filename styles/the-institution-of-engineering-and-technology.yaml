info:
  title: The Institution of Engineering and Technology
  description: Style for all IET Journals
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/the-institution-of-engineering-and-technology
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/the-institution-of-engineering-and-technology
      rel: self
    - href: http://www.zotero.org/styles/acta-polytechnica
      rel: template
    - href: http://digital-library.theiet.org/journals/author-guide
      rel: documentation
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: .
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles: journal-emphasis
citation:
  template:
  - delimiter: none
    group:
    - number: citation-number
    - variable: locator
      prefix: ", "
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: .
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
      sort-separator: ", "
    separator: ", "
  type-variants:
    article-journal:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    article-magazine:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    entry-encyclopedia:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    patent:
      remove:
        - match:
            date: issued
    thesis:
      remove:
        - match:
            date: issued
    webpage:
    - number: citation-number
    - contributor: author
      form: long
      sort-separator: ", "
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: never
    - title: primary
      quote: true
      wrap:
        punctuation: quotes
    - variable: url
    - term: accessed
      form: long
    - date: accessed
      form: year-month
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 3
  - title: primary
    wrap:
      punctuation: quotes
    prefix: ": "
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - variable: publisher
    prefix: " ("
  - date: issued
    form: year
  - number: volume
  - number: issue
    wrap:
      punctuation: parentheses
    prefix: ", ("
  - number: pages
    prefix: "), "
