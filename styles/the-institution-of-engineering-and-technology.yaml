info:
  title: The Institution of Engineering and Technology
  description: Style for all IET Journals
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/the-institution-of-engineering-and-technology
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/the-institution-of-engineering-and-technology
      rel: self
    - href: http://www.zotero.org/styles/acta-polytechnica
      rel: template
    - href: http://digital-library.theiet.org/journals/author-guide
      rel: documentation
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: .
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles: journal-emphasis
  bibliography:
    separator: ", "
citation:
  template:
  - delimiter: none
    group:
    - number: citation-number
    - variable: locator
      prefix: ", "
  wrap: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: .
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
      sort-separator: ", "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten: &id001
        min: 8
        use-first: 3
    - title: primary
      wrap: quotes
      prefix: ": "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
      prefix: " ("
    - date: issued
      form: year
    - number: volume
    - number: issue
      wrap: parentheses
      prefix: ", ("
    - number: pages
      prefix: "pp. "
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      wrap: quotes
      prefix: ": "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
      prefix: " ("
    - date: issued
      form: year
    - number: volume
    - number: issue
      wrap: parentheses
      prefix: ", ("
    - number: pages
      prefix: "pp. "
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      wrap: quotes
      prefix: ": "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
      prefix: " ("
    - date: issued
      form: year
    - number: volume
    - number: issue
      wrap: parentheses
      prefix: ", ("
    - number: pages
      prefix: "pp. "
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      wrap: quotes
      prefix: ": "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
      prefix: " ("
    - date: issued
      form: year
    - number: volume
    - number: issue
      wrap: parentheses
      prefix: ", ("
    - number: pages
      prefix: "pp. "
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      wrap: quotes
      prefix: ": "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
      prefix: " ("
    - date: issued
      form: year
    - number: volume
    - number: issue
      wrap: parentheses
      prefix: ", ("
    - number: pages
      prefix: "pp. "
    patent:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      wrap: quotes
      prefix: ": "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
      prefix: " ("
    - number: volume
    - number: issue
      wrap: parentheses
      prefix: ", ("
    - number: pages
      prefix: "), "
    thesis:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      wrap: quotes
      prefix: ": "
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
      prefix: " ("
    - number: volume
    - number: issue
      wrap: parentheses
      prefix: ", ("
    - number: pages
      prefix: "), "
    webpage:
    - number: citation-number
    - contributor: author
      form: long
      sort-separator: ", "
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: never
    - title: primary
      quote: true
      wrap: quotes
    - variable: url
    - term: accessed
      form: long
    - date: accessed
      form: year-month
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten: *id001
  - title: primary
    wrap: quotes
    prefix: ": "
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - variable: publisher
    prefix: " ("
  - date: issued
    form: year
  - number: volume
  - number: issue
    wrap: parentheses
    prefix: ", ("
  - number: pages
    prefix: "), "
