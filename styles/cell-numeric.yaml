extends: elsevier-with-titles
info:
  title: Cell journals (numeric)
  id: http://www.zotero.org/styles/cell-numeric
  default-locale: en-US
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
    - title
  contributors:
    display-as-sort: all
    initialize-with: ''
    shorten:
      min: 7
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    and: none
    name-form: initials
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: .
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      sort-separator: ', '
      name-form: initials
    entry-suffix: .
    separator: '. '
