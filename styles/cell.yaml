info:
  title: Cell
  description: The Cell journal style, switched to numeric superscript as per the Cell editorial office in Sept. 2022
  fields:
  - biology
  source:
    csl-id: http://www.zotero.org/styles/cell
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Adam Mark
      email: a.mark@uoguelph.ca
    links:
    - href: http://www.zotero.org/styles/cell
      rel: self
    - href: https://www.cell.com/cell/authors
      rel: documentation
options:
  substitute: editor-title-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: .
    shorten:
      min: 11
      use-first: 10
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  extends: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: .
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
    article-magazine:
      remove:
        - match:
            number: issue
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    dataset:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
    - variable: publisher
      wrap:
        punctuation: parentheses
      prefix: ". "
    - variable: url
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
    prefix: " "
  - title: primary
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - number: volume
  - number: issue
    prefix: ", "
  - number: pages
    prefix: ", "
  - variable: doi
  - variable: publisher
