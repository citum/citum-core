info:
  title: ACM SIG Proceedings ("et al." for 3+ authors)
  description: Used by ACM SIG conferences. Numeric style with et al. for 3 or more authors.
  fields:
  - science
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/acm-sig-proceedings
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Naeem Esfahani
      email: nesfaha2@gmu.edu
      uri: http://mason.gmu.edu/~nesfaha2/
    contributors:
    - name: Chris Horn
      email: chris.horn@securedecisions.com
    - name: Patrick O'Brien
    links:
    - href: http://www.zotero.org/styles/acm-sig-proceedings
      rel: self
    - href: https://www.acm.org/publications/authors/reference-formatting
      rel: documentation
options:
  processing: numeric
  substitute: editor-translator-short
  contributors:
    and: text
    display-as-sort: all
    name-form: initials
    initialize-with: .
    delimiter: ", "
    delimiter-precedes-last: never
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
  dates: short
  titles: humanities
  bibliography:
    entry-suffix: .
    separator: " "
citation:
  use-preset: numeric-citation
  collapse: citation-number
  multi-cite-delimiter: ", "
bibliography:
  sort:
    template:
      - key: author
      - key: title
  options:
    contributors:
      and: text
      display-as-sort: all
      name-form: initials
      initialize-with: .
      delimiter: ", "
      delimiter-precedes-last: never
      sort-separator: ", "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
  template:
    - number: citation-number
      wrap: brackets
      suffix: " "
    - contributor: author
      form: long
      name-order: family-first
      suffix: " "
    - date: issued
      form: year
      suffix: ". "
    - title: primary
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - variable: publisher-place
    - number: volume
    - number: issue
    - number: pages
  type-variants:
    paper-conference:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - contributor: author
        form: long
        name-order: family-first
        suffix: " "
      - date: issued
        form: year
        suffix: ". "
      - title: primary
        suffix: ". "
      - title: parent-monograph
        emph: true
        suffix: " "
      - group:
          - variable: publisher-place
          - date: issued
            form: year-month
        delimiter: ", "
        wrap: parentheses
        suffix: ", "
      - number: pages
    article-journal:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - contributor: author
        form: long
        name-order: family-first
        suffix: " "
      - date: issued
        form: year
        suffix: ". "
      - title: primary
        suffix: ". "
      - title: parent-serial
        emph: true
        suffix: " "
      - group:
          - number: volume
          - group:
              - number: issue
              - date: issued
                form: year-month
                wrap: parentheses
            delimiter: " "
        delimiter: ", "
        suffix: ", "
      - number: pages
      - variable: doi
        prefix: ". https://doi.org/"
    patent:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - contributor: author
        form: long
        name-order: family-first
        suffix: " "
      - date: issued
        form: year
        suffix: ". "
      - title: primary
        suffix: ". "
      - variable: number
        suffix: ". "
      - date: issued
        form: full
    thesis:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - contributor: author
        form: long
        name-order: family-first
        suffix: " "
      - date: issued
        form: year
        suffix: ". "
      - title: primary
        emph: true
        suffix: ". "
      - variable: archive-location
        prefix: "Doctoral Thesis #"
        suffix: ". "
      - variable: publisher
    report:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - contributor: author
        form: long
        name-order: family-first
        suffix: " "
      - date: issued
        form: year
        suffix: ". "
      - title: primary
        emph: true
        suffix: ". "
      - variable: number
        prefix: "Technical Report #"
        suffix: ". "
      - variable: publisher
    webpage:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - title: primary
        suffix: ":"
      - date: issued
        form: year
        prefix: " "
        suffix: ". "
      - variable: url
        emph: true
        suffix: ". "
      - date: accessed
        form: year-month-day
        prefix: "Accessed: "
    chapter:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - contributor: author
        form: long
        name-order: family-first
        suffix: " "
      - date: issued
        form: year
        suffix: ". "
      - title: primary
        suffix: ". "
      - title: parent-monograph
        emph: true
        suffix: ". "
      - contributor: editor
        form: verb
        name-order: given-first
        suffix: ". "
      - variable: publisher
        suffix: ". "
      - number: pages
    book:
      - number: citation-number
        wrap: brackets
        suffix: " "
      - contributor: author
        form: long
        name-order: family-first
        suffix: " "
      - date: issued
        form: year
        suffix: ". "
      - title: primary
        emph: true
        suffix: ". "
      - variable: publisher
