info:
  title: SAGE - NLM/Vancouver
  description: Vancouver superscript style modified to italicize journal names strip periods for use in SAGE journals
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/sage-vancouver
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/sage-vancouver
      rel: self
    - href: http://www.uk.sagepub.com/repository/binaries/pdf/SAGE_Vancouver_reference_style.pdf
      rel: documentation
options:
  substitute: editor-short
  processing: numeric
  contributors: numeric-medium
  dates: long
  titles: humanities
citation:
  use-preset: numeric-citation
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten: &id001
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: &id002
          min: 4
          use-first: 3
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: publisher-place
    - variable: url
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - date: issued
      form: year
      prefix: ", "
    - number: pages
      prefix: "pp. "
    - variable: publisher-place
    - variable: url
    broadcast:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: publisher-place
    - variable: url
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
        prefix: "on "
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - date: issued
      form: year
      prefix: ", "
    - number: pages
      prefix: "pp. "
    - variable: publisher-place
    - variable: url
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: publisher-place
    - variable: url
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - date: issued
      form: year
      prefix: ", "
    - number: pages
      prefix: "pp. "
    - variable: publisher-place
    - variable: url
    personal_communication:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - number: pages
      prefix: ", "
    - variable: publisher-place
    - variable: url
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten: *id001
  - title: primary
    prefix: " "
  - items:
    - contributor: editor
      form: verb
      name-order: given-first
      shorten: *id002
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - number: volume
  - variable: publisher
  - date: issued
    form: year
    prefix: ", "
  - number: pages
    prefix: ", "
  - variable: publisher-place
  - variable: url
