version: ''
info:
  title: 'New Hart''s Rules: The Oxford Style Guide 2nd edition (author-date, bracketed date with space, publisher)'
  id: http://www.zotero.org/styles/new-harts-rules-author-date-space-publisher
  default-locale: en-GB
options:
  locators: note
  substitute:
    template: []
  processing:
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
  contributors:
    name-form: initials
    initialize-with: '. '
    and: text
    demote-non-dropping-particle: display-and-sort
  dates:
    month: numeric
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
  page-range-format: minimal
citation:
  type-variants:
    personal_communication:
      - contributor: author
        form: short
        name-order: family-first
      - variable: locator
        prefix: ': '
  template:
    - contributor: author
      form: short
      name-order: family-first
    - date: issued
      form: year
      prefix: ''
    - variable: locator
      prefix: ': '
  wrap: parentheses
  delimiter: ' '
  multi-cite-delimiter: '; '
  options:
    contributors:
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
bibliography:
  options:
    hanging-indent: true
    entry-suffix: .
    separator: ', '
  type-variants:
    article-journal:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        wrap: parentheses
        prefix: ' '
      - title: primary
        wrap: quotes
        prefix: ' '
      - prefix: ', in '
        group:
          - contributor: editor
            form: verb
            name-order: given-first
            shorten:
              min: 4
              use-first: 1
          - title: parent-monograph
            emph: true
      - title: parent-serial
        emph: true
      - variable: publisher
      - number: pages
        prefix: '), '
      - variable: publisher-place
      - number: volume
        prefix: '), '
      - number: issue
        prefix: /
      - variable: doi
        prefix: https://doi.org/
      - variable: url
    chapter:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
      - date: issued
        form: year
        wrap: parentheses
        prefix: ' '
      - title: primary
        wrap: quotes
        prefix: ' '
      - prefix: ', in '
        group:
          - contributor: editor
            form: verb
            name-order: given-first
            shorten:
              min: 4
              use-first: 1
            prefix: 'in '
          - title: parent-monograph
            emph: true
      - title: parent-serial
        emph: true
      - variable: publisher
      - number: pages
        prefix: '), '
      - variable: publisher-place
      - number: volume
        prefix: '), '
      - number: issue
        prefix: /
      - variable: doi
        prefix: '/2, '
      - variable: url
    patent:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
          and-others: et-al
          delimiter-precedes-last: contextual
      - date: issued
        form: year
        prefix: ' '
        wrap: parentheses
      - title: primary
        prefix: ' '
        wrap: quotes
      - number: number
    interview:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
          and-others: et-al
          delimiter-precedes-last: contextual
      - date: issued
        form: year
        prefix: ' '
        wrap: parentheses
      - title: primary
        prefix: ' '
        wrap: quotes
      - contributor: interviewer
        form: long
      - variable: medium
      - variable: url
    personal-communication: []
    motion_picture:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
          and-others: et-al
          delimiter-precedes-last: contextual
      - date: issued
        form: year
        prefix: ' '
        wrap: parentheses
      - title: primary
        prefix: ' '
        wrap: quotes
      - variable: genre
      - variable: medium
      - contributor: director
        form: long
        prefix: 'Directed by '
    personal_communication: []
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 1
    - date: issued
      form: year
      wrap: parentheses
      prefix: ' '
    - title: primary
      wrap: quotes
      prefix: ' '
    - prefix: ', in '
      group:
        - contributor: editor
          form: verb
          name-order: given-first
          shorten:
            min: 4
            use-first: 1
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: '), '
    - variable: publisher-place
    - number: volume
      prefix: '), '
    - number: issue
      prefix: /
    - variable: doi
      prefix: '/2, '
    - variable: url
  sort:
    template:
      - key: author
        ascending: true
      - key: issued
        ascending: true
      - key: issued
        ascending: true
      - key: title
        ascending: true
