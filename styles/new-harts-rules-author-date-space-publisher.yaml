info:
  title: 'New Hart''s Rules: The Oxford Style Guide 2nd edition (author-date, bracketed date with space, publisher)'
  id: http://www.zotero.org/styles/new-harts-rules-author-date-space-publisher
  default-locale: en-GB
options:
  locators: note
  substitute:
    template: []
  processing:
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
  contributors:
    name-form: initials
    initialize-with: '. '
    and: text
    demote-non-dropping-particle: display-and-sort
  dates:
    month: numeric
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
  page-range-format: minimal
citation:
  type-variants:
    personal_communication:
      remove:
        - match:
            date: issued
  template:
    - contributor: author
      form: short
      name-order: family-first
    - date: issued
      form: year
      prefix: ''
    - variable: locator
      prefix: ': '
  wrap:
    punctuation: parentheses
  delimiter: ' '
  multi-cite-delimiter: '; '
  options:
    contributors:
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
bibliography:
  options:
    hanging-indent: true
    entry-suffix: .
    separator: ', '
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
    chapter:
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                shorten:
                  min: 4
                  use-first: 1
              - title: parent-monograph
                emph: true
      add:
        - component:
            prefix: ', in '
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                shorten:
                  min: 4
                  use-first: 1
                prefix: 'in '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    patent:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 5
          use-first: 1
          and-others: et-al
          delimiter-precedes-last: contextual
      - date: issued
        form: year
        prefix: ' '
        wrap:
          punctuation: parentheses
      - title: primary
        prefix: ' '
        wrap:
          punctuation: quotes
      - number: number
    interview:
      extends: patent
      remove:
        - match:
            number: number
      add:
        - component:
            contributor: interviewer
            form: long
          after:
            title: primary
        - component:
            variable: medium
          after:
            contributor: interviewer
        - component:
            variable: url
          after:
            variable: medium
    personal-communication: []
    motion_picture:
      extends: patent
      remove:
        - match:
            number: number
      add:
        - component:
            variable: genre
          after:
            title: primary
        - component:
            variable: medium
          after:
            variable: genre
        - component:
            contributor: director
            form: long
            prefix: 'Directed by '
          after:
            variable: medium
    personal_communication: []
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 1
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: ' '
    - title: primary
      wrap:
        punctuation: quotes
      prefix: ' '
    - prefix: ', in '
      group:
        - contributor: editor
          form: verb
          name-order: given-first
          shorten:
            min: 4
            use-first: 1
        - title: parent-monograph
          emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: '), '
    - variable: publisher-place
    - number: volume
      prefix: '), '
    - number: issue
      prefix: /
    - variable: doi
      prefix: '/2, '
    - variable: url
  sort:
    template:
      - key: author
        ascending: true
      - key: issued
        ascending: true
      - key: issued
        ascending: true
      - key: title
        ascending: true
