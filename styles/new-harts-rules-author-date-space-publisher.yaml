info:
  title: 'New Hart''s Rules: The Oxford Style Guide 2nd edition (author-date, bracketed date with space, publisher)'
  description: Oxford source citations, author-date system, bracketed date followed by space, publisher name (NHR 18.2.10)
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - linguistics
  - literature
  - philosophy
  - psychology
  - science
  - sociology
  - theology
  is-base: true
  source:
    csl-id: http://www.zotero.org/styles/new-harts-rules-author-date-space-publisher
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/new-harts-rules-author-date-space-publisher
      rel: self
    - href: http://www.zotero.org/styles/new-harts-rules-notes
      rel: template
    - href: https://en.wikipedia.org/wiki/Hart's_Rules
      rel: documentation
options:
  substitute:
    template: []
    overrides:
      event performance speech: []
      webpage: []
      song: []
      manuscript: []
      standard: []
      software webpage: []
      classic: []
  processing:
    disambiguate:
      names: true
      add-givenname: true
      year-suffix: true
  contributors:
    initialize-with: ". "
    and: text
    demote-non-dropping-particle: display-and-sort
  dates:
    month: numeric
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  page-range-format: minimal
  bibliography:
    hanging-indent: true
    entry-suffix: .
    separator: ", "
citation:
  options:
    contributors:
      initialize-with: ". "
  template:
    - contributor: author
      form: long
      name-order: given-first
      shorten:
        min: 8
        use-first: 1
    - date: issued
      form: year
      prefix: " "
      overrides:
        personal_communication:
          suppress: true
    - variable: locator
      show-label: true
      prefix: " "
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  template:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 1
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      wrap: quotes
      prefix: " "
    - items:
        - contributor: editor
          form: verb
          overrides:
            chapter:
              prefix: "in "
          name-order: given-first
          shorten:
            min: 4
            use-first: 1
        - title: parent-monograph
          emph: true
      prefix: ", in "
    - title: parent-serial
      emph: true
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: volume
      prefix: "), "
    - number: issue
      prefix: /
    - number: pages
      prefix: ": "
    - variable: doi
      overrides:
        article-journal:
          prefix: https://doi.org/
    - variable: url
  sort: author-date-title