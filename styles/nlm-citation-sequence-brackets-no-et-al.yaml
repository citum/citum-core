    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
    - variable: url
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
    - variable: url
    dataset:
