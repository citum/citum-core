    form: long
    name-order: family-first
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - date: issued
    form: year
  - group:
    - number: volume
    - number: issue
      wrap:
