info:
  title: 'NLM Style Guide (Vancouver): Citing Medicine 2nd edition (citation-sequence, brackets, no "et al.")'
  description: 'Citing Medicine: The NLM Style Guide for Authors, Editors, and Publishers, 2nd edition (2015), based on ANSI/NISO Z39.29-2005 (R2010); citation-sequence system, with in-text indicators in brackets, no "et al."'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/nlm-citation-sequence-brackets-no-et-al
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/nlm-citation-sequence-brackets-no-et-al
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence-brackets
      rel: template
    - href: https://www.nlm.nih.gov/citingmedicine
      rel: documentation
    - href: https://www.nlm.nih.gov/bsd/uniform_requirements.html
      rel: documentation
    - href: https://www.icmje.org/recommendations/
      rel: documentation
options:
  substitute:
    contributor-role-form: long
    template:
    - editor
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  template-ref: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
      remove:
        - match:
            date: issued
    article-magazine:
      remove:
        - match:
            date: issued
    article-newspaper:
      remove:
        - match:
            date: issued
    chapter:
      modify:
        - match:
            number: pages
          label-form: short
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
      add:
        - component:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'on '
              - title: parent-monograph
          before:
            title: parent-serial
    dataset:
      remove:
        - match:
            date: issued
    entry-encyclopedia:
      modify:
        - match:
            number: pages
          label-form: short
    paper-conference:
      modify:
        - match:
            number: pages
          label-form: short
    webpage:
      remove:
        - match:
            date: issued
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - date: issued
    form: year
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - number: pages
  - variable: url
