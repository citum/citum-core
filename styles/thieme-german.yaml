info:
  title: Thieme-German (Deutsch)
  description: Modified version of the "Vancouver Bracket" for Thieme Journals
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/thieme-german
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/thieme-german
      rel: self
    - href: http://www.thieme.de/de/autorenlounge/fuer-zeitschriftenautoren-1789.htm
      rel: documentation
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: numeric
  page-range-format: expanded
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      sort-separator: " "
    separator: ". "
  type-variants:
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten: &id001
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: &id002
          min: 4
          use-first: 3
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - date: issued
      form: year
    - number: pages
      prefix: ". 2013: "
    - variable: doi
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
        prefix: "on "
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ": "
    - date: issued
      form: year
    - number: pages
      prefix: ". 2013: "
    - variable: doi
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    dataset:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ": "
    - date: issued
      form: year
    - number: pages
      prefix: ". 2013: "
    - variable: doi
    - variable: publisher-place
    legal-case:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
      - title: parent-monograph
    - title: parent-serial
    - date: issued
      form: year
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    webpage:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten: *id002
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ": "
    - date: issued
      form: year
    - number: pages
      prefix: ". 2013: "
    - variable: doi
    - variable: url
      prefix: "; Im Internet: "
    - date: accessed
      form: full
      prefix: "; Stand: "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten: *id001
  - title: primary
    prefix: " "
  - items:
    - contributor: editor
      form: verb
      name-order: given-first
      shorten: *id002
    - title: parent-monograph
  - title: parent-serial
  - number: volume
  - number: issue
    prefix: ": "
  - date: issued
    form: year
  - number: pages
    prefix: ". 2013: "
  - variable: doi
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
