version: ''
info:
  title: Thieme-German (Deutsch)
  id: http://www.zotero.org/styles/thieme-german
  default-locale: de-DE
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ''
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    and: none
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ' '
    name-form: initials
  dates:
    month: numeric
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  page-range-format: expanded
citation:
  template:
  - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ','
  collapse: citation-number
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ''
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: null
      delimiter-precedes-last: always
      sort-separator: ' '
      name-form: initials
    separator: '. '
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
  - title: primary
    prefix: ' '
  - group:
    - contributor: editor
      form: verb
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
    - title: parent-monograph
  - title: parent-serial
  - number: volume
  - number: issue
    prefix: ': '
  - date: issued
    form: year
  - number: pages
    prefix: ': '
  - variable: doi
  - variable: publisher-place
  - variable: publisher
    prefix: ': '
  type-variants:
    article-journal:
    - number: citation-number
      quote: false
      wrap: brackets
      strip-periods: false
    - contributor: author
      form: long
      sort-separator: ' '
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
    - title: parent-serial
      strip-periods: true
    - date: issued
      form: year
      suffix: ;
    - number: volume
    - number: pages
      prefix: ': '
    - variable: doi
      prefix: 'doi:'
    legal_case:
    - number: citation-number
      quote: false
      wrap: brackets
      strip-periods: false
    - contributor: author
      form: long
      sort-separator: ' '
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
    - number: edition
    - term: edition
      form: short
    - variable: publisher-place
    - variable: publisher
    - date: issued
      form: year
      suppress: false
    - title: parent-serial
    webpage:
    - number: citation-number
      quote: false
      wrap: brackets
      strip-periods: false
    - contributor: author
      form: long
      sort-separator: ' '
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
    - title: parent-serial
      strip-periods: true
    - date: issued
      form: year
      suffix: ;
    - number: volume
    - number: pages
      prefix: ': '
    - variable: url
    - term: accessed
      form: long
    - date: accessed
      form: full
    patent:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
    - title: primary
      prefix: ' '
    - date: issued
      form: year

