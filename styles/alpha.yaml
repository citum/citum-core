version: '0.10.0'
info:
  title: Alpha (biblatex-alpha)
  id: alpha
  default-locale: en-US
  source:
    csl-id: http://www.zotero.org/styles/alpha
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    links:
    - href: http://www.zotero.org/styles/alpha
      rel: self
    - href: https://github.com/citation-style-language/styles/blob/master/alpha.csl
      rel: documentation
options:
  processing:
    # Alpha preset: 3-char single-author, 1-char multi-author, et-al at 4, "+" marker
    # Matches biblatex alpha.bbx / BibTeX alpha.bst conventions
    label:
      preset: alpha
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
  contributors:
    and: text
    delimiter: ', '
    delimiter-precedes-last: contextual
    sort-separator: ', '
    display-as-sort: all
  titles: humanities
citation:
  sort: author-date-title
  template:
  - number: citation-label
  - variable: locator
    prefix: ', '
  wrap: brackets
  delimiter: ''
  multi-cite-delimiter: ', '
bibliography:
  options:
    contributors:
      and: text
      delimiter: ', '
      delimiter-precedes-last: contextual
      sort-separator: ', '
      display-as-sort: all
    entry-suffix: .
    separator: ', '
  type-variants:
    article-journal:
    - number: citation-label
      wrap: brackets
      suffix: ' '
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
    - number: volume
    - date: issued
      form: year
      wrap: parentheses
      prefix: ' '
    - number: pages
      prefix: ' '
    chapter:
    - number: citation-label
      wrap: brackets
      suffix: ' '
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
    - number: volume
    - number: pages
      prefix: 'pp. '
    paper-conference:
    - number: citation-label
      wrap: brackets
      suffix: ' '
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
    - number: volume
    - date: issued
      form: year
    - number: pages
      prefix: 'pp. '
  template:
  - number: citation-label
    wrap: brackets
    suffix: ' '
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
  - title: parent-monograph
  - title: parent-serial
  - variable: publisher
  - variable: publisher-place
  - number: volume
  - date: issued
    form: year
  - number: pages
    prefix: ' '
