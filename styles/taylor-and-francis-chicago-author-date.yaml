info:
  title: 'Taylor & Francis Journals Standard Reference Style Guide: Chicago'
  id: taylor-and-francis-chicago-author-date
  description: 'Taylor & Francis Journals adaptation of Chicago-style, author-date system, using style
    presets.'

preset: chicago-author-date-18th
options:
  page-range-format: expanded
  contributors:
    role:
      omit:
      - translator

citation:
  options:
    contributors:
      shorten:
        min: 4
        use-first: 1
  template:
  - contributor: author
    form: short
    shorten:
      min: 4
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    and: text
  - date: issued
    form: year
  - variable: locator
    prefix: ", "
  wrap: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  type-variants:
    article-journal:
    - contributor: author
      form: long
    - date: issued
      form: year
    - title: primary
      wrap: quotes
    - contributor: translator
      form: long
      name-order: given-first
      prefix: "Translated by "
    - title: parent-serial
    - number: volume
      prefix: " "
    - number: issue
      wrap: parentheses
    - number: pages
      prefix: ": "
    - variable: doi
      prefix: ". https://doi.org/"
      suffix: "."
    - variable: url
      suffix: "."
    book:
    - contributor: author
      form: long
    - date: issued
      form: year
    - title: primary
    - contributor: translator
      form: long
      name-order: given-first
      prefix: "Translated by "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - variable: doi
      prefix: ". https://doi.org/"
      suffix: "."
    - variable: url
      suffix: "."
    chapter:
    - contributor: author
      form: long
    - date: issued
      form: year
    - title: primary
      wrap: quotes
      suffix: "."
    - contributor: translator
      form: long
      name-order: given-first
      prefix: "Translated by "
    - title: parent-monograph
      prefix: " In "
    - contributor: editor
      form: long
      name-order: given-first
      prefix: ", edited by "
    - number: pages
      prefix: ": "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - variable: doi
      prefix: ". https://doi.org/"
      suffix: "."
    - variable: url
      suffix: "."
    default:
    - contributor: author
      form: long
    - date: issued
      form: year
    - title: primary
    - title: parent-monograph
      prefix: " In "
    - contributor: editor
      form: long
      name-order: given-first
      prefix: ", edited by "
    - title: parent-serial
    - number: volume
      prefix: " "
    - number: issue
      wrap: parentheses
    - number: pages
      prefix: ": "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - variable: doi
      prefix: ". https://doi.org/"
      suffix: "."
    - variable: url
      suffix: "."
    interview:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      wrap: quotes
    - contributor: interviewer
      form: long
      name-order: given-first
      prefix: "Interview by "
    - delimiter: ", "
      group:
      - date: issued
        form: month-day
      - date: issued
        form: year
    - variable: medium
    - variable: url
      suffix: "."
    motion-picture:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
    - variable: genre
    - contributor: author
      form: long
      name-order: given-first
      prefix: "Directed by "
    - date: issued
      form: year
      suffix: "."
    - variable: medium
      text-case: capitalize-first
  template:
  - contributor: author
    form: long
  - date: issued
    form: year
  - title: primary
  - contributor: translator
    form: long
    name-order: given-first
    prefix: "Translated by "
  - title: parent-monograph
    prefix: " In "
  - contributor: editor
    form: long
    name-order: given-first
    prefix: ", edited by "
  - title: parent-serial
  - number: volume
    prefix: " "
  - number: issue
    wrap: parentheses
  - number: pages
    prefix: ": "
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - date: issued
    form: year
    prefix: ", "
    suffix: "."
  - variable: doi
    prefix: ". https://doi.org/"
    suffix: "."
  - variable: url
    suffix: "."
