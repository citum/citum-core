info:
  title: Oxford Journals Sciences and Medicine (author-date)
  fields:
  - medicine
  - science
  source:
    csl-id: http://www.zotero.org/styles/oxford-journals-scimed-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/oxford-journals-scimed-author-date
      rel: self
    - href: http://www.zotero.org/styles/journal-of-internal-medicine
      rel: template
    - href: https://academic.oup.com/femsre/pages/Manuscript_Styling
      rel: documentation
options:
  locators: note
  substitute: editor-short
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    delimiter-precedes-et-al: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  titles: humanities
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  options:
    processing:
      disambiguate:
        names: false
        add-givenname: false
        year-suffix: true
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 4
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
      delimiter-precedes-et-al: never
      sort-separator: " "
  template:
  - contributor: author
    form: short
    name-order: family-first
    shorten:
      min: 4
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
  - date: issued
    form: year
    prefix: " "
  - variable: locator
    prefix: ": "
  wrap:
    punctuation: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      delimiter-precedes-et-al: never
      sort-separator: " "
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
      remove:
        - match:
            date: issued
    article-magazine:
      remove:
        - match:
            date: issued
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
        prefix: "on "
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - date: issued
      form: year
      prefix: ", "
    - number: volume
    - number: pages
      prefix: ":"
    entry-encyclopedia:
      remove:
        - match:
            date: issued
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 5
      use-first: 3
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
      shorten:
        min: 4
        use-first: 3
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - date: issued
    form: year
    prefix: ", "
  - number: volume
  - number: pages
    prefix: ":"
