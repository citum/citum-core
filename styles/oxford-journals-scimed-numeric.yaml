info:
  title: Oxford Journals Sciences and Medicine (numeric)
  fields:
  - medicine
  - science
  source:
    csl-id: http://www.zotero.org/styles/oxford-journals-scimed-numeric
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/oxford-journals-scimed-numeric
      rel: self
    - href: http://www.zotero.org/styles/journal-of-internal-medicine
      rel: template
    - href: https://academic.oup.com/emph/pages/Manuscript_Preparation
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    delimiter-precedes-et-al: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  template:
  - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      delimiter-precedes-et-al: never
      sort-separator: " "
    hanging-indent: false
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: pages
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: pages
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
        prefix: "on "
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - date: issued
      form: year
    - number: volume
    - number: pages
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - number: pages
      prefix: ":"
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 3
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
      shorten:
        min: 4
        use-first: 3
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - date: issued
    form: year
  - number: volume
  - number: pages
    prefix: ":"
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
