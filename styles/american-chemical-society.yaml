info:
  title: ACS Guide 2022 revision
  description: The American Chemical Society style
  fields:
  - chemistry
  source:
    csl-id: http://www.zotero.org/styles/american-chemical-society
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      email: julian.onions@gmail.com
    links:
    - href: http://www.zotero.org/styles/american-chemical-society
      rel: self
    - href: https://doi.org/10.1021/acsguide.40303
      rel: documentation
    - href: https://doi.org/10.1021/acsguide
      rel: documentation
options:
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ". "
    delimiter: "; "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles: humanities
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  extends: numeric-citation
  collapse: citation-number
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ". "
      delimiter: "; "
      delimiter-precedes-last: always
      sort-separator: ", "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
    article-magazine:
      remove:
        - match:
            group:
              - number: volume
              - number: issue
      add:
        - component:
            prefix: ', '
            group:
              - number: volume
          before:
            number: pages
    chapter:
      remove:
        - match:
            date: issued
    entry-encyclopedia:
      remove:
        - match:
            date: issued
    paper-conference:
      remove:
        - match:
            date: issued
    patent:
    - number: citation-number
      wrap:
        punctuation: parentheses
    - contributor: author
      form: long
      sort-separator: ", "
    - title: primary
    - date: issued
      form: full
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: " "
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - contributor: editor
    form: verb
    name-order: family-first
  - variable: publisher
    prefix: "; "
  - variable: publisher-place
    prefix: ": "
  - date: issued
    form: year
    prefix: ", "
  - prefix: ", "
    group:
    - number: volume
    - number: issue
  - number: pages
    prefix: ", "
  - variable: doi
  - variable: url
