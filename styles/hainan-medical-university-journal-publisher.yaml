options:
  substitute: editor-short
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 7
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    delimiter-precedes-et-al: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: short
  titles: humanities
citation:
  extends: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      delimiter-precedes-et-al: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
    - title: primary
      prefix: " "
    - title: parent-serial
      emph: true
    - date: issued
      form: year
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - number: pages
      prefix: ", 2006: "
    - variable: doi
    legal_case:
    - title: primary
    - date: issued
      form: year
    webpage:
