info:
  title: American Physiological Society
  description: A style for many APS journals
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/american-physiological-society
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/american-physiological-society
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence
      rel: template
    - href: https://journals.physiology.org/author-info.references
      rel: documentation
options:
  substitute: editor-translator-long
  processing: numeric
  contributors: numeric-all-authors
  dates: short
  titles: humanities
  punctuation-in-quote: true
citation:
  extends: numeric-citation
  wrap:
    punctuation: parentheses
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    article-magazine:
      remove:
        - match:
            number: issue
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: family-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - number: volume
  - number: issue
    prefix: ": "
  - variable: publisher
  - number: pages
    prefix: ": "
  - date: issued
    form: year
    prefix: ", "
  - variable: doi
  - variable: publisher-place
  - variable: url
