options:
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
    overrides:
      report: []
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ". "
    shorten:
      min: 8
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: never
    sort-separator: ", "
  dates: long
  titles: humanities
  bibliography:
    separator: ". "
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  use-preset: numeric-citation
  wrap: brackets
  multi-cite-delimiter: ", "
bibliography:
