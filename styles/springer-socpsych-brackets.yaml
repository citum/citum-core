info:
  title: Springer - SocPsych (numeric, brackets)
  fields:
  - psychology
  source:
    csl-id: http://www.zotero.org/styles/springer-socpsych-brackets
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Charles Parnot
      email: charles.parnot@gmail.com
      uri: http://twitter.com/cparnot
    links:
    - href: http://www.zotero.org/styles/springer-socpsych-brackets
      rel: self
    - href: http://www.zotero.org/styles/apa
      rel: template
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/instruct-authors-e.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/manuscript-guidelines-1.0.pdf
      rel: documentation
    - href: http://www.springer.com/cda/content/document/cda_downloaddocument/Key_Style_Points_1.0.pdf
      rel: documentation
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
    overrides:
      report: []
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ". "
    shorten:
      min: 8
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: never
    sort-separator: ", "
  dates: long
  titles: humanities
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  extends: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 8
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
    separator: ". "
  type-variants:
    article-journal:
      modify:
        - match:
            variable: doi
          prefix: https://doi.org/
    article-magazine:
      remove:
        - match:
            date: issued
    article-newspaper:
      remove:
        - match:
            date: issued
    broadcast:
      remove:
        - match:
            date: issued
    chapter:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
          wrap:
            punctuation: parentheses
      remove:
        - match:
            group:
              - contributor: editor
                form: verb
                name-order: given-first
              - title: parent-monograph
                emph: true
      add:
        - component:
            prefix: '. In '
            group:
              - contributor: editor
                form: verb
                name-order: given-first
                prefix: 'In '
              - title: parent-monograph
                emph: true
          before:
            title: parent-serial
    interview:
      remove:
        - match:
            date: issued
    paper-conference:
      modify:
        - match:
            number: pages
          prefix: 'pp. '
          wrap:
            punctuation: parentheses
    patent:
      remove:
        - match:
            date: issued
    personal_communication:
      remove:
        - match:
            date: issued
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 7
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
    prefix: " "
  - title: primary
  - prefix: ". In "
    group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - number: pages
    prefix: ", "
  - variable: publisher
    prefix: "). "
  - variable: doi
  - variable: publisher-place
  - variable: url
