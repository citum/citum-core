preset: apa-7th
info:
  title: American Psychological Association 7th edition
  fields:
  - anthropology
  - communications
  - law
  - medicine
  - psychology
  - social-science
  source:
    csl-id: http://www.zotero.org/styles/apa
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Brenton M. Wiernik
      email: zotero@wiernik.org
      uri: https://orcid.org/0000-0001-9560-6336
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/apa
      rel: self
    - href: http://www.zotero.org/styles/apa-6th-edition
      rel: template
    - href: https://apastyle.apa.org/style-grammar-guidelines/references
      rel: documentation
  short-name: "APA"
  edition: "7th"
options:
  processing: author-date
  substitute: standard
  contributors:
    name-form: initials
    initialize-with: ". "
    role: short-suffix
    demote-non-dropping-particle: never
    delimiter-precedes-last: always
    and: symbol
    shorten:
      min: 21
      use-first: 19
      use-last: 1
  dates: long
  titles:
    component:
      text-case: as-is
    monograph:
      text-case: as-is
      emph: true
    container-monograph:
      text-case: as-is
      emph: true
    periodical:
      emph: true
    serial:
      text-case: as-is
  multilingual:
    title-mode: combined
    name-mode: primary
    preferred-script: Latn
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten: {min: 3, use-first: 1}
  sort: author-date-title
  non-integral:
    wrap: parentheses
    type-variants:
      ? article-journal, article-magazine, article-newspaper, book, broadcast, chapter, dataset, entry-encyclopedia, interview, motion-picture, paper-conference, patent, report, software, standard, thesis, webpage
      : - contributor: author
          form: short
        - date: issued
          form: year
        - variable: locator
      legal-case:
      - title: primary
        form: short
        emph: true
        quote: false
      - date: issued
        form: year
      - variable: locator
      personal-communication:
      - contributor: author
        form: long
        name-order: given-first
        suffix: ", personal communication"
      - date: issued
        form: year-month-day
      - variable: locator
    template:
    - contributor: author
      form: short
    - title: primary
      form: short
    - date: issued
      form: year
    - variable: locator
  delimiter: ", "
  multi-cite-delimiter: "; "
  integral:
    delimiter: " "
    options:
      contributors:
        and: text
    type-variants:
      ? article-journal, article-magazine, article-newspaper, book, broadcast, chapter, dataset, entry-encyclopedia, interview, motion-picture, paper-conference, patent, report, software, standard, thesis, webpage
      : - contributor: author
          form: short
        - delimiter: ", "
          wrap: parentheses
          group:
          - date: issued
            form: year
          - variable: locator
      legal-case:
      - title: primary
        form: short
        emph: true
        quote: false
      - delimiter: ", "
        wrap: parentheses
        group:
        - date: issued
          form: year
        - variable: locator
      personal-communication:
      - contributor: author
        form: long
        name-order: given-first
        suffix: ", personal communication"
      - delimiter: ", "
        wrap: parentheses
        group:
        - date: issued
          form: year-month-day
        - variable: locator
    template:
    - contributor: author
      form: short
    - title: primary
      form: short
    - delimiter: ", "
      wrap: parentheses
      group:
      - date: issued
        form: year
      - variable: locator
bibliography:
  options:
    hanging-indent: true
    separator: ". "
  type-variants:
    "article-journal, article-magazine":
    - contributor: author
      form: long
      suffix: "."
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      emph: true
    - items:
      - variable: genre
      - variable: medium
      delimiter: "; "
      wrap: brackets
      prefix: " "
    - number: edition
      wrap: parentheses
      prefix: " "
    - contributor: translator
      form: long
      name-order: given-first
      label: &id001 {term: translator, form: short, placement: suffix}
      wrap: parentheses
      prefix: " "
    - delimiter: ", "
      group:
      - title: parent-serial
        emph: true
      - items:
        - number: volume
          emph: true
        - number: issue
          wrap: parentheses
        delimiter: ""
    - number: pages
      prefix: ", "
      suffix: "."
    - variable: doi
      prefix: "https://doi.org/"
    - items:
      - date: accessed
        form: year-month-day
        prefix: "Retrieved "
        suffix: ", from"
      - variable: url
      delimiter: " "
      prefix: " "
    article-newspaper:
    - contributor: author
      form: long
      name-order: family-first
      suffix: "."
    - date: issued
      form: year-month-day
      wrap: parentheses
      prefix: " "
    - title: primary
      emph: false
    - title: parent-serial
      emph: true
      prefix: ". "
      suffix: "."
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      suffix: "."
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      emph: false
      suffix: "."
    - delimiter: ", "
      prefix: " In "
      suffix: "."
      group:
      - contributor: editor
        form: long
        name-order: given-first
      - delimiter: " "
        group:
        - title: parent-monograph
          emph: true
        - delimiter: ", "
          wrap: parentheses
          group:
          - number: collection-number
            prefix: "Vol. "
          - number: pages
            prefix: "pp. "
    - variable: publisher
      prefix: " "
      suffix: "."
    dataset:
    - contributor: author
      form: long
      name-order: family-first
      suffix: "."
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      emph: false
      suffix: " [Dataset]."
    - variable: publisher
      prefix: " "
      suffix: "."
    - variable: url
      prefix: " "
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
      suffix: "."
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      emph: false
      suffix: "."
    - delimiter: " "
      suffix: "."
      group:
      - title: parent-serial
        emph: true
      - delimiter: ", "
        wrap: parentheses
        group:
        - number: volume
          prefix: "Vol. "
        - number: pages
          prefix: "pp. "
    - variable: publisher
      prefix: " "
      suffix: "."
    "motion-picture, broadcast":
    - contributor: author
      form: long
      name-order: family-first
      suffix: "."
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      emph: true
    - variable: publisher
      prefix: ". "
      suffix: "."
    - variable: url
      prefix: " "
    interview:
    - contributor: author
      form: long
      name-order: family-first
      suffix: "."
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      emph: true
    - contributor: interviewer
      form: long
      name-order: family-first
      label: {term: interviewer, form: long, placement: suffix}
      wrap: parentheses
      prefix: " "
    - variable: publisher
      prefix: ". "
      suffix: "."
    - variable: url
      prefix: " "
  template:
  - contributor: author
    form: long
    suffix: "."
    name-order: family-first
  - date: issued
    form: year
    wrap: parentheses
    prefix: " "
  - title: primary
    emph: true
  - delimiter: "; "
    wrap: brackets
    prefix: " "
    group:
    - variable: genre
    - variable: medium
  - number: edition
    wrap: parentheses
    prefix: " "
  - delimiter: ""
    wrap: parentheses
    prefix: " "
    group:
    - term: volume
      form: short
      suffix: " "
    - number: volume
  - contributor: translator
    form: long
    name-order: given-first
    label: *id001
    wrap: parentheses
    prefix: " "
  - contributor: editor
    form: long
    name-order: given-first
    prefix: ". In "
  - title: parent-monograph
    emph: true
    prefix: ", "
  - delimiter: ", "
    group:
    - title: parent-serial
      emph: true
    - delimiter: ""
      group:
      - number: volume
        emph: true
      - number: issue
        wrap: parentheses
  - number: pages
    prefix: ", "
    suffix: "."
  - variable: publisher
    prefix: ". "
    suffix: "."
  - variable: doi
    prefix: "https://doi.org/"
  - delimiter: " "
    prefix: " "
    group:
    - date: accessed
      form: year-month-day
      prefix: "Retrieved "
      suffix: ", from"
    - variable: url
