info:
  title: American Meteorological Society
  description: A style for all journals by the American Meteorological Society
  fields:
  - geography
  source:
    csl-id: http://www.zotero.org/styles/american-meteorological-society
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Carl J. Schreck, III
      email: carl.schreck@gmail.com
    links:
    - href: http://www.zotero.org/styles/american-meteorological-society
      rel: self
    - href: http://www.zotero.org/styles/cold-spring-harbor-laboratory-press
      rel: template
    - href: https://www.ametsoc.org/ams/index.cfm/publications/authors/journal-and-bams-authors/formatting-and-manuscript-components/references/
      rel: documentation
options:
  substitute: editor-translator-title-short
  contributors:
    display-as-sort: first
    name-form: initials
    initialize-with: ". "
    shorten:
      min: 9
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    delimiter-precedes-et-al: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates: long
  titles: humanities
  page-range-format: expanded
citation:
  options:
    processing:
      disambiguate:
        names: false
        add-givenname: false
        year-suffix: true
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
  - contributor: author
    form: short
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
  - date: issued
    form: year
    prefix: " "
  - variable: locator
    prefix: ", "
  wrap: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: first
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 9
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      delimiter-precedes-et-al: always
      sort-separator: ", "
    subsequent-author-substitute: ——
    subsequent-author-substitute-rule: partial-each
    hanging-indent: true
    entry-suffix: .
    separator: ", "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      prefix: ": "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
      prefix: ". "
    - number: volume
    - number: pages
    - variable: doi
      prefix: https://doi.org/
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
  - title: primary
    prefix: ": "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - variable: publisher
    prefix: ". "
  - number: volume
  - number: pages
  - variable: doi
