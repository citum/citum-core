info:
  title: Institute for Operations Research and the Management Sciences
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/institute-for-operations-research-and-the-management-sciences
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Jim Xiaojin Liu
      email: liux1591@umn.edu
    links:
    - href: http://www.zotero.org/styles/institute-for-operations-research-and-the-management-sciences
      rel: self
    - href: https://pubsonline.informs.org/pb-assets/INFORMS_style_guide-1.6-1574695301483.pdf
      rel: documentation
    - href: https://pubsonline.informs.org/page/orsc/submission-guidelines
      rel: documentation
    - href: https://pubsonline.informs.org/pb-assets/INFORMSReferencesStyle-1513283897320.pdf
      rel: documentation
options:
  substitute: editor-short
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 11
      use-first: 7
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
  titles: humanities
  punctuation-in-quote: true
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: never
  template:
  - contributor: author
    form: short
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
  - date: issued
    form: year
    prefix: " "
  - variable: locator
  wrap: parentheses
  delimiter: ". "
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 11
        use-first: 7
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      sort-separator: " "
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  type-variants:
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - variable: publisher
    - variable: publisher-place
      prefix: ", "
    - number: pages
      prefix: ":"
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    wrap: parentheses
    prefix: " "
  - title: primary
    prefix: " "
  - items:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - items:
    - number: volume
    - number: issue
      wrap: parentheses
  - variable: publisher
  - variable: publisher-place
    prefix: ", "
  - number: pages
    prefix: ":"
