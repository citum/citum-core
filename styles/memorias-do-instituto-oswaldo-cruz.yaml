info:
  title: Memórias do Instituto Oswaldo Cruz
  id: http://www.zotero.org/styles/memorias-do-instituto-oswaldo-cruz
  default-locale: en-US
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
    - translator
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
      - key: year
        ascending: true
    group:
      template:
      - year
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: all
    initialize-with: ''
    shorten:
      min: 5
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    and: none
    delimiter-precedes-last: always
    sort-separator: ' '
    name-form: initials
  dates:
    month: long
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
    show-seconds: false
    show-timezone: false
    era-labels: default
    negative-unspecified-years: range
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  options:
    contributors:
      initialize-with: '. '
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      name-form: initials
  template:
  - contributor: author
    form: short
    name-order: family-first
  - date: issued
    form: year
    prefix: ' '
  - variable: locator
    prefix: ' '
  wrap:
    punctuation: parentheses
  delimiter: '. '
  multi-cite-delimiter: ', '
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ''
      delimiter-precedes-last: always
      sort-separator: ' '
      name-form: initials
    hanging-indent: true
    entry-suffix: .
    separator: '. '
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    prefix: ' '
  - title: primary
  - contributor: editor
    form: verb
    name-order: given-first
  - variable: publisher
    prefix: ', Ed.). '
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - variable: publisher-place
    prefix: ', '
  - number: volume
  - number: pages
    prefix: ': '
  type-variants:
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
      sort-separator: ' '
    - date: issued
      form: year
      prefix: ' '
      suffix: .
    - title: primary
    - contributor: editor
      form: long
      delimiter: ', '
      and: text
    - title: parent-serial
      emph: true
      strip-periods: false
    - number: volume
      strong: false
    - number: pages
      prefix: ': '
    legal_case:
    - contributor: author
      form: long
      name-order: family-first
      sort-separator: ' '
    - date: issued
      form: year
      prefix: ' '
      suffix: .
      suppress: false
    - title: primary
    - contributor: editor
      form: long
      delimiter: ', '
      and: text
    - variable: publisher
    - variable: publisher-place
    - title: parent-serial
    patent:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - date: issued
      form: year
      prefix: ' '
  sort:
    template:
    - key: author
      ascending: true
    - key: issued
      ascending: true
