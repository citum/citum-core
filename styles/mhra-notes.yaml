version: ""
info:
  title: MHRA Style Guide 4th edition (notes)
  id: http://www.zotero.org/styles/mhra-notes
  default-locale: en-GB
  short-name: "MHRA"
  edition: "4th edition"
options:
  locators:
    default-label-form: short
    range-format: expanded
    fallback-delimiter: ", "
  substitute:
    contributor-role-form: short
    template: []
  processing: note
  contributors:
    and: text
    delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
  page-range-format: minimal-two
citation:
  options:
    contributors:
      delimiter-precedes-last: contextual
      shorten:
        min: 4
        use-first: 1
        and-others: text
  subsequent:
    options:
      contributors:
        name-form: family-only
    template:
      - contributor: author
        form: short
      - title: primary
        form: short
        wrap: quotes
      - variable: locator
        prefix: ", "
  type-variants:
    article-journal:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        wrap: quotes
      - title: parent-serial
        emph: true
      - number: volume
      - date: issued
        form: year
        wrap: parentheses
        prefix: " "
      - number: pages
        prefix: ", pp. "
      - variable: locator
        wrap: parentheses
        prefix: " "
      - variable: doi
        prefix: ", doi:"
    article-magazine:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        wrap: quotes
      - title: parent-serial
        emph: true
      - number: volume
      - date: issued
        form: year
        wrap: parentheses
        prefix: " "
      - number: pages
        prefix: ", pp. "
      - variable: doi
        prefix: ", doi:"
    chapter:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        wrap: quotes
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - contributor: editor
        form: verb
        name-order: given-first
      - variable: publisher
        prefix: " ("
      - number: pages
        prefix: "pp. "
      - number: volume
      - variable: url
      - date: issued
        form: year
        wrap: parentheses
        prefix: " "
      - variable: doi
    dataset:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        wrap: quotes
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - contributor: editor
        form: verb
        name-order: given-first
      - variable: publisher
        prefix: " ("
      - number: pages
      - number: volume
      - variable: url
      - variable: doi
    entry-encyclopedia:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        wrap: quotes
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - contributor: editor
        form: verb
        name-order: given-first
      - variable: publisher
        prefix: " ("
      - number: pages
        prefix: "pp. "
      - number: volume
      - variable: url
      - date: issued
        form: year
        wrap: parentheses
        prefix: " "
      - variable: doi
    paper-conference:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
        wrap: quotes
      - title: parent-monograph
        emph: true
      - number: volume
      - date: issued
        form: year
        prefix: ", "
      - number: pages
        prefix: ", pp. "
      - variable: doi
        prefix: ", doi:"
    patent:
      - contributor: author
        form: long
        name-order: given-first
      - title: primary
      - number: number
        prefix: ", Patent "
      - delimiter: none
        group:
          - date: issued
            form: month-day
            prefix: ", issued "
          - date: issued
            form: year
            prefix: ", "
    interview:
      - contributor: interviewer
        form: long
        name-order: given-first
      - title: primary
        wrap: quotes
      - contributor: author
        form: long
        prefix: ", interview with "
      - date: issued
        form: month-day
        prefix: ", "
      - variable: medium
        prefix: ", "
      - variable: url
  template:
    - contributor: author
      form: long
      name-order: given-first
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: given-first
    - variable: publisher
      prefix: " ("
    - number: pages
    - number: volume
    - variable: url
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    - variable: doi
  suffix: .
  delimiter: ", "
  multi-cite-delimiter: "; "
bibliography:
  options:
    subsequent-author-substitute: ——
    subsequent-author-substitute-rule: partial-first
    hanging-indent: true
    separator: " "
    contributors:
      shorten:
        min: 5
        use-first: 1
        and-others: text
  type-variants:
