      - title: primary
        wrap: quotes
      - title: parent-serial
        emph: true
      - number: volume
      - number: pages
      - variable: doi
      - variable: url
    chapter:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
        wrap: quotes
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - contributor: editor
        form: verb
        name-order: given-first
      - variable: publisher
        prefix: " ("
      - number: volume
      - date: issued
        form: year
        prefix: " "
      - number: pages
        prefix: "pp. "
      - variable: doi
      - variable: url
    dataset:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
        wrap: quotes
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - contributor: editor
        form: verb
        name-order: given-first
      - variable: publisher
        prefix: " ("
      - number: volume
      - number: pages
      - variable: doi
      - variable: url
    entry-encyclopedia:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
        wrap: quotes
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - contributor: editor
        form: verb
        name-order: given-first
      - variable: publisher
        prefix: " ("
      - number: volume
      - date: issued
        form: year
        prefix: " "
      - number: pages
        prefix: "pp. "
      - variable: doi
      - variable: url
    paper-conference:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
        wrap: quotes
      - title: parent-monograph
        emph: true
      - number: volume
      - date: issued
        form: year
        prefix: " "
      - number: pages
        prefix: "pp. "
      - variable: doi
      - variable: url
    patent:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - number: number
        prefix: ", Patent "
      - delimiter: none
        group:
          - date: issued
            form: month-day
            prefix: ", issued "
          - date: issued
            form: year
            prefix: ", "
    personal_communication: []
    personal-communication: []
    interview:
      - contributor: interviewer
        form: long
        name-order: family-first
      - title: primary
        wrap: quotes
      - contributor: author
        form: long
        prefix: ", interview with "
      - date: issued
        form: month-day
        prefix: ", "
      - variable: medium
        prefix: ", "
      - variable: url
    book:
      - contributor: author
        form: long
        name-order: family-first
      - title: primary
      - contributor: translator
        form: long
        prefix: ", trans. by "
      - variable: publisher
        prefix: " ("
      - date: issued
        form: year
        prefix: ", "
        suffix: ")"
    motion_picture:
      - contributor: author
        form: long
        name-order: family-first
      - date: issued
        form: year
        prefix: " "
      - title: primary
        wrap: quotes
      - variable: genre
      - variable: medium
      - contributor: director
        form: long
        prefix: "Directed by "
  template:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - contributor: editor
      form: verb
      name-order: given-first
    - variable: publisher
      prefix: " ("
    - number: volume
    - date: issued
      form: year
      prefix: " "
    - number: pages
    - variable: doi
    - variable: url
  sort:
    template:
      - key: author
        ascending: true
      - key: title
        ascending: true
      - key: issued
        ascending: true
      - key: issued
        ascending: true
      - key: issued
        ascending: true
