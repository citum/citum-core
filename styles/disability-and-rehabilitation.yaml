extends: elsevier-with-titles
info:
  title: Disability and Rehabilitation
  id: http://www.zotero.org/styles/disability-and-rehabilitation
  default-locale: en-US
options:
  substitute:
    contributor-role-form: short
    template:
    - editor
  contributors:
    display-as-sort: all
    initialize-with: ''
    shorten:
      min: 11
      use-first: 10
      and-others: et-al
      delimiter-precedes-last: contextual
    and: none
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ' '
    name-form: initials
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ''
      shorten:
        min: 11
        use-first: 10
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      sort-separator: ' '
      name-form: initials
    separator: ': '
