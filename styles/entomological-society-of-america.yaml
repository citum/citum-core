extends: elsevier-harvard
info:
  title: Entomological Society of America
  fields:
  - biology
  source:
    csl-id: http://www.zotero.org/styles/entomological-society-of-america
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/entomological-society-of-america
      rel: self
    - href: http://www.zotero.org/styles/elsevier-harvard
      rel: template
    - href: http://www.entsoc.org/pubs/publish/style
      rel: documentation
options:
  substitute: editor-translator-title-long
  contributors: numeric-medium
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: .
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ', '
  type-variants:
    article-newspaper:
    - contributor: author
      form: short
      name-order: family-first
    - variable: locator
    patent:
    - contributor: author
      form: short
      name-order: family-first
    - variable: locator
  template:
  - contributor: author
    form: short
    name-order: family-first
  - date: issued
    form: year
    prefix: ' '
  - variable: locator
  wrap:
    punctuation: parentheses
  delimiter: '. '
  multi-cite-delimiter: ', '
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ''
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ', '
      delimiter-precedes-last: always
      sort-separator: ' '
    hanging-indent: false
    entry-suffix: .
    separator: '. '
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 3
    - date: issued
      form: year
      prefix: ' '
    - title: primary
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 3
      - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: publisher
    - number: pages
    - variable: doi
      prefix: https://doi.org/
    - variable: publisher-place
    - variable: url
    article-newspaper:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
