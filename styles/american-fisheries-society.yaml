info:
  title: American Fisheries Society
  fields:
  - biology
  source:
    csl-id: http://www.zotero.org/styles/american-fisheries-society
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/american-fisheries-society
      rel: self
    - href: http://www.zotero.org/styles/ecology
      rel: template
    - href: https://fisheries.org/wp-content/uploads/2016/01/References.pdf
      rel: documentation
options:
  substitute:
    contributor-role-form: long
    template:
    - editor
    - translator
    - title
  processing:
    sort:
      shorten-names: false
      render-substitutions: false
      template:
      - key: year
        ascending: true
      - key: author
        ascending: true
    group:
      template:
      - year
      - author
    disambiguate:
      names: false
      add-givenname: false
      year-suffix: true
  contributors:
    display-as-sort: first
    name-form: initials
    initialize-with: ". "
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ", "
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  punctuation-in-quote: true
citation:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 3
      use-first: 1
  - date: issued
    form: year
    prefix: " "
  - variable: locator
    prefix: " "
  wrap:
    punctuation: parentheses
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      display-as-sort: first
      name-form: initials
      initialize-with: ". "
      and: text
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: ", "
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  type-variants:
    book:
    - contributor: author
      form: long
      name-order: family-first
      and: text
    - date: issued
      form: year
    - title: primary
    - variable: publisher
    - number: volume
      prefix: ", "
    - variable: publisher-place
      prefix: ", "
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      and: text
    - date: issued
      form: year
    - title: primary
    - group:
      - number: pages
        label-form: long
        text-case: capitalize-first
      - message: pattern.in-container
        args:
          container:
            group:
              - contributor: editor
                form: long
                name-order: given-first
                and: text
                label:
                  term: editor
                  form: long
                  placement: suffix
              - title: parent-monograph
            delimiter: ". "
    - title: parent-serial
    - variable: publisher
    - number: volume
      prefix: ", "
    - variable: publisher-place
      prefix: ", "
    legal_case:
    - contributor: author
      form: long
      sort-separator: ", "
      and: text
    - date: issued
      form: year
    - message: term.no-date
      form: short
      wrap:
        punctuation: parentheses
        inner-prefix: " "
        inner-suffix: .
    - title: primary
    - variable: authority
    - contributor: editor
      form: long
      delimiter: ", "
      and: text
    - title: parent-serial
    - number: edition
      prefix: ", "
    - variable: genre
    - variable: publisher
    - variable: publisher-place
    entry-encyclopedia:
      extends: legal_case
      remove:
        - match:
            variable: authority
        - match:
            contributor: editor
        - match:
            title: parent-serial
        - match:
            number: edition
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
  - title: primary
  - title: parent-monograph
  - title: parent-serial
  - variable: publisher-place
  - number: pages
  - contributor: editor
    form: verb
    name-order: given-first
    prefix: " in "
  - variable: publisher
    prefix: ", editor. "
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  sort: author-date-title
