info:
  title: AMA Manual of Style 11th edition (sorted alphabetically)
  description: 'AMA Manual of Style: A Guide for Authors and Editors (11th ed.), with alphabetically sorted bibliography.'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/american-medical-association-alphabetical
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      uri: https://orcid.org/0000-0001-5192-6856
    links:
    - href: http://www.zotero.org/styles/american-medical-association-alphabetical
      rel: self
    - href: http://www.zotero.org/styles/american-medical-association
      rel: template
    - href: https://academic.oup.com/amamanualofstyle
      rel: documentation
options:
  locators:
    strip-label-periods: true
  substitute:
    contributor-role-form: short
    template:
    - editor
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: ""
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates:
    month: long
    uncertainty-marker: "?"
    approximation-marker: "ca. "
    range-delimiter: –
  titles: humanities
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  template:
  - delimiter: none
    group:
    - number: citation-number
    - variable: locator
      wrap: parentheses
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten: &id001
        min: 8
        use-first: 3
    - title: primary
      prefix: " "
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: ". 2013:"
    - variable: doi
    - variable: url
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: ". 2013:"
    - variable: doi
    - variable: url
    broadcast:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: ". 2013:"
    - variable: doi
    - variable: url
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: ". 2013:"
    - variable: doi
    - variable: url
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: ". 2013:"
    - variable: doi
    - variable: url
    patent:
    - contributor: author
      form: long
      name-order: family-first
      shorten: *id001
    - title: primary
      prefix: " "
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - items:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - variable: publisher
    - number: pages
      prefix: ". 2013:"
    - variable: doi
