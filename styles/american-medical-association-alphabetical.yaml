  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten: *id001
  - title: primary
    prefix: " "
  - items:
    - number: volume
    - number: issue
      wrap: parentheses
  - items:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - variable: publisher
  - date: issued
    form: year
    prefix: "; "
