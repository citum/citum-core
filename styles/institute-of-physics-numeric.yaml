version: ''
info:
  title: Institute of Physics (numeric)
  id: http://www.zotero.org/styles/institute-of-physics-numeric
  default-locale: en-US
options:
  substitute:
    template:
    - editor
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ''
    shorten:
      min: 5
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    and: none
    delimiter-precedes-last: always
    sort-separator: ' '
    name-form: initials
  dates:
    month: long
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  titles:
    component: {}
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  template:
  - number: citation-number
  wrap: brackets
  multi-cite-delimiter: ','
  collapse: citation-number
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ' '
      shorten:
        min: 99
        use-first: 98
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: never
      sort-separator: ' '
      name-form: initials
    separator: ' '
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
    prefix: ' '
  - title: parent-monograph
    emph: true
  - title: parent-serial
    emph: true
  - number: volume
  - number: pages
  - variable: publisher-place
  - variable: publisher
    prefix: ': '
  type-variants:
    legal_case:
    - number: citation-number
      wrap: brackets
    - contributor: author
      form: long
      sort-separator: ' '
      shorten:
        min: 99
        use-first: 98
        and-others: et-al
        delimiter-precedes-last: never
      and: text
    - date: issued
      form: year
      suppress: false
    - title: primary
    - term: volume
      form: short
      strip-periods: true
    - number: volume
      suppress: false
    - contributor: editor
      form: long
      delimiter: ', '
      shorten:
        min: 99
        use-first: 98
        and-others: et-al
        delimiter-precedes-last: never
      and: text
      strip-periods: true
    - variable: publisher-place
    - variable: publisher
    - title: parent-serial
    patent:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
      prefix: ' '

