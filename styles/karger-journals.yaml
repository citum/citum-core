version: ''
info:
  title: Karger journals
  id: http://www.zotero.org/styles/karger-journals
  default-locale: en-US
options:
  substitute:
    template:
    - editor
  processing: numeric
  contributors:
    display-as-sort: all
    initialize-with: ''
    shorten:
      min: 7
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
    and: none
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ' '
    name-form: initials
  dates:
    month: short
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
    show-seconds: false
    show-timezone: false
  page-range-format: minimal
  punctuation-in-quote: true
citation:
  template:
  - number: citation-number
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ','
  collapse: citation-number
bibliography:
  options:
    contributors:
      display-as-sort: all
      initialize-with: ''
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      sort-separator: ' '
      name-form: initials
    entry-suffix: .
    separator: '. '
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 6
      and-others: et-al
      delimiter-precedes-last: contextual
  - title: primary
    prefix: ' '
  - date: issued
    form: year
  - group:
    - contributor: editor
      form: verb
    - title: parent-monograph
  - title: parent-serial
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - number: pages
    prefix: ':'
  - variable: publisher-place
  - variable: publisher
    prefix: ': '
  - variable: url
  type-variants:
    legal_case:
    - number: citation-number
      suffix: ' '
    - contributor: author
      form: long
      sort-separator: ' '
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: always
      strip-periods: true
    - title: primary
    - number: edition
    - term: edition
      form: short
      strip-periods: true
    - variable: publisher-place
    - variable: publisher
    - date: issued
      form: year
      suppress: false
    - title: parent-serial
    patent:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: contextual
    - title: primary
      prefix: ' '
    - date: issued
      form: year

