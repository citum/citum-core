preset: nlm-citation-sequence
info:
  title: 'NLM Style Guide (Vancouver): Citing Medicine 2nd edition (citation-sequence, superscript)'
  description: 'Citing Medicine: The NLM Style Guide for Authors, Editors, and Publishers, 2nd edition (2015), based on ANSI/NISO Z39.29-2005 (R2010); citation-sequence system, with superscripted in-text indicators.'
  fields:
    - medicine
  source:
    csl-id: http://www.zotero.org/styles/nlm-citation-sequence-superscript
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
      - name: Michael Berkowitz
        email: mberkowi@gmu.edu
    links:
      - href: http://www.zotero.org/styles/nlm-citation-sequence-superscript
        rel: self
      - href: http://www.zotero.org/styles/nlm-citation-sequence
        rel: template
      - href: https://www.nlm.nih.gov/citingmedicine
        rel: documentation
      - href: https://www.nlm.nih.gov/bsd/uniform_requirements.html
        rel: documentation
      - href: https://www.icmje.org/recommendations/
        rel: documentation
citation:
  use-preset: numeric-citation
  multi-cite-delimiter: ','
