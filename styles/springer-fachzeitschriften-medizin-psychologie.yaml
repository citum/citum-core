info:
  title: Springer - Fachzeitschriften Medizin Psychologie (Deutsch)
  description: Springer Basic style (German, numeric, brackets, alphabetical) for Springer journals in medicine and psychology.
  fields:
  - medicine
  - psychology
  source:
    csl-id: http://www.zotero.org/styles/springer-fachzeitschriften-medizin-psychologie
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Philipp Zumstein
      uri: https://github.com/zuphilip
    links:
    - href: http://www.zotero.org/styles/springer-fachzeitschriften-medizin-psychologie
      rel: self
    - href: http://www.zotero.org/styles/springer-basic-brackets-no-et-al-alphabetical
      rel: template
    - href: http://static.springer.com/sgw/documents/135255/application/pdf/Musterbeitrag_Uebersichten_Leitthema_Schwerpunkt.pdf
      rel: documentation
    - href: http://static.springer.com/sgw/documents/69331/application/pdf/Leitfaden_Uebersichten_Leitthemen_Schwerpunkt.pdf
      rel: documentation
options:
  substitute:
    template:
    - editor
    - translator
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ""
    shorten:
      min: 5
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter-precedes-last: always
    delimiter-precedes-et-al: never
    demote-non-dropping-particle: sort-only
    sort-separator: " "
  dates: long
citation:
  use-preset: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 5
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter-precedes-last: always
      delimiter-precedes-et-al: never
      sort-separator: " "
    separator: ". "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 3
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ":"
    - variable: publisher
    - number: pages
      prefix: ", pp "
    - variable: doi
      prefix: https://doi.org/
    - variable: publisher-place
      prefix: ", "
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 3
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - variable: publisher
    - number: pages
      prefix: ", pp "
    - variable: doi
    - variable: publisher-place
      prefix: ", "
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 5
        use-first: 3
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    - title: primary
      prefix: " "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
        prefix: "on "
      - title: parent-monograph
    - title: parent-serial
    - number: volume
    - number: issue
      prefix: ":"
    - variable: publisher
    - number: pages
      prefix: ", pp "
    - variable: doi
    - variable: publisher-place
      prefix: ", "
    webpage:
    - number: citation-number
      suffix: ". "
    - contributor: author
      form: long
      sort-separator: " "
      shorten:
        min: 5
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: always
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
    - title: primary
      suffix: ". "
    - variable: url
      suffix: ". "
    - term: accessed
      form: long
      suffix: ": "
    - date: accessed
      form: year
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 5
      use-first: 3
  - date: issued
    form: year
    wrap:
      punctuation: parentheses
    prefix: " "
  - title: primary
    prefix: " "
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
  - title: parent-serial
  - number: volume
  - number: issue
    prefix: ":"
  - variable: publisher
  - number: pages
    prefix: ", pp "
  - variable: doi
  - variable: publisher-place
    prefix: ", "
  sort: author-date-title
