info:
  title: MHRA Style Guide 4th edition (notes, place of publication, without URLs)
  description: MHRA source citations, notes system, with place of publication (MHRA 7.3), without URLs
  fields:
    - history
    - humanities
    - linguistics
    - literature
    - philosophy
    - theology
  source:
    csl-id: http://www.zotero.org/styles/mhra-notes-publisher-place-no-url
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
      - name: Andrew Dunning
        uri: https://orcid.org/0000-0003-0464-5036
    links:
      - href: http://www.zotero.org/styles/mhra-notes-publisher-place-no-url
        rel: self
      - href: http://www.zotero.org/styles/mhra-notes
        rel: template
      - href: https://www.mhra.org.uk/style/
        rel: documentation
options:
  locators:
    default-label-form: short
    range-format: expanded
    fallback-delimiter: ', '
  substitute:
    contributor-role-form: short
    template: []
  processing: note
  contributors:
    and: text
    delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates:
    month: long
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
  page-range-format: minimal-two
citation:
  options:
    contributors:
      delimiter-precedes-last: contextual
      shorten:
        min: 4
        use-first: 1
        and-others: text
  subsequent:
    options:
      contributors:
        name-form: family-only
    template:
      - contributor: author
        form: short
      - title: primary
        form: short
        wrap:
          punctuation: quotes
      - variable: locator
        prefix: ', '
  type-variants:
    article-journal:
      - contributor: author
        form: long
        name-order: given-first
        shorten:
          min: 4
          use-first: 1
          and-others: text
      - title: primary
        wrap:
          punctuation: quotes
      - title: parent-monograph
        emph: true
      - title: parent-serial
        emph: true
      - contributor: editor
        form: verb
        name-order: given-first
        shorten:
          min: 4
          use-first: 1
      - variable: publisher-place
        prefix: ' ('
      - variable: publisher
        prefix: ': '
      - group:
          - number: volume
          - number: issue
            prefix: '.'
        delimiter: ""
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
        prefix: ' '
      - number: pages
        prefix: 'pp. '
        show-with-locator: true
      - variable: locator
        wrap:
          punctuation: parentheses
        prefix: ' '
