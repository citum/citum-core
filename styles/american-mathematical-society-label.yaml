extends: elsevier-with-titles
info:
  title: American Mathematical Society (label)
  fields:
  - math
  source:
    csl-id: http://www.zotero.org/styles/american-mathematical-society-label
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: American Mathematical Society
      email: tech-support@ams.org
      uri: https://www.ams.org
    links:
    - href: http://www.zotero.org/styles/american-mathematical-society-label
      rel: self
    - href: http://www.zotero.org/styles/elsevier-with-titles
      rel: template
    - href: https://www.ams.org/arc/styleguide
      rel: documentation
    - href: https://mirrors.ctan.org/biblio/bibtex/contrib/misc/amsplain.bst
      rel: documentation
options:
  processing:
    label:
      preset: ams
      single-author-chars: 4
      et-al-min: 5
      et-al-marker: ''
  contributors:
    display-as-sort: all
    delimiter: ', '
    delimiter-precedes-last: always
    sort-separator: ', '
  titles:
    monograph:
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
citation:
  sort: author-date-title
  template:
  - number: citation-label
  wrap:
    punctuation: brackets
  delimiter: ''
  multi-cite-delimiter: ', '
bibliography:
  options:
    contributors:
      display-as-sort: all
      delimiter: ', '
      delimiter-precedes-last: always
      sort-separator: ', '
    entry-suffix: .
    separator: ', '
  type-variants:
    article-journal:
    - number: citation-label
      wrap:
        punctuation: brackets
      suffix: ' '
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
    - number: volume
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: ' '
    - number: pages
      prefix: ' '
    chapter:
    - number: citation-label
      wrap:
        punctuation: brackets
      suffix: ' '
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
    - number: volume
    - number: pages
      prefix: 'pp. '
    paper-conference:
    - number: citation-label
      wrap:
        punctuation: brackets
      suffix: ' '
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
    - number: volume
    - date: issued
      form: year
    - number: pages
      prefix: 'pp. '
  template:
  - number: citation-label
    wrap:
      punctuation: brackets
    suffix: ' '
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
  - title: parent-monograph
  - title: parent-serial
  - variable: publisher
  - variable: publisher-place
  - number: volume
  - date: issued
    form: year
  - number: pages
    prefix: ' '
