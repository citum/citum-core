info:
  title: AIP Style Manual 4th edition
  description: Common style used by AIP publications.
  fields:
  - physics
  source:
    csl-id: http://www.zotero.org/styles/american-institute-of-physics
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Richard Karnesky
      email: karnesky+zotero@gmail.com
      uri: http://arc.nucapt.northwestern.edu/Richard_Karnesky
    links:
    - href: http://www.zotero.org/styles/american-institute-of-physics
      rel: self
    - href: http://www.aip.org/pubservs/style/4thed/toc.html
      rel: documentation
    - href: https://publishing.aip.org/wp-content/uploads/2021/03/AIP_Style_4thed.pdf
      rel: documentation
options:
  substitute: editor-translator-long
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: .
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
  dates: long
  titles: humanities
  bibliography:
    entry-suffix: .
    separator: ", "
  punctuation-in-quote: true
citation:
  use-preset: numeric-citation
  collapse: citation-number
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: .
      delimiter-precedes-last: always
  type-variants:
    chapter:
    - contributor: author
      form: long
      name-order: given-first
    - title: primary
      wrap: quotes
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - number: pages
      prefix: "pp. "
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    paper-conference:
    - contributor: author
      form: long
      name-order: given-first
    - title: primary
      wrap: quotes
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - number: pages
      prefix: "pp. "
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
    patent:
    - number: citation-number
    - contributor: author
      form: long
      and: text
    - date: issued
      form: year
    - term: no-date
      form: short
    personal_communication:
    - contributor: author
      form: long
      name-order: given-first
      prefix: "pp. "
    - title: primary
      wrap: quotes
    - title: parent-monograph
    - title: parent-serial
    - variable: publisher
    - variable: publisher-place
    - items:
      - number: volume
      - number: issue
        wrap: parentheses
    - number: pages
    - date: issued
      form: year
      wrap: parentheses
      prefix: " "
  template:
  - contributor: author
    form: long
    name-order: given-first
  - title: primary
    wrap: quotes
  - title: parent-monograph
  - title: parent-serial
  - variable: publisher
  - variable: publisher-place
  - items:
    - number: volume
    - number: issue
      wrap: parentheses
  - number: pages
  - date: issued
    form: year
    wrap: parentheses
    prefix: " "
