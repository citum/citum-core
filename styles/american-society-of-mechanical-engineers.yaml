extends: ieee
info:
  title: American Society of Mechanical Engineers
  description: A style for the ASME's 23 journals
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/american-society-of-mechanical-engineers
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Richard Karnesky
      email: karnesky+zotero@gmail.com
      uri: http://arc.nucapt.northwestern.edu/Richard_Karnesky
    links:
    - href: http://www.zotero.org/styles/american-society-of-mechanical-engineers
      rel: self
    - href: http://www.zotero.org/styles/ieee
      rel: template
    - href: https://www.asme.org/publications-submissions/journals/information-for-authors/journal-guidelines/references
      rel: documentation
options:
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: '. '
    delimiter: ', '
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ', '
  titles: journal-emphasis
citation:
  extends: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ','
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: '. '
      delimiter: ', '
      delimiter-precedes-last: always
      sort-separator: ', '
    entry-suffix: .
    separator: ', '
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: url
    - variable: publisher
    - number: pages
      prefix: 'pp. '
    - variable: doi
      prefix: https://doi.org/
    - variable: publisher-place
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: url
    - variable: publisher
    - number: pages
      prefix: 'pp. '
    - variable: doi
      prefix: '. '
    - variable: publisher-place
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: url
    - variable: publisher
    - number: pages
      prefix: 'pp. '
    - variable: doi
      prefix: '. '
    - variable: publisher-place
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: url
    - variable: publisher
    - number: pages
      prefix: 'pp. '
    - variable: doi
      prefix: '. '
    - variable: publisher-place
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - title: parent-monograph
    - title: parent-serial
    - group:
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
    - variable: url
    - variable: publisher
    - number: pages
      prefix: 'pp. '
    - variable: doi
      prefix: '. '
    - variable: publisher-place
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
  - title: primary
    wrap:
      punctuation: quotes
  - title: parent-monograph
  - title: parent-serial
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
  - variable: url
  - variable: publisher
  - number: pages
  - variable: doi
    prefix: '. '
  - variable: publisher-place
