info:
  title: IEEE Reference Guide version 11.29.2023
  description: IEEE style as per the 2023 guidelines.
  fields:
  - engineering
  source:
    csl-id: http://www.zotero.org/styles/ieee
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Michael Berkowitz
      email: mberkowi@gmu.edu
    links:
    - href: http://www.zotero.org/styles/ieee
      rel: self
    - href: 
        https://journals.ieeeauthorcenter.ieee.org/your-role-in-article-production/ieee-editorial-style-manual/
      rel: documentation
  short-name: "IEEE"
options:
  substitute: editor-translator-short
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: ". "
    demote-non-dropping-particle: sort-only
  dates: short
  titles: humanities
  bibliography:
    separator: ", "
  punctuation-in-quote: true
citation:
  template:
  - delimiter: none
    wrap: brackets
    items:
    - number: citation-number
    - variable: locator
      prefix: ", "
  multi-cite-delimiter: ", "
bibliography:
  options:
    contributors:
      name-form: initials
      initialize-with: ". "
      delimiter-precedes-last: never
  type-variants:
    article-journal:
    - delimiter: ""
      items:
      - number: citation-number
        wrap: brackets
      - contributor: author
        form: long
        and: text
        name-order: given-first
        shorten: &id001
          min: 8
          use-first: 1
    - title: primary
      wrap: quotes
    - title: parent-monograph
      emph: true
    - title: parent-serial
      emph: true
    - number: edition
    - number: volume
      prefix: ", vol. "
    - number: issue
      prefix: ", no. "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - number: pages
      prefix: "pp. "
    - date: issued
      form: year
    - variable: doi
      prefix: ", doi: "
    - variable: url
