locale-schema-version: "2"
locale: es-ES

evaluation:
  message-syntax: mf2

dates:
  months:
    long:
      - enero
      - febrero
      - marzo
      - abril
      - mayo
      - junio
      - julio
      - agosto
      - septiembre
      - octubre
      - noviembre
      - diciembre
    short:
      - ene.
      - feb.
      - mar.
      - abr.
      - may.
      - jun.
      - jul.
      - ago.
      - sept.
      - oct.
      - nov.
      - dic.
  seasons:
    - primavera
    - verano
    - otoño
    - invierno

roles:
  author:
    long:
  chair:
    long:
      singular: presidente
      plural: presidentes
    verb: presidido por
  collection-editor:
    long:
      singular:
        masculine: director
        feminine: directora
        common: persona directora
      plural:
        masculine: directores
        feminine: directoras
        common: equipo editorial
    short:
      singular: dir.
      plural: dirs.
    verb: bajo la dirección de
    verb-short: dir. de
  contributor:
    long:
      singular: colaborador
      plural: colaboradores
    short:
      singular: colab.
      plural: colabs.
    verb: con
  director:
    long:
      singular:
        masculine: director
        feminine: directora
        common: persona directora
      plural:
        masculine: directores
        feminine: directoras
        common: equipo de dirección
    short:
      singular: dir.
      plural: dirs.
    verb: dirigido por
    verb-short: dir. por
  editor:
    long:
      singular:
        masculine: editor
        feminine: editora
        common: persona editora
      plural:
        masculine: editores
        feminine: editoras
        common: equipo editorial
    short:
      singular: ed.
      plural: eds.
    verb: role.editor.verb
    verb-short: ed. por
  editorial-director:
    long:
      singular:
        masculine: director editorial
        feminine: directora editorial
        common: dirección editorial
      plural:
        masculine: directores editoriales
        feminine: directoras editoriales
        common: dirección editorial
    short:
      singular: dir. ed.
      plural: dirs. ed.
    verb: bajo la dirección editorial de
    verb-short: dir. ed. de
  illustrator:
    long:
      singular:
        masculine: ilustrador
        feminine: ilustradora
        common: persona ilustradora
      plural:
        masculine: ilustradores
        feminine: ilustradoras
        common: equipo de ilustración
    short:
      singular: il.
      plural: ils.
    verb: ilustrado por
    verb-short: il. por
  interviewer:
    long:
      singular:
        masculine: entrevistador
        feminine: entrevistadora
        common: persona entrevistadora
      plural:
        masculine: entrevistadores
        feminine: entrevistadoras
        common: equipo entrevistador
    verb: entrevistado por
  recipient:
    long:
    verb: a
  reviewed-author:
    long:
    verb: por
  translator:
    long:
      singular:
        masculine: traductor
        feminine: traductora
        common: persona traductora
      plural:
        masculine: traductores
        feminine: traductoras
        common: equipo de traducción
    short:
      singular: trad.
      plural: trads.
    verb: traducido por
    verb-short: trad. por

locators:
  chapter:
    long:
      singular: capítulo
      plural: capítulos
    short:
      singular: cap.
      plural: caps.
  issue:
    long:
      singular: número
      plural: números
    short:
      singular: n.º
      plural: n.os
  page:
    long:
      singular: página
      plural: páginas
    short:
      singular: p.
      plural: pp.
    gender: feminine
  section:
    long:
      singular: sección
      plural: secciones
    short:
      singular: §
      plural: §§
    symbol:
      singular: §
      plural: §§
    gender: feminine
  volume:
    long:
      singular: volumen
      plural: volúmenes
    short:
      singular: vol.
      plural: vols.
    gender: masculine

terms:
  and:
    long: y
  anonymous:
    long: anónimo
    short: anón.
  et_al:
    long: et al.
  "no date":
    long: s. f.

messages:
  # Locator labels
  term.page-label: |
    .match {$count :plural}
    when one {p.}
    when * {pp.}
  term.page-label-long: |
    .match {$count :plural}
    when one {página}
    when * {páginas}
  term.chapter-label: |
    .match {$count :plural}
    when one {cap.}
    when * {caps.}
  term.chapter-label-long: |
    .match {$count :plural}
    when one {capítulo}
    when * {capítulos}
  term.volume-label: |
    .match {$count :plural}
    when one {vol.}
    when * {vols.}
  term.volume-label-long: |
    .match {$count :plural}
    when one {volumen}
    when * {volúmenes}
  term.section-label: |
    .match {$count :plural}
    when one {§}
    when * {§§}
  term.section-label-long: |
    .match {$count :plural}
    when one {sección}
    when * {secciones}
  # Issue locator labels (n.º / n.os, número / números) live in the
  # `locators:` map above — Locale::locator_message_id does not yet route
  # LocatorType::Issue through MF2.
  # Conjunctions and connectors
  term.and: "y"
  term.and-symbol: "&"
  term.et-al: "et al."
  term.and-others: "y otros"
  # Date and access terms
  term.accessed: "consultado"
  term.retrieved: "recuperado"
  term.no-date: "s. f."
  term.no-date-long: "sin fecha"
  term.forthcoming: "en prensa"
  term.circa: "ca."
  term.circa-long: "hacia"
  # Role labels
  role.editor.verb: |
    .match {$gender :select}
    when masculine {editado por}
    when feminine {editada por}
    when common {persona editora}
    when * {editado por}
  role.editor.label-long: |
    .match {$gender :select} {$count :plural}
    when masculine one {editor}
    when masculine * {editores}
    when feminine one {editora}
    when feminine * {editoras}
    when common one {persona editora}
    when common * {equipo editorial}
    when * * {equipo editorial}
  role.translator.label-long: |
    .match {$gender :select} {$count :plural}
    when masculine one {traductor}
    when masculine * {traductores}
    when feminine one {traductora}
    when feminine * {traductoras}
    when common one {persona traductora}
    when common * {equipo de traducción}
    when * * {equipo de traducción}
  # Compositional patterns
  pattern.page-range: "{$start}–{$end}"
  pattern.retrieved-from: "recuperado de {$url}"
  pattern.available-at: "disponible en {$url}"
  date.open-ended: "presente"

date-formats:
  numeric-short: "d/M/yyyy"
  textual-long: "MMMM yyyy"
  textual-full: "d 'de' MMMM 'de' yyyy"
  bib-default: "d 'de' MMMM 'de' yyyy"
  year-only: "yyyy"
  iso: "yyyy-MM-dd"

grammar-options:
  punctuation-in-quote: false
  nbsp-before-colon: false
  open-quote: "«"
  close-quote: "»"
  open-inner-quote: "“"
  close-inner-quote: "”"
  serial-comma: false
  page-range-delimiter: "–"

legacy-term-aliases:
  page: term.page-label
  pages: term.page-label
  et_al: term.et-al
  and: term.and
  accessed: term.accessed
  retrieved: term.retrieved
  no_date: term.no-date
  "no date": term.no-date
