      name-order: family-first
      delimiter: { mark: comma }
      sort-separator: ' '
      label:
        term: translator
        form: short
        placement: suffix
        prefix: { mark: comma }
      suffix: '. '
    - group:
      - group:
        - group:
          - title: container-title
            strip-periods-all: true
          - group:
            - date: issued
              form: year
              fallback: []
            render-when:
              field-present: volume-or-issue
          - group:
            # Online-first article: no volume/issue assigned yet, so GB/T
            # cites the full publication date instead of a bare year.
            - date: issued
              form: year-month-day
              fallback: []
            render-when:
              field-absent: volume-or-issue
          - number: volume
          delimiter: { mark: comma }
        - number: issue
