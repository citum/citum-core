        - number: pages
        delimiter: { mark: colon }
      delimiter: '. '
    - variable: url
      prefix: '. '
    - identifier: cstr
      prefix: '. CSTR:'
    - variable: doi
      prefix: '. DOI:'
    periodical:
    - number: citation-number
