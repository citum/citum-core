        carrier: { carrier: { online: OL, absent: '-' } }
      wrap:
        punctuation: brackets
      suffix: '. '
    - variable: version
      prefix: V
      suffix: '. '
      strip-periods: true
    - variable: publisher
    - date: issued
      form: year-month-day
      fallback: []
      wrap: parentheses
    - date: accessed
      form: year-month-day
      wrap:
        punctuation: brackets
      suffix: '. '
    - variable: url
    - identifier: cstr
      prefix: '. CSTR:'
    - variable: doi
      prefix: '. DOI:'
    article-journal,article-magazine:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      name-order: family-first
      delimiter: { mark: comma }
      sort-separator: ' '
      suffix: '. '
    - title: primary
    - message: gb-t-7714-type-code
      args:
        type: { reference-type: key }
        carrier: { carrier: { online: OL, absent: '-' } }
      wrap:
