        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      suppress: false
    - group:
      - number: edition
      delimiter: ' '
      suppress: false
    - variable: url
      suppress: false
    - identifier: cstr
      prefix: 'CSTR:'
    - variable: doi
      prefix: 'DOI:'
      suppress: false
