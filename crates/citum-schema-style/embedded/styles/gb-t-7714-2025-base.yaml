      suppress: true
    - variable: archive
      suppress: true
    - title: primary
      suppress: false
    - number: number
      suppress: false
    - group:
      - variable: medium
      delimiter: slash
      wrap:
        punctuation: brackets
      suppress: false
    - date: issued
      form: year
      fallback: []
      suppress: false
    - date: accessed
      form: year
      wrap:
        punctuation: brackets
      suppress: false
    - number: pages
      suppress: false
    - variable: publisher
      suppress: false
    - variable: publisher-place
      suppress: false
    - variable: version
      suppress: false
      strip-periods: true
    - contributor: translator
      form: long
      name-order: family-first
      delimiter: ，
      sort-separator: ' '
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      suppress: false
    - group:
      - number: edition
      delimiter: space
      suppress: false
    - variable: url
      suppress: false
    - identifier: cstr
      prefix: 'CSTR:'
    - variable: doi
      prefix: 'DOI:'
      suppress: false
  type-variants:
    article,dataset,preprint:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      name-order: family-first
      delimiter: ，
      sort-separator: ' '
      suffix: '. '
    - title: primary
    - message: gb-t-7714-type-code
      args:
        type: { reference-type: key }
        carrier: { carrier: { online: OL, absent: '-' } }
      wrap:
        punctuation: brackets
      suffix: '. '
    - variable: version
      prefix: V
      suffix: '. '
      strip-periods: true
    - variable: publisher
    - date: issued
      form: year-month-day
      fallback: []
      prefix: （
      suffix: ）
    - date: accessed
      form: year-month-day
      wrap:
        punctuation: brackets
      suffix: '. '
    - variable: url
    - identifier: cstr
      prefix: '. CSTR:'
    - variable: doi
      prefix: '. DOI:'
    article-journal,article-magazine:
