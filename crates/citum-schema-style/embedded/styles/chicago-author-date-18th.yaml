extends: chicago-18-base
info:
  title: Chicago Manual of Style 18th edition (author-date)
  description: Chicago-style source citations (with Bluebook for legal citations), author-date system
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - law
  - linguistics
  - literature
  - philosophy
  - science
  - sociology
  - theology
  source:
    csl-id: http://www.zotero.org/styles/chicago-author-date
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/chicago-author-date
      rel: self
    - href: http://www.zotero.org/styles/chicago-notes-bibliography
      rel: template
    - href: https://www.chicagomanualofstyle.org/
      rel: documentation
  short-name: "Chicago Author-Date"
  edition: "18th edition"
options:
  # multilingual, page-range-format, punctuation-in-quote, and
  # contributors.demote-non-dropping-particle are inherited from chicago-18-base.
  locators: note
  # Chicago author-date disambiguation profile (CMOS 18): add names + global
  # first-author given-name + year suffix. The `author-date-full` preset bundles
  # this and supplies the author-date-title bibliography sort; the `primary-name`
  # rule it carries fixes same-surname authors (e.g. "A. Johnson" / "B. Johnson")
  # that the previous `by-cite` default left ambiguous across separate citations.
  processing: author-date-full
  contributors:
    and: text
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    # The book/default templates supply "Translated by" via a verb prefix; omit
    # the default "(Trans.)" role label so it is not rendered twice (matches
    # citeproc's `Translated by David Wyllie.`).
    role:
      omit:
      - translator
  dates: long
  titles:
    component:
      text-case: title
    monograph:
      text-case: title
      emph: true
    container-monograph:
      text-case: title
      emph: true
    periodical:
      emph: true
    serial:
      emph: true
citation:
  options:
    substitute:
      template:
      - editor
      - translator
      - parent-serial
      - title
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  type-variants:
    classic:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
    - title: primary
      prefix: ", "
    personal_communication:
    - group:
      - contributor: author
        form: short
        shorten:
          min: 3
          use-first: 1
          and-others: et-al
      - contributor: recipient
        form: short
        prefix: " to "
      - date: issued
        form: year
        prefix: " "
      render-when:
        field-present: recipient
        field-absent: title
      delimiter: none
    - group:
      - contributor: author
        form: long
        name-order: given-first
        shorten:
          min: 3
          use-first: 1
          and-others: et-al
      - title: primary
        wrap:
          punctuation: quotes
        prefix: ", "
      - variable: locator
        prefix: ", "
      render-when:
        field-present: title
      delimiter: none
    webpage:
    - variable: publisher
    - date: issued
      form: year
      prefix: " "
  template:
  - group:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
    - date: issued
      form: year
    delimiter: " "
  - variable: locator
    prefix: ", "
  wrap:
    punctuation: parentheses
  delimiter: none
  multi-cite-delimiter: "; "
bibliography:
  options:
    substitute:
      contributor-role-form: short
      template:
      - editor
      - translator
      - collection-editor
      - title
    contributors:
      display-as-sort: first
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
    hanging-indent: true
    entry-suffix: .
    separator: ". "
  groups:
  - id: primary-sources
    heading:
      localized:
        en-US: Primary Sources
        en: Primary Sources
        de: Primärquellen
        de-DE: Primärquellen
    selector:
      field:
        note: primary
  - id: archival
    heading:
      localized:
        en-US: Archival Sources
        en: Archival Sources
        de: Archivalische Quellen
        de-DE: Archivalische Quellen
    selector:
      field:
        note: archival
  - id: secondary
    heading:
      localized:
        en-US: Secondary Sources
        en: Secondary Sources
        de: Sekundärquellen
        de-DE: Sekundärquellen
    selector:
      not:
        field:
          note:
          - primary
          - archival
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - title: parent-serial
      emph: true
    - group:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
      delimiter: none
    - number: pages
      prefix: ": "
    - variable: number
      prefix: ": "
    - variable: doi
      prefix: https://doi.org/
    - group:
      - variable: url
      render-when:
        field-absent: doi
    article-magazine:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - title: parent-serial
      emph: true
    - date: issued
      form: month-day
      prefix: ", "
    - variable: url
    article-newspaper:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - date: issued
      form: year
    - title: primary
    - title: parent-serial
      emph: true
    - date: issued
      form: month-day
      prefix: ", "
    - variable: url
    bill-proceeding:
    - title: primary
    - variable: publisher
      prefix: ", "
    - number: chapter-number
      prefix: " "
    - variable: number
      prefix: ", "
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    bill-record:
    - group:
      - number: volume
      - title: primary
      delimiter: " "
    - variable: number
      prefix: " "
    - date: issued
      form: year
      wrap:
        punctuation: parentheses
      prefix: " "
    book:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - group:
      - date: original-published
        form: year
        wrap:
          punctuation: parentheses
      - date: issued
        form: year
        prefix: " "
      render-when:
        field-present: original-published
      delimiter: none
    - group:
      - date: issued
        form: year
      render-when:
        field-absent: original-published
    - title: primary
    - contributor: translator
      form: verb
      name-order: given-first
      prefix: ". "
    - contributor: illustrator
      form: long
      name-order: given-first
      prefix: "Illustrated by "
    - contributor: narrator
      form: long
      name-order: given-first
      prefix: "Narrated by "
    - contributor: contributor
      form: long
      name-order: given-first
      prefix: "With "
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - group:
      - number: volume
      - number: issue
        prefix: " ("
        suffix: ")"
    - variable: publisher
    - variable: doi
    - variable: url
    broadcast:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - date: issued
      form: year
    - title: parent-serial
      emph: true
    - variable: number
      prefix: ". "
      text-case: capitalize-first
    - title: primary
      wrap:
        punctuation: quotes
      prefix: ", "
    - contributor: writer
      form: long
      name-order: given-first
      prefix: ", written by "
    - contributor: performer
      form: long
      name-order: given-first
      prefix: ", performed by "
    - contributor: contributor
      form: long
      name-order: given-first
      prefix: ", with "
    - date: issued
      form: month-day
      prefix: ". Aired "
    - variable: publisher
      prefix: ", on "
    - variable: dimensions
      prefix: ". "
    - variable: url
    manuscript:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - group:
      - date: issued
        form: year
      render-when:
        field-present: issued
    - title: primary
      text-case: as-is
    - date: issued
      form: month-day
    - variable: raw-genre
    - variable: archive-location
    - variable: archive-collection
    - group:
      - variable: archive-name
      - variable: archive-place
        prefix: ", "
    - variable: url
    webpage:
    - group:
      - title: parent-monograph
      - date: issued
        form: year
      - variable: raw-genre
        text-case: capitalize-first
      - message: pattern.accessed-date
        args:
          date:
            group:
              - date: accessed
                form: month-day
              - date: accessed
                form: year
                prefix: ", "
            delimiter: " "
        text-case: capitalize-first
      - variable: url
      render-when:
        field-absent: title
      delimiter: ". "
    - group:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 8
          use-first: 3
      - variable: publisher
      - date: issued
        form: year
      - title: primary
        wrap:
          punctuation: quotes
      - variable: raw-genre
        text-case: capitalize-first
      - title: parent-monograph
      - date: issued
        form: month-day
      - message: pattern.accessed-date
        args:
          date:
            group:
              - date: accessed
                form: month-day
              - date: accessed
                form: year
                prefix: ", "
            delimiter: " "
        text-case: capitalize-first
      - variable: references
      - variable: url
      render-when:
        field-present: title
      delimiter: ". "
    interview:
    - group:
      - title: primary
        text-case: as-is
        wrap:
          punctuation: quotes
      - date: issued
        form: year
      - contributor: interviewer
        form: long
        name-order: given-first
        prefix: "Interview by "
      - variable: event-title
      - date: event-date
        form: full
      - group:
        - variable: status
          text-case: capitalize-first
        - date: issued
          form: month-day
          prefix: " "
        delimiter: none
      - group:
        - variable: raw-medium
        - variable: dimensions
          prefix: ", "
        delimiter: none
      - variable: url
      render-when:
        field-present: title
      delimiter: ". "
    - group:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 8
          use-first: 3
      - date: issued
        form: year
      - contributor: interviewer
        form: long
        name-order: given-first
        prefix: "Interview by "
      - variable: raw-genre
        text-case: capitalize-first
      - group:
        - variable: event-title
        - variable: event-place
        delimiter: ", "
      - title: parent-monograph
        text-case: as-is
      - variable: publisher
      - date: event-date
        form: full
      - date: issued
        form: month-day
      - group:
        - variable: status
          text-case: capitalize-first
        - date: issued
          form: month-day
          prefix: " "
        delimiter: none
      - group:
        - variable: raw-medium
        - variable: dimensions
          prefix: ", "
        delimiter: none
      - variable: archive-location
      - variable: archive-collection
      - group:
        - variable: archive-name
        - variable: archive-place
          prefix: ", "
      - variable: references
      - variable: url
      render-when:
        field-absent: title
      delimiter: ". "
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - date: issued
      form: year
    - title: primary
      wrap:
        punctuation: quotes
    - message: pattern.in-container
      args:
        container:
          group:
          - title: parent-monograph
            emph: true
      text-case: capitalize-first
    - contributor: editor
      form: verb
      name-order: given-first
      prefix: ", "
    - variable: publisher
    - variable: doi
    - variable: url
    entry-dictionary:
    - title: parent-monograph
      emph: true
      suffix: "."
      text-case: title
    - date: issued
      form: year
    - title: primary
      prefix: " "
      text-case: sentence
      wrap:
        punctuation: quotes
    - message: pattern.accessed-date
      args:
        date:
          group:
            - date: accessed
              form: month-day
            - date: accessed
              form: year
              prefix: ", "
          delimiter: " "
      text-case: capitalize-first
      prefix: ". "
    - variable: url
    standard:
    - variable: authority
    - date: issued
      form: year
    - title: primary
    - group:
      - variable: genre
      - number: number
      delimiter: " "
    - variable: publisher
    - group:
      - variable: status
      - date: issued
        form: month-day
      delimiter: " "
      prefix: ", "
    - variable: doi
      prefix: ". https://doi.org/"
    software:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - variable: publisher
    - date: issued
      form: year
    - title: primary
      text-case: title
    - variable: raw-genre
    - variable: version
      prefix: "V. "
    - date: issued
      form: month-day
      prefix: "Released "
    - variable: raw-medium
      prefix: "Released. "
    - variable: url
    legal-case:
      extends: book
      modify:
        - match:
            title: primary
          emph: true
      remove:
        - match:
            contributor: translator
      add:
        - component:
            number: pages
            prefix: ': '
          before:
            variable: publisher
    motion-picture:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - date: issued
      form: year
    - title: primary
    - contributor: contributor
      form: long
      name-order: given-first
      prefix: "With "
    - variable: publisher
    - group:
      - variable: raw-medium
      - variable: dimensions
        prefix: ", "
    - variable: url
    song:
    - group:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 8
          use-first: 3
      - contributor: director
        form: long
        name-order: family-first
        suffix: ", dir."
      delimiter: none
    - date: issued
      form: year
    - title: primary
      text-case: as-is
    - contributor: narrator
      form: long
      name-order: given-first
      prefix: "Narrated by "
    - contributor: performer
      form: long
      name-order: given-first
      prefix: "Performed by "
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
    - contributor: contributor
      form: long
      name-order: given-first
      prefix: "With "
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
    - group:
      - number: chapter-number
        prefix: "Track "
      - title: parent-monograph
        emph: true
        prefix: " on "
      delimiter: none
    - date: event-date
      form: full
      prefix: "Recorded "
    - group:
      - variable: publisher
      - variable: number
      delimiter: " "
    - group:
      - variable: raw-medium
      - variable: dimensions
        prefix: ", "
      delimiter: none
    - variable: note
    - variable: url
    patent:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
    - prefix: ". "
      delimiter: none
      group:
      - message: pattern.patent-number
        args:
          number:
            number: patent-number
        text-case: capitalize-first
      - message: pattern.issued-date
        args:
          date:
            date: issued
            form: full
        prefix: ", "
    report:
      extends: book
      remove:
        - match:
            contributor: translator
    thesis:
      extends: book
      remove:
        - match:
            contributor: translator
    personal_communication:
    - group:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 8
          use-first: 3
      - date: issued
        form: year
      - group:
        - variable: genre
          text-case: capitalize-first
        - contributor: recipient
          form: long
          name-order: given-first
          prefix: " to "
        render-when:
          field-present: genre
        delimiter: none
      - group:
        - contributor: recipient
          form: long
          name-order: given-first
          prefix: "To "
        render-when:
          field-present: recipient
          field-absent: genre
        delimiter: none
      - date: issued
        form: month-day
      - variable: archive-location
      - variable: archive-collection
      - variable: archive-name
      render-when:
        field-present: archive-location
      delimiter: ". "
    - group:
      - contributor: author
        form: long
        name-order: family-first
        shorten:
          min: 8
          use-first: 3
      - date: issued
        form: year
      - group:
        - variable: genre
          text-case: capitalize-first
        - contributor: recipient
          form: long
          name-order: given-first
          prefix: " to "
        render-when:
          field-present: genre
        delimiter: none
      - group:
        - contributor: recipient
          form: long
          name-order: given-first
          prefix: "To "
        render-when:
          field-present: recipient
          field-absent: genre
        delimiter: none
      - message: pattern.in-container
        args:
          container:
            group:
            - title: parent-monograph
              emph: true
        text-case: capitalize-first
      - contributor: editor
        form: verb
        name-order: given-first
      - variable: publisher
      render-when:
        field-present: publisher
        field-absent: archive-location
      delimiter: ". "
    personal-communication: []
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 3
  - date: issued
    form: year
  - title: primary
    wrap:
      punctuation: quotes
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - group:
    - number: volume
    - number: issue
      prefix: " ("
      suffix: ")"
    prefix: " "
    delimiter: ""
  - number: pages
    prefix: ": "
  - variable: publisher
  - variable: doi
  - variable: url
