extends: chicago-notes-18th
info:
  title: Chicago Manual of Style 18th edition (shortened notes and bibliography)
  description: Chicago-style source citations (with Bluebook for legal citations), shortened author-title notes and bibliography system
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - law
  - linguistics
  - literature
  - philosophy
  - science
  - sociology
  - theology
  source:
    csl-id: http://www.zotero.org/styles/chicago-shortened-notes-bibliography
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/chicago-shortened-notes-bibliography
      rel: self
    - href: http://www.zotero.org/styles/chicago-notes-bibliography
      rel: template
    - href: https://www.chicagomanualofstyle.org/
      rel: documentation
  short-name: "Chicago Shortened Notes"
  edition: "18th edition"
  default-locale: en-US
options:
  multilingual: romanized-translated
  locale-override: en-US-chicago
  processing: note
  contributors:
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    demote-non-dropping-particle: display-and-sort
  dates: long
  titles: humanities
  page-range-format: chicago16
  punctuation-in-quote: true
citation:
  options:
    contributors:
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
  ibid:
    note-start-text-case: capitalize-first
    suffix: ""
    delimiter: ", "
    template:
    - message: term.ibid
    - variable: locator
      suffix: .
  type-variants:
  template:
  - contributor: author
    form: short
    name-order: family-first-only
    shorten:
      min: 3
      use-first: 1
  - title: primary
    prefix: ", "
  - variable: locator
    prefix: ", "
  suffix: .
  delimiter: ". "
  multi-cite-delimiter: "; "
bibliography:
  options:
    contributors:
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
    hanging-indent: true
    entry-suffix: .
    separator: ", "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      name-order: family-first-only
      shorten:
        min: 8
        use-first: 3
    - title: primary
    - group:
      - contributor: editor
        form: verb
        name-order: given-first
      - title: parent-monograph
        emph: true
    - title: parent-serial
      emph: true
    - number: volume
    - variable: publisher
    - date: issued
      form: year
      prefix: ", "
    - number: pages
      prefix: ": "
    - variable: doi
      prefix: https://doi.org/
    - variable: url
    book:
    - contributor: author
      form: long
      name-order: family-first-only
      shorten:
        min: 8
        use-first: 3
    - title: primary
    - contributor: translator
      form: verb
      prefix: ". "
    - variable: publisher
    - date: issued
      form: year
      prefix: ", "
    chapter:
    - contributor: author
      form: long
      name-order: family-first-only
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: ". "
      wrap:
        punctuation: quotes
    - message: pattern.in-container
      args:
        container:
          group:
            - title: parent-monograph
              emph: false
            - contributor: editor
              form: verb
              name-order: given-first
              prefix: ", "
          delimiter: " "
      text-case: capitalize-first
      prefix: " "
    - variable: publisher
      prefix: ". "
    - date: issued
      form: year
      prefix: ", "
    - number: pages
      prefix: ": "
    manuscript:
    - contributor: author
      form: long
      name-order: family-first-only
      shorten:
        min: 8
        use-first: 3
    - title: primary
      prefix: ". "
      wrap:
        punctuation: quotes
    - date: issued
      form: year
      prefix: ". "
    - variable: archive-location
      prefix: ". "
    - variable: archive-name
      prefix: ". "
    - variable: archive-place
      prefix: ", "
    entry-dictionary:
    - title: parent-monograph
      text-case: title
    - title: primary
      prefix: ". "
      wrap:
        punctuation: quotes
    - message: pattern.accessed-date
      args:
        date:
          group:
            - date: accessed
              form: month-day
            - date: accessed
              form: year
              prefix: ", "
          delimiter: " "
      text-case: capitalize-first
      prefix: ". "
    - variable: url
      prefix: ". "
    personal-communication: []
    personal_communication: []
    patent:
    - contributor: author
      form: long
      name-order: family-first-only
      shorten:
        min: 7
        use-first: 3
    - title: primary
    - group:
      - message: pattern.patent-number
        args:
          number:
            number: number
        text-case: capitalize-first
        prefix: ". "
    - message: pattern.issued-date
      args:
        date:
          group:
            - date: issued
              form: month-day
            - date: issued
              form: year
              prefix: ", "
      prefix: ", "
    standard:
    - variable: authority
    - title: primary
      prefix: ". "
      text-case: title
    - group:
      - variable: genre
      - number: number
        prefix: " "
      delimiter: ""
      prefix: ". "
    - variable: publisher
      prefix: ". "
    - group:
      - variable: status
      - group:
        - date: issued
          form: month-day
        - date: issued
          form: year
          prefix: ", "
        delimiter: none
        prefix: " "
      delimiter: ""
      prefix: ", "
    - variable: doi
      prefix: ". https://doi.org/"
  template:
  - contributor: author
    form: long
    name-order: family-first-only
    shorten:
      min: 8
      use-first: 3
  - title: primary
  - group:
    - contributor: editor
      form: verb
      name-order: given-first
    - title: parent-monograph
      emph: true
  - title: parent-serial
    emph: true
  - number: volume
  - variable: publisher
  - date: issued
    form: year
    prefix: ", "
  - number: pages
    prefix: ": "
  - variable: doi
  - variable: url
