extends: chicago-18-base
info:
  title: Chicago Manual of Style 18th edition (notes without bibliography)
  description: Chicago-style source citations (with Bluebook for legal citations), notes system
    without bibliography, listing up to six authors in a full citation (CMOS18 13.23), displaying
    number of volumes (CMOS18 14.20)
  fields:
  - anthropology
  - communications
  - geography
  - history
  - humanities
  - law
  - linguistics
  - literature
  - philosophy
  - science
  - sociology
  - theology
  source:
    csl-id: http://www.zotero.org/styles/chicago-notes
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Andrew Dunning
      uri: https://orcid.org/0000-0003-0464-5036
    links:
    - href: http://www.zotero.org/styles/chicago-notes
      rel: self
    - href: http://www.zotero.org/styles/chicago-notes-bibliography
      rel: template
    - href: https://www.chicagomanualofstyle.org/
      rel: documentation
  short-name: "Chicago Notes"
  edition: "18th edition"
options:
  # multilingual, page-range-format, punctuation-in-quote, and
  # contributors.demote-non-dropping-particle are inherited from chicago-18-base.
  processing: note
  substitute: editor-translator-short
  contributors:
    and: text
    delimiter-precedes-last: contextual
  dates: long
  titles: chicago
citation:
  delimiter: ""
  ibid:
    note-start-text-case: capitalize-first
    suffix: ""
    delimiter: ", "
    template:
    - message: term.ibid
    - variable: locator
      suffix: .
  subsequent:
    options:
      contributors:
        name-form: family-only
    type-variants:
      article-journal:
        add:
          - component:
              variable: locator
              prefix: ', '
            after:
              title: primary
      book:
        add:
          - component:
              variable: locator
              prefix: ', '
            after:
              title: primary
      chapter:
        add:
          - component:
              variable: locator
              prefix: ', '
            after:
              title: primary
    template:
    - contributor: author
      form: short
    - title: primary
      form: short
      prefix: ", "
  type-variants:
    article-journal:
    - contributor: author
      form: long
      shorten:
        min: 8
        use-first: 3
        and-others: et-al
    - title: primary
      prefix: ", "
    - contributor: translator
      form: long
      label: {term: translator, form: short, placement: prefix}
      prefix: ", "
    - group:
      - title: parent-serial
        prefix: ", "
      - variable: publisher-place
        wrap:
          punctuation: parentheses
        prefix: " "
      - number: volume
        prefix: " "
      - number: issue
        label-form: short
        prefix: ", "
      - date: issued
        form: year
        wrap:
          punctuation: parentheses
        prefix: " "
      - number: pages
        prefix: ": "
      delimiter: ""
    - variable: locator
      prefix: ", "
