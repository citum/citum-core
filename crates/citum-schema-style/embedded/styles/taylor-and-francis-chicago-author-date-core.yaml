info:
  title: 'Taylor & Francis Journals Standard Reference Style Guide: Chicago'
  id: taylor-and-francis-chicago-author-date-core
  description: 'Taylor & Francis Journals adaptation of Chicago-style, author-date system, using style
    presets.'

extends: chicago-author-date-18th
options:
  multilingual: romanized-translated
  page-range-format: expanded
  # T&F Style F (tf_f.pdf) prescribes sentence-style capitalisation for titles
  # (only the first word capitalised) — a deliberate divergence from the CSL
  # reference, which renders title-case. Journal/serial names stay title-case.
  # Applied to article (`component`) titles only for now: the engine's
  # `text-case: sentence` has no proper-noun protection (it would lowercase
  # `Cambridge` in a book title), so monograph/container titles stay title-case
  # until the sentence-case proper-noun fix lands (tracked in csl26-maim).
  titles:
    component:
      text-case: sentence
  contributors:
    role:
      omit:
      - translator
      # Style F forbids the plural "eds." label in this position (guide, tf_f.pdf);
      # the chapter/default templates supply "edited by" manually.
      - editor

citation:
  options:
    contributors:
      shorten:
        min: 4
        use-first: 1
  template:
  - contributor: author
    form: short
    shorten:
      min: 4
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    and: text
  - date: issued
    form: year
  - variable: locator
    prefix: ", "
  wrap:
    punctuation: parentheses
  delimiter: " "
  multi-cite-delimiter: "; "
bibliography:
  type-variants:
    article-journal:
    - contributor: author
      form: long
    - date: issued
      form: year
    - title: primary
    - contributor: translator
      form: long
      name-order: given-first
      prefix: "Translated by "
    - title: parent-serial
    - number: volume
      prefix: " "
    - number: issue
      wrap:
        punctuation: parentheses
    - number: pages
      prefix: ": "
    - variable: doi
      prefix: ". https://doi.org/"
      suffix: "."
    - variable: url
      suffix: "."
    book:
    - contributor: author
      form: long
    - date: issued
      form: year
    - title: primary
    - contributor: translator
      form: long
      name-order: given-first
      prefix: "Translated by "
    - variable: publisher-place
    - variable: publisher
      prefix: ": "
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - variable: doi
      prefix: ". https://doi.org/"
      suffix: "."
    - variable: url
      suffix: "."
    chapter:
    - contributor: author
      form: long
    - date: issued
      form: year
    - title: primary
      suffix: "."
    - contributor: translator
      form: long
      name-order: given-first
      prefix: "Translated by "
    - title: parent-monograph
      prefix: " In "
    - contributor: editor
      form: long
      name-order: given-first
      prefix: ", edited by "
    - number: pages
      prefix: ", "
    - delimiter: ": "
      group:
      - variable: publisher-place
      - variable: publisher
    - variable: doi
      prefix: ". https://doi.org/"
      suffix: "."
    - variable: url
      suffix: "."
    default:
    - contributor: author
      form: long
    - date: issued
      form: year
    - title: primary
    - title: parent-monograph
      prefix: " In "
    - contributor: editor
      form: long
      name-order: given-first
      prefix: ", edited by "
    - title: parent-serial
    - number: volume
      prefix: " "
    - number: issue
      wrap:
        punctuation: parentheses
    - number: pages
      prefix: ", "
    - delimiter: ": "
      group:
      - variable: publisher-place
      - variable: publisher
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - variable: doi
      prefix: ". https://doi.org/"
      suffix: "."
    - variable: url
      suffix: "."
    interview:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
    - contributor: interviewer
      form: long
      name-order: given-first
      prefix: "Interview by "
    - delimiter: ", "
      group:
      - date: issued
        form: month-day
      - date: issued
        form: year
    - variable: genre
      text-case: capitalize-first
    - variable: url
      suffix: "."
    motion-picture:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
    - title: primary
    - variable: genre
      text-case: capitalize-first
    - contributor: author
      form: long
      name-order: given-first
      prefix: "Directed by "
    - date: issued
      form: year
      suffix: "."
    - variable: medium
      text-case: capitalize-first
  template:
  - contributor: author
    form: long
  - date: issued
    form: year
  - title: primary
  - contributor: translator
    form: long
    name-order: given-first
    prefix: "Translated by "
  - title: parent-monograph
    prefix: " In "
  - contributor: editor
    form: long
    name-order: given-first
    prefix: ", edited by "
  - title: parent-serial
  - number: volume
    prefix: " "
  - number: issue
    wrap:
      punctuation: parentheses
  - number: pages
    prefix: ": "
  - variable: publisher-place
  - variable: publisher
    prefix: ": "
  - date: issued
    form: year
    prefix: ", "
    suffix: "."
  - variable: doi
    prefix: ". https://doi.org/"
    suffix: "."
  - variable: url
    suffix: "."
