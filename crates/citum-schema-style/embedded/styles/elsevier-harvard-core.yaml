info:
  title: Elsevier (author-date/Harvard, with titles)
  fields:
  - biology
  source:
    csl-id: http://www.zotero.org/styles/elsevier-harvard
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: David Kaplan
      email: david.kaplan@ird.fr
    links:
    - href: http://www.zotero.org/styles/elsevier-harvard
      rel: self
    - href: http://www.zotero.org/styles/ecology-letters
      rel: template
    - href: http://www.elsevier.com/journals/biological-conservation/0006-3207/guide-for-authors#68000
      rel: documentation
  short-name: "Elsevier Harvard"
options:
  processing:
    sort:
      template:
      - key: author
      - key: year
    group:
      template: [author, year]
    disambiguate:
      names: false
      add-givenname: true
      year-suffix: true
  substitute:
    contributor-role-form: short
    template:
    - translator
    - title
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: .
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: never
    sort-separator: ", "
    role:
      omit:
      - editor
  dates: numeric
  punctuation-in-quote: true
  volume-pages-delimiter: comma
citation:
  options:
    substitute:
      template:
      - editor
      - translator
      - title
    contributors:
      shorten:
        min: 3
        use-first: 1
  sort: author-date-title
  type-variants:
    legal-case:
    - title: primary
      form: short
      emph: true
      quote: false
    - date: issued
      form: year
    - variable: locator
  template:
  - contributor: author
    form: short
    shorten:
      min: 3
      use-first: 1
      and-others: et-al
      delimiter-precedes-last: contextual
    and: text
  - date: issued
    form: year
  - variable: locator
  wrap:
    punctuation: parentheses
  delimiter: ", "
  multi-cite-delimiter: "; "
  integral:
    delimiter: " "
    type-variants:
      legal-case:
      - title: primary
        form: short
        emph: true
        quote: false
      - group:
        - date: issued
          form: year
        - variable: locator
        delimiter: ", "
        wrap:
          punctuation: parentheses
    template:
    - contributor: author
      form: short
      shorten:
        min: 3
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      and: text
    - delimiter: ", "
      wrap:
        punctuation: parentheses
      group:
      - date: issued
        form: year
      - variable: locator
bibliography:
  options:
    substitute:
      template:
      - translator
    hanging-indent: true
    separator: ". "
    entry-suffix: "."
  type-variants:
    [article-journal, article-magazine]:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - title: primary
      suffix: "."
    - delimiter: " "
      group:
      - title: parent-serial
      - delimiter: ", "
        group:
        - number: volume
        - number: pages
    - variable: doi
      prefix: ". https://doi.org/"
      links:
        target: doi
        anchor: component
    book:
    - contributor: editor
      form: long
      name-order: family-first
      suffix: " (Eds.)"
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - delimiter: ", "
      suffix: "."
      group:
      - title: primary
      - number: edition
        suffix: ". ed."
    - delimiter: ", "
      group:
      - variable: publisher
      - variable: publisher-place
    chapter:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - title: primary
    - delimiter: " "
      prefix: ", "
      suffix: "."
      group:
      - term: in
        suffix: ":"
      - contributor: editor
        form: long
        name-order: family-first
        suffix: " (Eds.),"
      - title: parent-monograph
    - variable: publisher
      suffix: ","
    - number: pages
      prefix: " "
      label-form: short
    paper-conference:
      add:
        - component:
            title: parent-monograph
            prefix: ', in: '
            suffix: .
          after:
            title: primary
        - component:
            number: pages
            label-form: short
            suffix: .
          after:
            title: parent-monograph
    thesis:
      add:
        - component:
            variable: genre
            wrap:
              punctuation: parentheses
            prefix: ' '
            suffix: .
          after:
            title: primary
        - component:
            variable: publisher
          after:
            variable: genre
    webpage:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - title: primary
      suffix: " [WWW Document]."
    - variable: url
      prefix: "URL "
      links:
        target: url
        anchor: component
    - date: accessed
      form: full
      prefix: " (accessed "
      suffix: ")."
    [article-newspaper, broadcast]:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - title: primary
      suffix: "."
    - title: parent-serial
      suffix: "."
    entry-encyclopedia:
      modify:
        - match:
            title: primary
          suffix: .
      add:
        - component:
            title: parent-monograph
            suffix: .
          after:
            title: primary
    legal-case:
    - title: primary
    - date: issued
      form: year
      prefix: ", "
      suffix: ". "
    - title: parent-serial
      prefix: ", "
    - variable: reporter
      prefix: ", "
      suffix: "."
    [dataset, motion-picture, interview, personal-communication]:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - title: primary
      suffix: "."
    patent:
      extends: dataset,motion-picture,interview,personal-communication
      add:
        - component:
            variable: number
            suffix: .
          after:
            title: primary
    report:
    - contributor: author
      form: long
      name-order: family-first
    - date: issued
      form: year
      prefix: ", "
      suffix: "."
    - title: primary
    - variable: genre
      wrap:
        punctuation: parentheses
      prefix: " "
      suffix: "."
    - delimiter: ", "
      group:
      - variable: publisher
      - variable: publisher-place
  template:
  - contributor: author
    form: long
    name-order: family-first
  - date: issued
    form: year
    prefix: ", "
    suffix: "."
  - title: primary
