      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: null
    demote-non-dropping-particle: never
    name-form: initials
  dates:
    month: numeric
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
    no-date-year-suffix-delimiter: '-'
    show-seconds: false
    show-timezone: false
    era-labels: default
    negative-unspecified-years: range
  page-range-format: expanded
