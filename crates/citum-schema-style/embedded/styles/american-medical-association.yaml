info:
  title: American Medical Association Manual of Style 11th edition
  description: 'AMA Manual of Style: A Guide for Authors and Editors (11th ed.)'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/american-medical-association
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      uri: https://orcid.org/0000-0001-5192-6856
    links:
    - href: http://www.zotero.org/styles/american-medical-association
      rel: self
    - href: http://www.zotero.org/styles/american-medical-association-10th-edition
      rel: template
    - href: https://academic.oup.com/amamanualofstyle
      rel: documentation
  short-name: "AMA"
  edition: "11th edition"
options:
  multilingual: romanized-translated
  locators:
    strip-label-periods: true
  substitute:
    contributor-role-form: short-comma
    template: [editor]
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: ""
    sort-separator: " "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    display-as-sort: all
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
  dates: long
  titles: humanities
  page-range-format: expanded
  page-range-delimiter: "-"
  punctuation-in-quote: true
citation:
  template:
  - delimiter: ""
    group:
    - number: citation-number
    - variable: locator
      wrap:
        punctuation: parentheses
  multi-cite-delimiter: ","
  collapse: citation-number
bibliography:
  options:
    entry-suffix: .
    hanging-indent: false
    separator: ". "
  type-variants:
    [article-journal, article-magazine]:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
    - title: primary
    - title: parent-serial
      form: short
    - delimiter: ""
      group:
      - date: issued
        form: year
        suffix: ";"
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
      - number: supplement-number
        prefix: "(suppl "
        suffix: ")"
      - number: pages
        prefix: ":"
    - variable: doi
      prefix: ". doi:"
    [book, report, thesis]:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - variable: genre
    - number: edition
    - variable: publisher
      suffix: "; "
    - date: issued
      form: year
    [chapter, paper-conference]:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - delimiter: " "
      group:
      - message: pattern.in-container-colon
        args:
          container:
            group:
              - contributor: editor
                form: long
                name-order: family-first
                label: {term: editor, form: short, placement: suffix}
              - title: parent-monograph
            delimiter: " "
    - variable: publisher
      suffix: "; "
    - delimiter: ""
      group:
      - date: issued
        form: year
      - number: pages
        prefix: ":"
    webpage:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - date: issued
      form: year
    - message: pattern.accessed-date
      args:
        date:
          group:
            - date: accessed
              form: month-day
            - date: accessed
              form: year
              prefix: ", "
          delimiter: " "
      text-case: capitalize-first
      suffix: ". "
    - variable: url
    article-newspaper:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-serial
    - date: issued
      form: month-day
    - date: issued
      form: year
      prefix: ", "
    - message: pattern.accessed-date
      args:
        date:
          group:
            - date: accessed
              form: month-day
            - date: accessed
              form: year
              prefix: ", "
          delimiter: " "
      text-case: capitalize-first
      suffix: ". "
    - variable: url
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - message: pattern.in-container-colon
      args:
        container:
          title: parent-serial
    - message: term.volume
      form: short
      suffix: " "
    - number: volume
    - variable: publisher
      suffix: "; "
    - delimiter: ""
      group:
      - date: issued
        form: year
      - number: pages
        prefix: ":"
    dataset:
      extends: webpage
      modify:
        - match:
            date: issued
          suffix: '. '
      add:
        - component:
            message: pattern.published-online
          before:
            date: issued
    legal-case:
    - title: primary
    - delimiter: " "
      group:
      - variable: reporter
      - number: volume
      - number: pages
        prefix: ", "
    - delimiter: " "
      wrap:
        punctuation: parentheses
      group:
      - variable: authority
      - date: issued
        form: year
    patent:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - delimiter: ""
      group:
      - message: pattern.published-online-date
        args:
          date:
            group:
              - date: issued
                form: month-day
              - date: issued
                form: year
                prefix: ", "
            delimiter: " "
    - variable: patent-number
      prefix: ":"
    motion-picture:
      extends: webpage
      modify:
        - match:
            title: primary
          text-case: title
      add:
        - component:
            variable: publisher
            suffix: '; '
          before:
            date: issued
    broadcast:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-serial
    - delimiter: ""
      group:
      - message: pattern.published-online-date
        args:
          date:
            group:
              - date: issued
                form: month-day
              - date: issued
                form: year
                prefix: ", "
            delimiter: " "
      - variable: number
        prefix: ":"
    - message: pattern.accessed-date
      args:
        date:
          group:
            - date: accessed
              form: month-day
            - date: accessed
              form: year
              prefix: ", "
          delimiter: " "
      text-case: capitalize-first
      suffix: ". "
    - variable: url
    [interview, personal-communication]:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - delimiter: ""
      group:
      - message: pattern.published-online-date
        args:
          date:
            group:
              - date: issued
                form: month-day
              - date: issued
                form: year
                prefix: ", "
            delimiter: " "
    - variable: url
    entry-dictionary:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - message: pattern.in-container-colon
      args:
        container:
          title: parent-monograph
          text-case: title
    - message: pattern.accessed-date
      args:
        date:
          group:
            - date: accessed
              form: month-day
            - date: accessed
              form: year
              prefix: ", "
          delimiter: " "
      text-case: capitalize-first
      suffix: ". "
    - variable: url
    map:
      extends: dataset
    software:
      extends: dataset
    statute:
    - title: primary
    - number: volume
      prefix: "Vol "
    - date: issued
      form: year
    - variable: url
    hearing:
    - title: primary
    - delimiter: ""
      group:
      - message: pattern.published-online-date
        args:
          date:
            date: issued
            form: year
    - variable: url
    standard:
    - title: primary
    - delimiter: ""
      group:
      - message: pattern.published-online-date
        args:
          date:
            group:
              - date: issued
                form: month-day
              - date: issued
                form: year
                prefix: ", "
                suffix: ":"
            delimiter: " "
      - variable: standard-number
    - variable: doi
      prefix: ". doi:"
    regulation:
    - title: primary
    - variable: code
    - delimiter: ""
      group:
      - date: issued
        form: year
        suffix: ";"
      - number: volume
    - variable: url
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
  - variable: publisher
    suffix: "; "
  - date: issued
    form: year
