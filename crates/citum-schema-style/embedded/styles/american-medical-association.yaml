info:
  title: American Medical Association Manual of Style 11th edition
  description: 'AMA Manual of Style: A Guide for Authors and Editors (11th ed.)'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/american-medical-association
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Julian Onions
      uri: https://orcid.org/0000-0001-5192-6856
    links:
    - href: http://www.zotero.org/styles/american-medical-association
      rel: self
    - href: http://www.zotero.org/styles/american-medical-association-10th-edition
      rel: template
    - href: https://academic.oup.com/amamanualofstyle
      rel: documentation
  short-name: "AMA"
  edition: "11th edition"
options:
  locators:
    strip-label-periods: true
  substitute: editor-short
  processing: numeric
  contributors:
    name-form: initials
    initialize-with: ""
    sort-separator: " "
    delimiter: ", "
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    display-as-sort: all
    shorten:
      min: 7
      use-first: 3
      and-others: et-al
  dates: long
  titles: humanities
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  template:
  - delimiter: none
    group:
    - number: citation-number
    - variable: locator
      wrap:
        punctuation: parentheses
  multi-cite-delimiter: ","
  collapse: citation-number
bibliography:
  options:
    entry-suffix: .
    hanging-indent: false
    separator: ". "
  type-variants:
    [article-journal, article-magazine]:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 7
        use-first: 3
        and-others: et-al
    - title: primary
    - title: parent-serial
      form: short
    - delimiter: none
      group:
      - date: issued
        form: year
        suffix: ";"
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
      - number: supplement-number
        prefix: "(suppl "
        suffix: ")"
      - number: pages
        prefix: ":"
    - variable: doi
      prefix: " doi:"
    [book, report, thesis]:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - variable: genre
    - number: edition
    - variable: publisher
      suffix: "; "
    - date: issued
      form: year
    [chapter, paper-conference]:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - delimiter: " "
      group:
      - term: in
        suffix: ": "
      - contributor: editor
        form: long
        name-order: family-first
        label: {term: editor, form: long, placement: suffix}
      - title: parent-monograph
    - variable: publisher
      suffix: "; "
    - delimiter: none
      group:
      - date: issued
        form: year
      - number: pages
        prefix: ":"
    webpage:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - date: issued
      form: year
    - date: accessed
      form: month-day
      prefix: "Accessed "
    - date: accessed
      form: year
      prefix: ", "
      suffix: ". "
    - variable: url
    article-newspaper:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-serial
    - date: issued
      form: month-day
    - date: issued
      form: year
      prefix: ", "
    - date: accessed
      form: month-day
      prefix: "Accessed "
    - date: accessed
      form: year
      prefix: ", "
      suffix: ". "
    - variable: url
    entry-encyclopedia:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - term: in
      suffix: ": "
    - title: parent-serial
    - term: volume
      form: short
      suffix: " "
    - number: volume
    - variable: publisher
      suffix: "; "
    - delimiter: none
      group:
      - date: issued
        form: year
      - number: pages
        prefix: ":"
    dataset:
      extends: webpage
      modify:
        - match:
            date: issued
          suffix: '. '
      add:
        - component:
            term: online
            prefix: 'Published '
            suffix: ' '
          before:
            date: issued
    legal-case:
    - title: primary
    - delimiter: " "
      group:
      - variable: reporter
      - number: volume
      - number: pages
        prefix: ", "
    - delimiter: " "
      wrap:
        punctuation: parentheses
      group:
      - variable: authority
      - date: issued
        form: year
    patent:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - delimiter: none
      group:
      - term: online
        prefix: "Published "
        suffix: " "
      - date: issued
        form: month-day
      - date: issued
        form: year
        prefix: ", "
    - variable: patent-number
      prefix: ":"
    motion-picture:
      extends: webpage
      modify:
        - match:
            title: primary
          text-case: title
      add:
        - component:
            variable: publisher
            suffix: '; '
          before:
            date: issued
    broadcast:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - title: parent-serial
    - delimiter: none
      group:
      - term: online
        prefix: "Published "
        suffix: " "
      - date: issued
        form: month-day
      - date: issued
        form: year
        prefix: ", "
      - variable: number
        prefix: ":"
    - date: accessed
      form: month-day
      prefix: "Accessed "
    - date: accessed
      form: year
      prefix: ", "
      suffix: ". "
    - variable: url
    [interview, personal-communication]:
    - contributor: author
      form: long
      name-order: family-first
    - title: primary
    - delimiter: none
      group:
      - term: online
        prefix: "Published "
        suffix: " "
      - date: issued
        form: month-day
      - date: issued
        form: year
        prefix: ", "
    - variable: url
  template:
  - contributor: author
    form: long
    name-order: family-first
  - title: primary
  - variable: publisher
    suffix: "; "
  - date: issued
    form: year
