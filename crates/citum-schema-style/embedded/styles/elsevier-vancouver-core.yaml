info:
  title: Elsevier - NLM/Vancouver (citation-sequence)
  description: A style for some Elsevier journals, resembles Vancouver style
  source:
    csl-id: http://www.zotero.org/styles/elsevier-vancouver
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Richard Karnesky
      email: karnesky+zotero@gmail.com
      uri: http://arc.nucapt.northwestern.edu/Richard_Karnesky
    links:
    - href: http://www.zotero.org/styles/elsevier-vancouver
      rel: self
    - href: http://www.elsevier.com/journals/energy/0360-5442/guide-for-authors#68000
      rel: documentation
  short-name: "Vancouver"
options:
  multilingual: romanized-translated
  substitute:
    contributor-role-form: long
    template:
    - translator
  processing: numeric
  contributors:
    display-as-sort: all
    name-form: initials
    initialize-with: ''
    delimiter: ', '
    delimiter-precedes-last: always
    demote-non-dropping-particle: sort-only
    sort-separator: ' '
    role:
      omit:
      - editor
  dates:
    month: long
  page-range-format: minimal
  punctuation-in-quote: true

citation:
  template-ref: numeric-citation
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ','
  delimiter: ''
bibliography:
  options:
    entry-suffix: .
    separator: ''
  type-variants:
    article-journal:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      suffix: '. '
      shorten:
        min: 7
        use-first: 6
        and-others: et-al
        delimiter-precedes-last: always
    - title: primary
      suffix: '. '
    - group:
      - title: parent-serial
      - date: issued
        form: year
        prefix: ' '
        suffix: ';'
      - number: volume
      - number: pages
        prefix: ':'
      delimiter: ''
    - variable: doi
      prefix: '. https://doi.org/'
      suffix: '.'
      links:
        target: doi
        anchor: component
    article-magazine:
      remove:
        - match:
            date: issued
      add:
        - component:
            group:
              - title: parent-serial
              - date: issued
                form: year
                prefix: ' '
                suffix: ;
              - number: volume
              - number: pages
                prefix: ':'
            delimiter: ''
          after:
            title: primary
    article-newspaper:
      remove:
        - match:
            date: issued
      add:
        - component:
            group:
              - title: parent-serial
              - date: issued
                form: year
                prefix: ' '
            delimiter: ''
          after:
            title: primary
    book:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      suffix: '. '
    - contributor: editor
      form: long
      label: {term: editor, form: long, placement: suffix}
      suffix: '. '
    - title: primary
      suffix: '. '
    - number: edition
      suffix: '. '
    - variable: publisher-place
      suffix: ': '
    - variable: publisher
      suffix: '; '
    - date: issued
      form: year
    broadcast:
      add:
        - component:
            title: parent-serial
            suffix: ' '
          before:
            date: issued
    chapter:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      suffix: '. '
    - title: primary
      suffix: '. '
    - message: pattern.in-container-colon
      args:
        container:
          group:
            - contributor: editor
              form: long
              label: {term: editor, form: long, placement: suffix}
              suffix: '. '
            - title: parent-monograph
              suffix: ', '
          delimiter: " "
      text-case: capitalize-first
    - variable: publisher
      suffix: '; '
    - date: issued
      form: year
    - number: pages
      prefix: ', p. '
    dataset:
      modify:
        - match:
            title: primary
          suffix: ' '
    entry-encyclopedia:
      remove:
        - match:
            date: issued
      add:
        - component:
            group:
              - title: parent-serial
              - date: issued
                form: year
                prefix: ' '
                suffix: ;
              - number: volume
              - number: pages
                prefix: ':'
            delimiter: ''
          after:
            title: primary
    interview:
      modify:
        - match:
            title: primary
          suffix: ' '
    paper-conference:
      modify:
        - match:
            date: issued
          suffix: ', '
      add:
        - component:
            title: parent-monograph
            suffix: ', '
          before:
            date: issued
        - component:
            number: pages
            prefix: 'p. '
          after:
            date: issued
    personal-communication:
      modify:
        - match:
            title: primary
          suffix: ' '
    report:
      add:
        - component:
            variable: publisher-place
            suffix: ': '
          before:
            date: issued
        - component:
            variable: publisher
            suffix: '; '
          before:
            date: issued
    legal-case:
      remove:
        - match:
            contributor: author
      add:
        - component:
            number: volume
            prefix: 'vol. '
            suffix: '. '
          before:
            date: issued
    webpage:
    - number: citation-number
      wrap:
        punctuation: brackets
    - contributor: author
      form: long
      suffix: '. '
    - title: primary
      suffix: ' '
    - date: issued
      form: year
      suffix: '. '
    - variable: url
    - message: pattern.accessed-date
      args:
        date:
          date: accessed
          form: full
      wrap:
        punctuation: parentheses
    patent:
      add:
        - component:
            variable: number
            suffix: ', '
          before:
            date: issued
    thesis:
      add:
        - component:
            variable: genre
            suffix: '. '
          before:
            date: issued
        - component:
            variable: publisher
            suffix: ', '
          before:
            date: issued
  template:
  - number: citation-number
    wrap:
      punctuation: brackets
  - contributor: author
    form: long
    suffix: '. '
  - title: primary
    suffix: '. '
  - date: issued
    form: year
