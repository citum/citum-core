extends: gb-t-7714-2025-base
version: 0.71.0
info:
  title: GB/T 7714—2025（顺序编码，双语）
  id: https://zotero-chinese.com/styles/GB-T-7714—2025（顺序编码，双语）
  description: GB/T 7714—2025 信息与文献 参考文献著录规则（2026-07-01实施）
  default-locale: zh-CN
  source:
    csl-id: https://zotero-chinese.com/styles/GB-T-7714—2025（顺序编码，双语）
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Zeping Lee
      email: zepinglee@gmail.com
    links:
    - href: https://zotero-chinese.com/styles/GB-T-7714—2025（顺序编码，双语）
      rel: self
    - href: https://zotero-chinese.com/styles/GB-T-7714—2015（顺序编码，双语）
      rel: template
    - href: https://std.samr.gov.cn/gb/search/gbDetailed?id=4507EFE13D37CB6AE06397BE0A0A601F
      rel: documentation
options:
  processing: numeric
  contributors:
    initialize-with: ' '
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: null
    demote-non-dropping-particle: never
    name-form: initials
  dates:
    month: numeric
    uncertainty-marker: '?'
    approximation-marker: 'ca. '
    range-delimiter: –
    no-date-year-suffix-delimiter: '-'
    show-seconds: false
    show-timezone: false
    era-labels: default
    negative-unspecified-years: range
  page-range-format: expanded
citation:
  template:
  - number: citation-number
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ','
  collapse: citation-number
