options:
  # Style-owned so it resolves independent of which Locale object backs a
  # given render (`Processor::new` seeds a plain en-US base locale; only a
  # scoped `locales:` branch or a per-item `language` swaps in the real
  # zh-CN locale — csl26-6eak). GB/T 7714's `佚名` (anonymous-author)
  # placeholder, used by `contributor: author`'s `fallback:` on every
  # bibliography type-variant below.
  messages:
    term.anonymous: 佚名
  substitute: standard
  processing: author-date-givenname
  contributors:
    initialize-with: ' '
    shorten:
      min: 4
      use-first: 3
      and-others: et-al
      delimiter-precedes-last: contextual
    delimiter: { mark: comma }
    demote-non-dropping-particle: never
    name-form: initials
  dates:
    month: numeric
    uncertainty-marker: '?'
    approximation-marker: '['
    approximation-marker-suffix: ']'
    range-delimiter: —
    no-date-year-suffix-delimiter: '-'
    show-seconds: false
    show-timezone: false
    era-labels: default
    negative-unspecified-years: range
  page-range-format: expanded
citation:
  options:
    contributors:
      shorten:
        min: 2
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: { mark: comma }
      and: text
  template:
  - contributor: author
    form: long
  - date: issued
    form: year
  locales:
  - locale:
    - en
    template:
    - contributor: author
      form: short
      shorten:
        min: 2
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      and: text
    - date: issued
      form: year
  - default: true
    template:
    - contributor: author
      form: long
      shorten:
        min: 2
        use-first: 1
        and-others: et-al
        delimiter-precedes-last: contextual
      and: text
    - date: issued
      form: year
  wrap: parentheses
  delimiter: { mark: comma }
  multi-cite-delimiter: { mark: semicolon }
bibliography:
  options:
    # GB/T 7714 author-date has no title-as-author substitution convention:
    # an item with no author (and no editor/translator to promote) renders
    # the locale's 佚名 (anonymous-author) term via `contributor: author`'s
    # `fallback:` on each type-variant (csl26-6eak), not a promoted title.
    # The inherited global `options.substitute: standard` preset (editor →
    # title → translator) would otherwise win via `title` first — nearly
    # every reference has *some* title, so the per-component fallback would
    # never be reached. Drops `title` from the chain, keeping `editor`/
    # `translator` promotion available (a non-empty override — an empty
    # `template: []` is a merge no-op per `Substitute::merge`, not a clear).
    # Scoped to bibliography only; citations keep the inherited preset
    # unchanged (not re-verified against this bean's corpus work).
    substitute:
      template:
      - editor
      - translator
    contributors:
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: null
    # `dates` overrides the whole global `dates` block for this scope (no
    # per-field merge), so the base config's values are repeated here
    # alongside the new `note-wrap` opt-in — see CALENDAR_DATE_ANNOTATIONS.md.
    dates:
      month: numeric
      uncertainty-marker: '?'
      approximation-marker: '['
      approximation-marker-suffix: ']'
      range-delimiter: —
      no-date-year-suffix-delimiter: '-'
      show-seconds: false
      show-timezone: false
      era-labels: default
      negative-unspecified-years: range
      note-wrap: parentheses
    hanging-indent: true
    separator: ''
  template:
  - group:
    - number: volume
    - number: issue
      wrap:
        punctuation: parentheses
    delimiter: ' '
  - contributor: author
    form: long
    and: none
  - date: issued
