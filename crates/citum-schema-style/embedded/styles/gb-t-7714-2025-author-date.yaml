      rel: self
    - href: https://zotero-chinese.com/styles/GB-T-7714—2025（顺序编码，双语）
      rel: template
    - href: https://std.samr.gov.cn/gb/search/gbDetailed?id=4507EFE13D37CB6AE06397BE0A0A601F
