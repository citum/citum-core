info:
  title: Taylor & Francis - National Library of Medicine (citation-sequence, brackets)
  description: 'NLM style as used by T & F : Brackets, no et-al, no issue numbers, locators in text possible as per Version 2.2 from 30 May 2023.'
  fields:
  - medicine
  source:
    csl-id: http://www.zotero.org/styles/taylor-and-francis-national-library-of-medicine
    adapted-by: citum-migrate
    license: http://creativecommons.org/licenses/by-sa/3.0/
    original-authors:
    - name: Sebastian Karcher
    links:
    - href: http://www.zotero.org/styles/taylor-and-francis-national-library-of-medicine
      rel: self
    - href: http://www.zotero.org/styles/nlm-citation-sequence-brackets
      rel: template
    - href: https://files.taylorandfrancis.com/tf_nlm.pdf
      rel: documentation
options:
  multilingual: romanized-translated
  substitute: editor-long
  processing: numeric
  contributors: numeric-medium
  dates: long
  page-range-format: expanded
  punctuation-in-quote: true
citation:
  template:
  - number: citation-number
  - variable: locator
    prefix: ","
  wrap:
    punctuation: brackets
  multi-cite-delimiter: ","
bibliography:
  options:
    contributors:
      display-as-sort: all
      name-form: initials
      initialize-with: ""
      shorten:
        min: 4
        use-first: 3
        and-others: et-al
        delimiter-precedes-last: contextual
      delimiter: ", "
      delimiter-precedes-last: always
      sort-separator: " "
    entry-suffix: .
    separator: ". "
  type-variants:
    [article-journal, article-magazine, article-newspaper, dataset, entry-encyclopedia]:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
    - title: parent-serial
    - delimiter: ""
      group:
      - date: issued
        form: year
        suffix: ";"
      - number: volume
      - number: issue
        wrap:
          punctuation: parentheses
      - number: pages
        prefix: ":"
    - variable: doi
      prefix: ". doi:"
    - variable: url
    chapter:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
    - message: pattern.in-container-colon
      args:
        container:
          delimiter: " "
          group:
          - contributor: editor
            form: long
            name-order: family-first
            shorten:
              min: 4
              use-first: 3
            label: {term: editor, form: long, placement: suffix}
          - title: parent-monograph
      text-case: capitalize-first
    - delimiter: "; "
      group:
      - delimiter: ": "
        group:
        - variable: publisher-place
        - variable: publisher
      - date: issued
        form: year
    - number: pages
      prefix: ". p. "
    - variable: url
    paper-conference:
    - contributor: author
      form: long
      name-order: family-first
      shorten:
        min: 8
        use-first: 3
    - title: primary
    - title: parent-monograph
    - date: issued
      form: year
    - number: pages
      prefix: ". p. "
    - variable: url
  template:
  - contributor: author
    form: long
    name-order: family-first
    shorten:
      min: 8
      use-first: 3
  - title: primary
  - delimiter: "; "
    group:
    - delimiter: ": "
      group:
      - variable: publisher-place
      - variable: publisher
    - date: issued
      form: year
  - variable: url
