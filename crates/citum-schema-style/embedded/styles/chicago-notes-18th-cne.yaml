info:
  title: Chicago Manual of Style 18th edition (notes) — CNE variant
  description: >-
    Chicago-style source citations with three-part multilingual rendering for
    East Asian references: romanized title + original script + [English
    translation], with native name ordering for Han/Hangul scripts. Follows
    cite-non-english (CNE) conventions for CMOS 18th ed.
  short-name: "Chicago Notes CNE"
  edition: "18th edition"
extends: chicago-notes-18th
options:
  multilingual:
    title-mode:
      pattern:
        - view: transliterated
        - view: original
        - view: translated
          wrap: brackets
    name-mode:
      pattern:
        - view: transliterated
        - view: original
    preferred-script: Latn
    scripts:
      Han:
        use-native-ordering: true
      Hangul:
        use-native-ordering: true
