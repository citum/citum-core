info:
  title: Chicago Manual of Style 18th edition (notes) — romanized + original variant
  description: >-
    Chicago-style source citations with three-part multilingual rendering:
    romanized title + original script + [English translation], with native
    name ordering for Han/Hangul scripts. Uses the rendering pattern that some
    East Asian studies house styles (e.g. CJKR, JAAS) and the Zotero
    "Cite Non-English" (CNE) plugin produce.
  short-name: "Chicago Notes CNE"
  edition: "18th edition"
extends: chicago-notes-18th
options:
  multilingual: romanized-script-translated
