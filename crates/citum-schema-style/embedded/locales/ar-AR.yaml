locale-schema-version: "2"
locale: ar-AR

# EXPERT REVIEW NEEDED: grammar-options and date-formats below were authored
# from documented Arabic typography conventions, not by a native speaker or
# professional translator. Please have an Arabic-language editor verify
# quote characters, delimiters, and date-pattern assembly before relying on
# this locale for publication-grade output. Note: no bidi/RTL handling is
# provided here (tracked separately as csl26-uzkj).

evaluation:
  message-syntax: mf2

dates:
  months:
    long:
      - يناير
      - فبراير
      - مارس
      - أبريل
      - مايو
      - يونيو
      - يوليو
      - أغسطس
      - سبتمبر
      - أكتوبر
      - نوفمبر
      - ديسمبر
  seasons:
    - الربيع
    - الصيف
    - الخريف
    - الشتاء

roles:
  editor:
    long:
      singular:
        masculine: مُحَرِّر
        feminine: مُحَرِّرَة
        common: تحقيق
      plural:
        masculine: مُحَرِّرون
        feminine: مُحَرِّرات
        common: تحقيق
    short:
      singular: تح.
    verb: تحقيق
  translator:
    long:
      singular:
        masculine: مُتَرْجِم
        feminine: مُتَرْجِمَة
        common: ترجمة
      plural:
        masculine: مُتَرْجِمون
        feminine: مُتَرْجِمات
        common: ترجمة
    short:
      singular: تر.
    verb: ترجمة

locators:
  page:
    long:
      singular: صفحة
      plural: صفحات
    short:
      singular: ص.
      plural: ص.
    gender: feminine

terms:
  in:
    long: في

messages:
  # NOTE: Using personal nouns (مُحَرِّر/مُتَرْجِم) for gendered forms.
  # Fallback to verbal nouns (تحقيق/ترجمة) for neutral or unknown groups, consistent with standard Arabic CSL.
  role.editor.label: "تح."
  role.editor.label-long: |
    .match {$gender :select} {$count :plural}
    when masculine one {مُحَرِّر}
    when masculine * {مُحَرِّرون}
    when feminine one {مُحَرِّرَة}
    when feminine * {مُحَرِّرات}
    when * * {تحقيق}
  role.editor.verb: "تحقيق"
  role.translator.label: "تر."
  role.translator.label-long: |
    .match {$gender :select} {$count :plural}
    when masculine one {مُتَرْجِم}
    when masculine * {مُتَرْجِمون}
    when feminine one {مُتَرْجِمَة}
    when feminine * {مُتَرْجِمات}
    when * * {ترجمة}
  role.translator.verb: "ترجمة"
  pattern.accessed-date: "تاريخ الوصول {$date}"
  pattern.accessed-date-colon: "تاريخ الوصول: {$date}"
  pattern.in-container: "في {$container}"
  pattern.in-container-colon: "في: {$container}"
  pattern.originally-published-as: "نُشر في الأصل بعنوان {$title}"
  pattern.cited-date: "تاريخ الاستشهاد {$date}"
  pattern.issued-date: "تاريخ الإصدار {$date}"
  pattern.retrieved-date: "تاريخ الاسترجاع {$date}"
  pattern.published-online: "نُشر على الإنترنت"
  pattern.published-online-date: "نُشر على الإنترنت {$date}"
  pattern.patent-number: "براءة اختراع {$number}"
  pattern.locator-at: "في {$locator}"
  pattern.retrieved-from: "استُرجع من {$url}"
  pattern.available-at: "متاح على {$url}"

date-formats:
  numeric-short: "d/M/yyyy"
  textual-long: "MMMM yyyy"
  textual-full: "d MMMM yyyy"
  bib-default: "d MMMM yyyy"
  year-only: "yyyy"
  iso: "yyyy-MM-dd"

number-formats:
  digit-system: arabic-indic

grammar-options:
  punctuation-in-quote: false
  nbsp-before-colon: false
  open-quote: "«"
  close-quote: "»"
  open-inner-quote: "‹"
  close-inner-quote: "›"
  serial-comma: false
  page-range-delimiter: "–"
  title-subtitle-delimiter: ": "
  subtitle-delimiter: "، "
  strong-terminal-comma-policy: keep-terminal
  delimiter-suppressing-terminal-marks: "؟!…"
