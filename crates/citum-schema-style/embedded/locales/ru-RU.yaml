messages:
  number.ordinal: "{$value}-й"
  term.page-label: "с."
  term.page-label-long: |
    .match {$count :plural}
    when one {страница}
    when * {страницы}
  term.and: "и"
  term.et-al: "и др."
  term.no-date: "б. д."
  term.accessed: "дата обращения"
  term.retrieved: "получено"
  role.editor.label: "ред."
  role.editor.label-long: |
    .match {$count :plural}
    when one {редактор}
    when * {редакторы}
  role.editor.verb: "под редакцией"
  term.archive-collection-label: "коллекция"
  term.archive-series-label: "серия"
  term.archive-box-label: |
    .match {$count :plural}
    when one {коробка}
    when * {коробки}
  term.archive-folder-label: |
    .match {$count :plural}
    when one {папка}
    when * {папки}
  term.archive-item-label: |
    .match {$count :plural}
    when one {единица хранения}
    when * {единицы хранения}
  pattern.accessed-date: "дата обращения {$date}"
  pattern.accessed-date-colon: "дата обращения: {$date}"
  pattern.in-container: "в {$container}"
  pattern.in-container-colon: "в: {$container}"
  pattern.originally-published-as: "первоначально опубликовано как «{$title}»"
  pattern.cited-date: "цит. по {$date}"
  pattern.issued-date: "издано {$date}"
  pattern.retrieved-date: "получено {$date}"
  pattern.published-online: "опубликовано онлайн"
  pattern.published-online-date: "опубликовано онлайн {$date}"
  pattern.patent-number: "патент № {$number}"
  pattern.locator-at: "в {$locator}"
  pattern.retrieved-from: "получено из {$url}"
  pattern.available-at: "доступно по адресу {$url}"
  date.open-ended: "по настоящее время"

date-formats:
  numeric-short: "d.M.yyyy"
  textual-long: "MMMM yyyy"
  textual-full: "d MMMM yyyy"
  bib-default: "d MMMM yyyy"
  year-only: "yyyy"
  iso: "yyyy-MM-dd"

grammar-options:
  punctuation-in-quote: false
  nbsp-before-colon: false
  open-quote: "«"
  close-quote: "»"
  open-inner-quote: "„"
  close-inner-quote: "“"
  serial-comma: false
  page-range-delimiter: "–"
  title-subtitle-delimiter: ": "
  subtitle-delimiter: ", "
  strong-terminal-comma-policy: keep-terminal
  delimiter-suppressing-terminal-marks: "?!…"

legacy-term-aliases:
  page: term.page-label
  pages: term.page-label
  et_al: term.et-al
  and: term.and
  accessed: term.accessed
  retrieved: term.retrieved
  no_date: term.no-date
  "no date": term.no-date
  editor: role.editor.label
