locale-schema-version: "2"
locale: ru-RU

# EXPERT REVIEW NEEDED: this locale was authored from documented Russian
# (GOST R 7.0.5-2008) citation conventions, not by a native speaker or
# professional translator. Please have a Russian-language editor verify
# role/term vocabulary, grammatical case/gender agreement, quote
# characters, and date-pattern assembly before relying on this locale for
# publication-grade output. Note: plural messages below use the binary
# one/* selector pattern already established by de-DE/ar-AR, not full
# CLDR one/few/many categories — a known simplification, not a regression.

