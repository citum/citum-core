# Chicago-style English override: curly quotes inside punctuation
messages:
  pattern.chicago-aired-date: "aired {$date}"
  pattern.chicago-by: "by {$name}"
  pattern.chicago-interview-by: "interview by {$name}"
  pattern.chicago-on: "on {$source}"
  pattern.chicago-review-of: "review of {$genre}"
  pattern.chicago-to: "to {$name}"
  pattern.chicago-with: "with {$name}"
  pattern.chicago-written-by: "written by {$name}"
grammar-options:
  punctuation-in-quote: true
  open-quote: "\u201C"
  close-quote: "\u201D"
  open-inner-quote: "\u2018"
  close-inner-quote: "\u2019"
  nbsp-before-colon: false
  serial-comma: true
  page-range-delimiter: "\u2013"
  title-subtitle-delimiter: ": "
  subtitle-delimiter: "; "
legacy-term-aliases: {}
