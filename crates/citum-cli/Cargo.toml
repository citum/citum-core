[package]
name = "citum"
version.workspace = true
edition.workspace = true

[[bin]]
name = "citum"
path = "src/main.rs"

[dependencies]
clap = { version = "4.4", features = ["derive", "color"] }
clap_complete = "4.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
ciborium = "0.2"
strsim = "0.10"
walkdir = "2.4"
schemars = { version = "0.8", optional = true }
indexmap = "2.2.3"
citum_schema = { package = "citum-schema", path = "../citum-schema" }
citum_engine = { package = "citum-engine", path = "../citum-engine" }
typst = { version = "0.13.1", optional = true }
typst-pdf = { version = "0.13.1", optional = true }
typst-kit = { version = "0.13.1", optional = true, default-features = false, features = ["fonts", "embed-fonts"] }

[features]
default = []
schema = ["dep:schemars", "citum_schema/schema"]
typst-pdf = ["dep:typst", "dep:typst-pdf", "dep:typst-kit"]
