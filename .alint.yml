# Generated by `alint init`. Adjust as needed.
# Detected: Rust.
# Run `alint check` to lint, `alint fix` to apply auto-fixable rules.
# See https://alint.org for the full ruleset reference.

version: 1

ignore:
  - "styles-legacy/**"
  - "tests/csl-test-suite/**"
  - ".beans/**"

extends:
  - alint://bundled/oss-baseline@v1
  - alint://bundled/rust@v1

rules:
  - id: oss-no-trailing-whitespace
    paths:
      exclude:
        - ".beans/**"
        - "**/*.md"
        - "docs/**"
        - "scripts/**/*.js"
        - "scripts/**/*.py"
        - "scripts/report-data/**"
        - "tests/fixtures/**"

  - id: oss-license-exists
    level: off
  - id: oss-dependency-update-tool
    level: off
  - id: oss-codeowners-exists
    level: off
  - id: oss-code-of-conduct-exists
    level: off

  - id: broken-markdown-links
    kind: markdown_paths_resolve
    paths:
      - "docs/guides/*.md"
      - "docs/policies/*.md"
      - "docs/reference/*.md"
      - "docs/specs/*.md"
      - "README.md"
      - "CLAUDE.md"
    prefixes:
      - "crates/"
      - "docs/"
      - "scripts/"
      - "tests/"
      - "examples/"
      - "locales/"
      - "registry/"
      - "./docs/"
    level: error

  - id: skill-manifest-frontmatter
    kind: file_content_matches
    paths:
      - ".claude/skills/*/SKILL.md"
      - ".skills/*/SKILL.md"
    pattern: "(?s)^---\\n.*name: .+\\n.*description: .+\\n.*---"
    level: error

  - id: coverage-manifest-version
    kind: json_path_equals
    paths:
      - "tests/fixtures/coverage-manifest.json"
    path: "$.version"
    equals: 1
    level: error

  - id: baseline-files-exist
    kind: file_exists
    paths:
      - "scripts/report-data/oracle-top10-baseline.json"
      - "scripts/report-data/core-quality-baseline.json"
      - "scripts/report-data/verification-policy.yaml"
      - "scripts/report-data/fixture-sufficiency.yaml"
    level: off

  - id: rust-license-header
    kind: file_content_matches
    paths: "crates/**/*.rs"
    pattern: "(?s)^/\\*\\nSPDX-License-Identifier: MIT OR Apache-2.0\\nSPDX-FileCopyrightText: © 2023-2026 Bruce D'Arcus\\n\\*/"
    level: warning

  - id: rust-crate-readme
    kind: file_exists
    paths: "crates/*/README.md"
    level: off

  - id: rust-no-println
    kind: file_content_forbidden
    paths:
      - "crates/citum-engine/**/*.rs"
      - "crates/citum-schema/**/*.rs"
    pattern: 'println!\('
    level: warning

  - id: rust-cargo-metadata
    kind: file_content_matches
    paths: "crates/*/Cargo.toml"
    pattern: "(?s)license(\\.workspace)?\\s*=.*repository(\\.workspace)?\\s*="
    level: warning

  - id: conventional-commits
    kind: git_commit_message
    pattern: '^(Revert ".+"|fixup! .+|squash! .+|(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\((engine|schema|migrate|store|cli|server|styles|locale|i18n|ci|hooks|beans|scripts|tooling|spec|docs|release|report|examples|bindings|security|demo)\))?(!)?: [a-z].+)'
    subject_max_length: 50
    requires_body: true
    since: ${ALINT_BASE_SHA:-origin/main}
    level: error

  - id: rust-mod-doc
    kind: file_content_matches
    paths: "crates/*/src/lib.rs"
    pattern: "(?s)^(/\\*.*?\\*/\\s*)?//!"
    level: warning

  - id: rust-forbid-unsafe
    kind: file_content_matches
    paths:
      - "crates/citum-schema/src/lib.rs"
      - "crates/citum-migrate/src/lib.rs"
      - "crates/citum-analyze/src/lib.rs"
    pattern: "#!\\[forbid\\(unsafe_code\\)\\]"
    level: warning
