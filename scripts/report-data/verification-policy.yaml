version: 1
defaults:
  authority: citeproc-js
  secondary: []
  scopes:
    - citation
    - bibliography
divergences:
  div-004:
    scopes:
      - citation
      - bibliography
    tags:
      - missing-name-title-sort-order
      - sort-derived-numeric-citation-label
    note: Missing-name works sort by title under author-based sorting. Adjusted
      verification excludes mismatches caused solely by this registered
      divergence while preserving raw citeproc deltas in reports.
  div-005:
    scopes:
      - citation
    tags:
      - citeproc-legacy-archive-gap
      - structured-archival-manuscript-detail
    note: Citeproc-js does not surface the structured archival manuscript
      metadata that Citum now renders for note-style manuscript citations.
      Adjusted verification treats those archival-tail additions as intentional
      while preserving raw citeproc deltas in reports.
  div-008:
    scopes:
      - citation
      - bibliography
    tags:
      - same-family-secondary-sort-title-vs-given
      - sort-derived-numeric-citation-label
    note: After a family-name match, citeproc-js sorts by given name (family →
      given → suffix → title); Citum sorts by title (family → title). Adjusted
      verification masks numeric citation labels that shift solely due to
      within-group reordering of same-family-name items, independent of the
      div-004 anonymous-item adjustment.
  div-009:
    scopes:
      - bibliography
    tags:
      - normalized-tex-cstr
      - duplicate-url-identifier-tail
      - pending-reviewer-confirmation
    note: Citum normalizes Zotero's tex.cstr alias to canonical CSTR. When the
      same identifier is already embedded in the URL, citeproc-js omits the
      canonical tail because it does not recognize the alias. The pull
      request review raised GB/T 7714 §7.9.1 and §7.9.2 as a possible
      alternate reading — when the URL already contains the persistent
      identifier, the identifier tail can be omitted regardless of the
      tex.cstr/CSTR alias question, meaning Citum's own rendering, not just
      citeproc-js's alias gap, might need to omit the tail here. Left
      registered as-is pending reviewer confirmation; if confirmed,
      implement URL-containment-based omission in the CSTR identifier
      component and retire this divergence rather than only documenting it.
  div-010:
    scopes:
      - citation
      - bibliography
    tags:
      - latin-script-punctuation-localization
      - verification-proxy-gap
    note: GB/T-style bilingual styles hardcode CJK full-width delimiters
      (：，（）) for every item, including Latin-script references, where GB/T
      practice is Latin half-width punctuation. Citeproc-js reproduces the
      same hardcoded full-width punctuation, so byte-parity against it does
      not catch this — the fidelity gate's proxy is weaker than the real
      requirement (same failure class as the tier-0 alias negative result).
      Adjusted verification masks mismatches that are punctuation-only after
      remapping full-width to Latin delimiters, for Latin-script items only.
      See docs/specs/MULTILINGUAL.md §3.2a and csl26-fn9x.

