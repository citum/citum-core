version: 1
defaults:
  authority: citeproc-js
  secondary: []
  scopes:
    - citation
    - bibliography
divergences:
  div-004:
    scopes:
      - citation
      - bibliography
    tags:
      - missing-name-title-sort-order
      - sort-derived-numeric-citation-label
    note: Missing-name works sort by title under author-based sorting. Adjusted
      verification excludes mismatches caused solely by this registered
      divergence while preserving raw citeproc deltas in reports.
  div-005:
    scopes:
      - citation
    tags:
      - citeproc-legacy-archive-gap
      - structured-archival-manuscript-detail
    note: Citeproc-js does not surface the structured archival manuscript
      metadata that Citum now renders for note-style manuscript citations.
      Adjusted verification treats those archival-tail additions as intentional
      while preserving raw citeproc deltas in reports.

styles:
  numeric-comp:
    authority: biblatex
    authority_id: numeric-comp
    secondary:
      - citeproc-js
    scopes:
      - citation
      - bibliography
    fixture_family: chemistry
    regression_baseline: citum-baseline
    note: Authority follows biblatex numeric-comp. Citum snapshots remain only
      as a regression baseline.
  chem-acs:
    authority: biblatex
    authority_id: chem-acs
    secondary:
      - citeproc-js
    scopes:
      - citation
      - bibliography
    scope_authorities:
      citation:
        authority: citeproc-js
    fixture_family: chemistry
    regression_baseline: citum-baseline
    note: Bibliography authority follows biblatex chem-acs; citation authority
      remains citeproc-js until citation-side biblatex comparison is available.
