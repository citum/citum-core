version: 1
defaults:
  authority: citeproc-js
  secondary: []
  scopes:
    - citation
    - bibliography
divergences:
  div-004:
    scopes:
      - citation
      - bibliography
    tags:
      - missing-name-title-sort-order
      - sort-derived-numeric-citation-label
    note: Missing-name works sort by title under author-based sorting. Adjusted
      verification excludes mismatches caused solely by this registered
      divergence while preserving raw citeproc deltas in reports.
  div-005:
    scopes:
      - citation
    tags:
      - citeproc-legacy-archive-gap
      - structured-archival-manuscript-detail
    note: Citeproc-js does not surface the structured archival manuscript
      metadata that Citum now renders for note-style manuscript citations.
      Adjusted verification treats those archival-tail additions as intentional
      while preserving raw citeproc deltas in reports.
  div-008:
    scopes:
      - citation
      - bibliography
    tags:
      - same-family-secondary-sort-title-vs-given
      - sort-derived-numeric-citation-label
    note: After a family-name match, citeproc-js sorts by given name (family →
      given → suffix → title); Citum sorts by title (family → title). Adjusted
      verification masks numeric citation labels that shift solely due to
      within-group reordering of same-family-name items, independent of the
      div-004 anonymous-item adjustment.

styles:
  numeric-comp:
    authority: biblatex
    authority_id: numeric-comp
    secondary:
      - citeproc-js
    scopes:
      - citation
      - bibliography
    fixture_family: chemistry
    regression_baseline: citum-baseline
    note: Authority follows biblatex numeric-comp. Citum snapshots remain only
      as a regression baseline.
  chem-acs:
    authority: biblatex
    authority_id: chem-acs
    secondary:
      - citeproc-js
    scopes:
      - citation
      - bibliography
    scope_authorities:
      citation:
        authority: citeproc-js
    fixture_family: chemistry
    regression_baseline: citum-baseline
    note: Bibliography authority follows biblatex chem-acs; citation authority
      remains citeproc-js until citation-side biblatex comparison is available.
  angewandte-chemie:
    authority: biblatex
    authority_id: chem-angew
    secondary:
      - citeproc-js
    scopes:
      - citation
      - bibliography
    scope_authorities:
      citation:
        authority: citeproc-js
    fixture_family: chemistry
    regression_baseline: citum-baseline
    note: Bibliography authority follows biblatex chem-angew; citation
      authority remains citeproc-js until citation-side biblatex comparison is
      available.
  chem-rsc:
    authority: biblatex
    authority_id: chem-rsc
    secondary:
      - citeproc-js
    scopes:
      - citation
      - bibliography
    scope_authorities:
      citation:
        authority: citeproc-js
    fixture_family: chemistry
    regression_baseline: citum-baseline
    note: Bibliography authority follows biblatex chem-rsc; citation authority
      remains citeproc-js until citation-side biblatex comparison is available.
  chem-biochem:
    authority: biblatex
    authority_id: chem-biochem
    secondary:
      - citeproc-js
    scopes:
      - citation
      - bibliography
    scope_authorities:
      citation:
        authority: citeproc-js
    fixture_family: chemistry
    regression_baseline: citum-baseline
    note: Bibliography authority follows biblatex chem-biochem; citation
      authority remains citeproc-js until citation-side biblatex comparison is
      available.
  apa-7th:
    secondary:
      - biblatex
    fixture_family: author-date
    benchmark_runs:
      - id: apa-zotero-bibliography
        label: APA Zotero bibliography
        runner: citeproc-oracle
        refs_fixture: tests/fixtures/test-items-library/apa-7th.json
        scope: bibliography
        count_toward_fidelity: false
      - id: apa-test-library-diagnostic
        label: APA test library diagnostic
        runner: citeproc-oracle
        refs_fixture: tests/fixtures/test-items-library/apa-test.json
        scope: bibliography
        count_toward_fidelity: false
  american-medical-association:
    secondary:
      - biblatex
    benchmark_runs:
      - id: ama-zotero-bibliography
        label: AMA Zotero bibliography
        runner: citeproc-oracle
        refs_fixture: tests/fixtures/test-items-library/ama-11th.json
        scope: bibliography
        count_toward_fidelity: false
  ieee:
    secondary:
      - biblatex
    fixture_family: physics-numeric
  nature:
    secondary:
      - biblatex
    fixture_family: physics-numeric
  modern-language-association:
    secondary:
      - biblatex
    fixture_family: note-humanities
  chicago-author-date-18th:
    secondary:
      - biblatex
    fixture_family: author-date
    benchmark_runs:
      - id: chicago-zotero-bibliography
        label: Chicago Zotero bibliography
        runner: citeproc-oracle
        refs_fixture: tests/fixtures/test-items-library/chicago-18th.json
        scope: bibliography
        count_toward_fidelity: true
        min_pass_rate: 0.73
      # Shared Chicago-family corpus (csl26-8br0): one fixture pair exercising
      # citation AND bibliography output, wired identically across the
      # bibliography-bearing Chicago variants so the family is measured on a
      # common surface. Diagnostic-only for now — promotion to a gating run
      # (count_toward_fidelity: true + tuned min_pass_rate) is the substrate
      # PR's job (csl26-h7oc), after the shared component/conversion work lands.
      - id: chicago-shared-corpus
        label: Chicago shared corpus (citation + bibliography)
        runner: citeproc-oracle
        refs_fixture: tests/fixtures/test-items-library/chicago-18th.json
        citations_fixture: tests/fixtures/test-items-library/chicago-18th-citations.json
        scope: both
        count_toward_fidelity: false
      - id: relational-comprehensive-smoke
        label: Relational comprehensive native smoke
        runner: native-smoke
        refs_fixture: examples/comprehensive.yaml
        scope: bibliography
        count_toward_fidelity: false
      - id: relational-chicago-bib-smoke
        label: Relational Chicago bibliography native smoke
        runner: native-smoke
        refs_fixture: examples/chicago-bib.yaml
        scope: bibliography
        count_toward_fidelity: false
  chicago-notes-18th:
    secondary:
      - biblatex
    scopes:
      - citation
    fixture_family: note-humanities
    # No shared-corpus benchmark_run here: this variant has no bibliography
    # surface (bibliography.template is []), and citeproc-oracle does not yet
    # support a citation-only scope. Wiring it onto the shared corpus is
    # tracked as follow-up bean csl26-qy4d (give notes-18th a bibliography
    # surface / lift the citation-scope oracle restriction).
  chicago-shortened-notes-bibliography:
    secondary:
      - biblatex
    # No fixture_family here on purpose: this style had no policy entry before
    # and was graded base-run-only. Adding a family would change its gating
    # fidelity surface, which is out of scope for this ground-prep commit — the
    # only addition is the diagnostic (count_toward_fidelity: false) run below.
    benchmark_runs:
      - id: chicago-shared-corpus
        label: Chicago shared corpus (citation + bibliography)
        runner: citeproc-oracle
        refs_fixture: tests/fixtures/test-items-library/chicago-18th.json
        citations_fixture: tests/fixtures/test-items-library/chicago-18th-citations.json
        scope: both
        count_toward_fidelity: false
  taylor-and-francis-chicago-author-date:
    secondary:
      - biblatex
    fixture_family: author-date
    benchmark_runs:
      - id: chicago-shared-corpus
        label: Chicago shared corpus (citation + bibliography)
        runner: citeproc-oracle
        refs_fixture: tests/fixtures/test-items-library/chicago-18th.json
        citations_fixture: tests/fixtures/test-items-library/chicago-18th-citations.json
        scope: both
        count_toward_fidelity: false
  american-physics-society:
    secondary:
      - biblatex
    fixture_family: physics-numeric
  american-institute-of-physics:
    secondary:
      - biblatex
    fixture_family: physics-numeric
  american-chemical-society:
    secondary:
      - biblatex
    fixture_family: chemistry
  royal-society-of-chemistry:
    secondary:
      - biblatex
    fixture_family: chemistry
