version: 3
regression_profiles:
  ibid-and-subsequent:
    requires:
      ibid: true
      subsequent: true
    checks:
      lexical_ibid: true
      immediate_falls_back_to_subsequent: false
      distinct_subsequent: true
  ibid-only:
    requires:
      ibid: true
      subsequent: false
    checks:
      lexical_ibid: true
      immediate_falls_back_to_subsequent: false
      distinct_subsequent: false
  subsequent-fallback:
    requires:
      ibid: false
      subsequent: true
    checks:
      lexical_ibid: false
      immediate_falls_back_to_subsequent: true
      distinct_subsequent: true
conformance_families:
  chicago-full-note:
    lexical_marker: ibid
    note_start_text_case: capitalize-first
    immediate_repeat_form: marker
    immediate_with_locator_form: marker
    shortened_note_source: subsequent
    distinct_subsequent: true
    unresolved:
      - prose-integral
  chicago-shortened-note:
    lexical_marker: ibid
    note_start_text_case: capitalize-first
    immediate_repeat_form: marker
    immediate_with_locator_form: marker
    shortened_note_source: base
    distinct_subsequent: false
    unresolved:
      - prose-integral
  mhra-full-note:
    lexical_marker: none
    immediate_repeat_form: shortened-note
    immediate_with_locator_form: shortened-note
    shortened_note_source: subsequent
    distinct_subsequent: true
    unresolved:
      - note-start
      - prose-integral
  mhra-shortened-note:
    lexical_marker: ibid
    immediate_repeat_form: marker
    immediate_with_locator_form: marker
    shortened_note_source: base
    distinct_subsequent: false
    unresolved:
      - note-start
      - prose-integral
  new-harts-full-note:
    lexical_marker: none
    immediate_repeat_form: shortened-note
    immediate_with_locator_form: shortened-note
    shortened_note_source: subsequent
    distinct_subsequent: true
    unresolved:
      - note-start
      - prose-integral
  oscola:
    lexical_marker: ibid
    note_start_text_case: lowercase
    immediate_repeat_form: marker
    immediate_with_locator_form: marker
    shortened_note_source: subsequent
    distinct_subsequent: true
    unresolved:
      - prose-integral
  oscola-no-ibid:
    lexical_marker: none
    immediate_repeat_form: shortened-note
    immediate_with_locator_form: shortened-note
    shortened_note_source: subsequent
    distinct_subsequent: true
    unresolved:
      - note-start
      - prose-integral
  thomson-reuters-legal-short-note:
    lexical_marker: none
    immediate_repeat_form: shortened-note
    immediate_with_locator_form: shortened-note
    shortened_note_source: subsequent
    distinct_subsequent: true
    unresolved:
      - note-start
      - prose-integral
styles:
  chicago-notes:
    regression_profile: ibid-and-subsequent
    conformance_family: chicago-full-note
  chicago-notes-18th:
    regression_profile: ibid-and-subsequent
    conformance_family: chicago-full-note
  chicago-notes-bibliography-17th-edition:
    regression_profile: ibid-and-subsequent
    conformance_family: chicago-full-note
  chicago-notes-bibliography-classic-archive-place-first-no-url:
    regression_profile: ibid-and-subsequent
    conformance_family: chicago-full-note
  chicago-notes-classic:
    regression_profile: ibid-and-subsequent
    conformance_family: chicago-full-note
  chicago-notes-classic-archive-place-first:
    regression_profile: ibid-and-subsequent
    conformance_family: chicago-full-note
  chicago-notes-classic-no-url:
    regression_profile: ibid-and-subsequent
    conformance_family: chicago-full-note
  chicago-notes-publisher-place-archive-place-first-no-url:
    regression_profile: ibid-and-subsequent
