name: Deploy Documentation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      refresh_compat:
        description: "Rebuild compat.html from corpora instead of reusing the published copy"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      CARGO_INCREMENTAL: "0"
      SCCACHE_DIR: /home/runner/.cache/sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore published compatibility report
        if: ${{ !inputs.refresh_compat }}
        run: |
          curl -fsSL https://citum.github.io/citum-core/compat.html -o docs/compat.html || {
            echo "Failed to fetch published compat.html. Re-run this workflow with refresh_compat=true." >&2
            exit 1
          }

      - name: Initialize optional corpora
        if: ${{ inputs.refresh_compat }}
        run: git submodule update --init --depth 1 styles-legacy tests/csl-test-suite

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker and sccache
        run: sudo apt-get update && sudo apt-get install -y mold sccache

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cache Rust (dependencies + sccache)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citum-core-rust"
          cache-workspace-crates: true
          cache-directories: /home/runner/.cache/sccache

      - name: Configure environment
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          sccache --start-server

      - name: Install Node dependencies
        run: npm install --prefix scripts

      - name: Build documentation guides
        run: npm run build:docs --prefix scripts

      - name: Generate compatibility report
        if: ${{ inputs.refresh_compat }}
        run: node scripts/report-core.js --all-features --output-html docs/compat.html > /tmp/core-report.json

      - name: Generate behavior coverage report
        run: |
          ./scripts/test-report.sh
          cp target/test-report.html docs/behavior-report.html
          ./scripts/migration-test-report.sh
          cp target/migration-behavior-report.html docs/migration-behavior-report.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './docs'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Display sccache stats
        run: sccache --show-stats
