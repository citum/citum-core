name: Compat Report

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  report:
    name: Generate and Deploy Docs
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: /tmp/citum-target
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize optional corpora
        run: git submodule update --init --depth 1 styles-legacy tests/csl-test-suite

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Node dependencies
        run: npm install --prefix scripts

      - name: Build Rust workspace
        run: cargo build

      - name: Generate compatibility report
        run: node scripts/report-core.js --output-html docs/compat.html > /tmp/core-report.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
