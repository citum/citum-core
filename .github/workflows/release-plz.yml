name: Release

on:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@1800853f2578f8c34492ec76154caef8e163fbca # v1.17.7

      - name: Install release-plz
        shell: bash
        run: |
          cargo-binstall \
            release-plz@0.3.157 \
            --force \
            --strategies=crate-meta-data,compile \
            --no-confirm

      - name: Configure git user from GitHub token
        uses: release-plz/git-config@59144859caf016f8b817a2ac9b051578729173c4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare released manifest snapshot
        id: released_manifest
        shell: bash
        run: |
          latest_tag=$(git tag --sort=version:refname -l 'v*' | tail -n 1)
          if [[ -z "${latest_tag}" ]]; then
            echo "::error::No root release tag matching v* was found."
            exit 1
          fi

          snapshot_dir="${RUNNER_TEMP}/release-plz-registry-manifest"
          git worktree add --detach "${snapshot_dir}" "${latest_tag}"
          echo "tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
          echo "manifest_path=${snapshot_dir}/Cargo.toml" >> "${GITHUB_OUTPUT}"
          echo "Using released manifest from ${latest_tag}"

      - name: Run release-plz release-pr
        id: release_pr
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          stderr_file=$(mktemp)
          if ! release_pr_output=$(release-plz release-pr \
            --git-token "${GITHUB_TOKEN}" \
            --repo-url "https://github.com/${GITHUB_REPOSITORY}" \
            --config .release-plz.toml \
            --registry-manifest-path "${{ steps.released_manifest.outputs.manifest_path }}" \
            --forge github \
            -v \
            -o json 2>"${stderr_file}"); then
            echo "::group::release-plz release-pr stderr"
            cat "${stderr_file}"
            echo "::endgroup::"
            if grep -q "422" "${stderr_file}"; then
              echo "::error::release-plz release-pr failed with HTTP 422. See stderr above."
            fi
            rm -f "${stderr_file}"
            exit 1
          fi

          rm -f "${stderr_file}"
          echo "release_pr_output: ${release_pr_output}"
          prs=$(echo "${release_pr_output}" | jq -c .prs)
          echo "prs=${prs}" >> "${GITHUB_OUTPUT}"
          if [[ "$(echo "${prs}" | jq 'length')" == "0" ]]; then
            echo "::warning::release-plz created no release PRs for this push."
          fi

      - name: Run release-plz release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          release_output=$(release-plz release \
            --git-token "${GITHUB_TOKEN}" \
            --config .release-plz.toml \
            --registry-manifest-path "${{ steps.released_manifest.outputs.manifest_path }}" \
            --forge github \
            -v \
            -o json)
          echo "release_output: ${release_output}"

      - name: Clean up released manifest snapshot
        if: always()
        shell: bash
        run: |
          git worktree remove --force "${RUNNER_TEMP}/release-plz-registry-manifest"
