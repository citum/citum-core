name: Release

on:
  workflow_dispatch:
    inputs:
      command:
        description: "release-plz command to run"
        required: true
        default: release-pr
        type: choice
        options:
          - release-pr
          - release
      ref:
        description: "Git ref to release from"
        required: false
        default: main
        type: string

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.event.inputs.command || 'release-pr' }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@49c995b2442b0f60dd4aab07a164cc00643471fc # v0.5.128
        with:
          command: ${{ github.event.inputs.command || 'release-pr' }}
          config: .release-plz.toml
          verbose: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
