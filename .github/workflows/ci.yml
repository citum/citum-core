name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install script dependencies
        run: npm install --prefix scripts

      - name: Check testing infrastructure contracts
        run: node scripts/check-testing-infra.js

      - name: Run script regression tests
        run: node --test scripts/*.test.js

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Enforce public API docs for citum-edtf
        run: cargo rustc -p citum-edtf --lib --all-features -- -Dmissing-docs

      - name: Enforce public API docs for citum-server
        run: cargo rustc -p citum-server --lib --all-features -- -Dmissing-docs

      - name: Enforce public API docs for citum-engine
        run: cargo rustc -p citum-engine --lib --all-features -- -Dmissing-docs

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Verify JSON schemas are up to date
        run: |
          tmp_dir="$(mktemp -d)"
          cargo run --bin citum --features schema -- schema --out-dir "$tmp_dir"
          diff -ru "$tmp_dir" docs/schemas

      - name: Check core fidelity and SQI drift
        run: |
          node scripts/report-core.js > /tmp/core-report.json
          node scripts/check-core-quality.js \
            --report /tmp/core-report.json \
            --baseline scripts/report-data/core-quality-baseline.json

      - name: Check oracle top-10 regression baseline
        run: |
          node scripts/check-oracle-regression.js \
            --baseline scripts/report-data/oracle-top10-baseline.json
