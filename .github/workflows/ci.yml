name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'CLAUDE.md'
      - 'docs/**'

jobs:
  core:
    name: Core Checks
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: /tmp/citum-target
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_DEV_CODEGEN_UNITS: "256"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - name: Install beans CLI
        run: |
          curl -fsSL \
            https://github.com/hmans/beans/releases/download/v0.4.0/beans_Linux_x86_64.tar.gz \
            -o /tmp/beans.tar.gz
          tar -xzf /tmp/beans.tar.gz -C /tmp
          sudo install -m 0755 /tmp/beans /usr/local/bin/beans
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install script dependencies
        run: npm install --prefix scripts

      - name: Run bean hygiene regression tests
        run: ./scripts/test-beans-hygiene.sh

      - name: Check docs and bean hygiene
        run: ./scripts/check-docs-beans-hygiene.sh

      - name: Validate repo frontmatter manifests
        run: ./scripts/validate-frontmatter.sh --repo-only --copilot-strict

      - name: Validate production styles
        run: ./scripts/validate-production-styles.sh

      - name: Check testing infrastructure contracts
        run: node scripts/check-testing-infra.js

      - name: Check facade crate boundaries
        run: ./scripts/check-facade-crate.sh

      - name: Run script regression tests
        run: node --test scripts/*.test.js

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --workspace --all-targets --exclude citum-pdf -- -D warnings

      - name: Enforce public API docs
        run: cargo doc --no-deps --workspace --exclude citum-pdf

      - name: Run tests
        run: cargo test --verbose

      - name: Verify JSON schemas are up to date
        run: |
          tmp_dir="$(mktemp -d)"
          cargo run --bin citum --features schema -- schema --out-dir "$tmp_dir"
          diff -ru "$tmp_dir" docs/schemas
