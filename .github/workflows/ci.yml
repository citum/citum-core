name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - '**.md'
      - 'docs/**'
      - '.beans/**'
      - '.beans.yml'
      - '.release-plz.toml'
      - 'cliff.toml'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - '.gitignore'
      - '.gitattributes'
      - '.gitmodules'
      - '.jj/**'
      - '.claude/**'
      - '.codex/**'
      - '.oracle-cache/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      hygiene: ${{ steps.filter.outputs.hygiene }}
      semver: ${{ steps.filter.outputs.semver }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'styles/**'
              - '.github/workflows/ci.yml'
            hygiene:
              - 'scripts/**'
              - 'locales/**'
              - 'registry/**'
              - 'templates/**'
              - 'examples/**'
              - '.beans.yml'
              - '.github/workflows/ci.yml'
            semver:
              - 'crates/csl-legacy/**'
              - 'crates/citum-schema-data/**'
              - 'crates/citum-schema-style/**'
              - 'crates/citum-schema/**'
              - 'crates/citum-migrate/**'
              - 'crates/citum-engine/**'
              - 'crates/citum-cli/**'
              - 'crates/citum-bindings/**'

  checks:
    name: Hygiene Checks
    needs: changes
    if: ${{ needs.changes.outputs.hygiene == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install beans CLI
        run: |
          curl -fsSL \
            https://github.com/hmans/beans/releases/download/v0.4.0/beans_Linux_x86_64.tar.gz \
            -o /tmp/beans.tar.gz
          tar -xzf /tmp/beans.tar.gz -C /tmp
          sudo install -m 0755 /tmp/beans /usr/local/bin/beans

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install script dependencies
        run: npm install --prefix scripts

      - name: Run bean hygiene regression tests
        run: ./scripts/test-beans-hygiene.sh

      - name: Check docs and bean hygiene
        run: ./scripts/check-docs-beans-hygiene.sh

      - name: Validate repo frontmatter manifests
        run: ./scripts/validate-frontmatter.sh --repo-only --copilot-strict

      - name: Enforce schema bump footer contract on PRs
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          python3 scripts/validate-schema-release.py \
            --baseline-ref "${{ github.event.pull_request.base.sha }}" \
            --commit-range "${{ github.event.pull_request.base.sha }}..HEAD" \
            --allow-orphan-footer \
            --dry-run

      - name: Enforce version bump footer contract on PRs
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          python3 scripts/validate-version-release.py \
            --baseline-ref "${{ github.event.pull_request.base.sha }}" \
            --commit-range "${{ github.event.pull_request.base.sha }}..HEAD" \
            --allow-orphan-footer \
            --dry-run

      - name: Validate production styles and structure
        run: ./scripts/validate-production-styles.sh

      - name: Check testing infrastructure contracts
        run: node scripts/check-testing-infra.js

      - name: Check facade crate boundaries
        run: ./scripts/check-facade-crate.sh

      - name: Run script regression tests
        run: node --test scripts/*.test.js

      - name: Run schema release validation regression tests
        run: |
          python3 -m unittest \
            scripts/test_validate_schema_release.py \
            scripts/test_schema_check.py \
            scripts/test_coverage_analysis.py \
            scripts/test_validate_version_release.py

  rust-ci:
    name: Rust CI (Lint + Test)
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citum-core-rust"
          cache-workspace-crates: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Enforce public API docs
        run: cargo doc --no-deps --workspace --all-features

      - name: Run tests
        run: cargo nextest run --all-features

      - name: Verify JSON schemas are up to date
        run: |
          tmp_dir="$(mktemp -d)"
          cargo run --bin citum --all-features -- schema --out-dir "$tmp_dir"
          diff -ru "$tmp_dir" docs/schemas

  semver-check:
    name: API Semver Check
    needs: changes
    if: >-
      ${{ github.event_name == 'pull_request' &&
          needs.changes.outputs.semver == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "citum-core-semver"
          cache-workspace-crates: true

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Check publishable crates for semver violations
        run: |
          cargo semver-checks \
            --workspace \
            --baseline-rev ${{ github.event.pull_request.base.sha }}
