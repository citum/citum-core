name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  core:
    name: Core Checks
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: /tmp/citum-target
    steps:
      - uses: actions/checkout@v4

      - name: Install beans CLI
        run: |
          curl -fsSL \
            https://github.com/hmans/beans/releases/download/v0.4.0/beans_Linux_x86_64.tar.gz \
            -o /tmp/beans.tar.gz
          tar -xzf /tmp/beans.tar.gz -C /tmp
          sudo install -m 0755 /tmp/beans /usr/local/bin/beans
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install script dependencies
        run: npm install --prefix scripts

      - name: Run bean hygiene regression tests
        run: ./scripts/test-beans-hygiene.sh

      - name: Check docs and bean hygiene
        run: ./scripts/check-docs-beans-hygiene.sh

      - name: Validate production styles
        run: ./scripts/validate-production-styles.sh

      - name: Check testing infrastructure contracts
        run: node scripts/check-testing-infra.js

      - name: Check facade crate boundaries
        run: ./scripts/check-facade-crate.sh

      - name: Run script regression tests
        run: node --test scripts/*.test.js

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Enforce public API docs for citum-edtf
        run: cargo rustc -p citum-edtf --lib --all-features -- -Dmissing-docs

      - name: Enforce public API docs for citum-server
        run: cargo rustc -p citum-server --lib --all-features -- -Dmissing-docs

      - name: Enforce public API docs for citum-engine
        run: cargo rustc -p citum-engine --lib --all-features -- -Dmissing-docs

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Verify JSON schemas are up to date
        run: |
          tmp_dir="$(mktemp -d)"
          cargo run --bin citum --features schema -- schema --out-dir "$tmp_dir"
          diff -ru "$tmp_dir" docs/schemas
