# yaml-language-server: $schema=https://bdarcus.github.io/csl26/schemas/bib.json
# Bibliography Grouping Examples
# Demonstrates per-group sorting rules for multilingual bibliographies
# Use with: csln render refs -b examples/bib-grouping-refs.yaml -s styles/experimental/multilingual-academic.yaml

info:
  description: Multilingual references grouped by language with locale-specific sorting

references:
  # Vietnamese references (language: vi)
  # In Vietnamese academic tradition, family names come first in citations
  # and this sorting should reflect given-name-first ordering

  - id: nguyen2020
    type: book
    title: "Lịch sử Việt Nam"
    author:
      - family: "Nguyễn"
        given: "Văn A"
    issued: "2020"
    publisher:
      name: "Nhà xuất bản Giáo dục"
    language: "vi"

  - id: tran2019
    type: book
    title: "Văn hóa truyền thống"
    author:
      - family: "Trần"
        given: "Thị B"
    issued: "2019"
    publisher:
      name: "Nhà xuất bản Văn hóa"
    language: "vi"

  - id: le2021
    type: book
    title: "Kinh tế Việt Nam"
    author:
      - family: "Lê"
        given: "Hoàng C"
    issued: "2021"
    publisher:
      name: "Nhà xuất bản Thống kê"
    language: "vi"

  # Western references (language: en)
  # Standard family-name-first sorting for English-language sources

  - id: smith2020
    type: book
    title: "Vietnamese History"
    author:
      - family: "Smith"
        given: "John"
    issued: "2020"
    publisher:
      name: "Oxford University Press"
    language: "en"

  - id: jones2019
    type: book
    title: "Southeast Asian Culture"
    author:
      - family: "Jones"
        given: "Mary"
    issued: "2019"
    publisher:
      name: "Cambridge University Press"
    language: "en"

  - id: brown2021
    type: book
    title: "Economic Development"
    author:
      - family: "Brown"
        given: "David"
    issued: "2021"
    publisher:
      name: "MIT Press"
    language: "en"
